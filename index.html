  <!-- Service Worker 登録 + PWAイベント捕捉 -->
  <script>
    // ① beforeinstallprompt: ブラウザのインストール促進をキャプチャしてカスタムUIで出す
    window.pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.pwaInstallPrompt = e;
      window.dispatchEvent(new Event('pwa-install-available'));
    });
    window.addEventListener('appinstalled', () => {
      window.pwaInstallPrompt = null;
      window.dispatchEvent(new Event('pwa-installed'));
    });

    // ② Service Worker 登録 + 更新検知
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          // 新しいSWが見つかったら更新通知イベントを発火
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                window.dispatchEvent(new Event('pwa-update-ready'));
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
    }

    /* ===== サイドバーレイアウト ===== */
    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #1a237e 0%, #283593 60%, #3f51b5 100%);
      color: white;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .sidebar-logo-title { font-size: 17px; font-weight: bold; letter-spacing: 0.02em; }
    .sidebar-logo-sub { font-size: 12px; opacity: 0.6; margin-top: 4px; }
    .sidebar-streak {
      margin: 16px 16px 0;
      background: rgba(255,255,255,0.13);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 24px;
      cursor: pointer;
      transition: all 0.18s;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active {
      background: rgba(255,255,255,0.15);
      color: white;
      font-weight: bold;
      border-left-color: #ffd54f;
    }
    .nav-item .nav-icon { width: 22px; text-align: center; font-size: 17px; }

    /* ===== ボトムナビ（スマホ専用・デフォルト非表示）===== */
    .bottom-nav { display: none; }
    .bottom-nav-item { -webkit-tap-highlight-color: transparent; }

    /* ===== メインエリア ===== */
    .main { margin-left: 240px; padding: 36px 40px; min-height: 100vh; flex: 1; min-width: 0; }
    .content { max-width: 980px; margin: 0 auto; }

    /* ページヘッダー */
    .page-header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-header h2 { font-size: 22px; font-weight: bold; color: #1a237e; }
    .page-header p { font-size: 13px; color: #666; margin-top: 3px; }
    .date-badge {
      background: #e8eaf6; color: #3f51b5;
      border-radius: 20px; padding: 7px 18px;
      font-size: 14px; font-weight: bold;
      display: inline-flex; align-items: center; gap: 7px;
    }

    /* 統計ピル */
    .stats-row { display: flex; gap: 14px; margin-bottom: 28px; }
    .stat-pill {
      background: white; border-radius: 14px; padding: 14px 20px;
      flex: 1; box-shadow: 0 1px 6px rgba(0,0,0,0.07); text-align: center;
      border: 1.5px solid #e8eaf6;
    }
    .stat-pill-num { font-size: 30px; font-weight: bold; color: #1a237e; line-height: 1; }
    .stat-pill-label { font-size: 12px; color: #888; margin-top: 5px; }

    /* 練習メニューカテゴリ */
    .menu-category { margin-bottom: 18px; }
    .menu-category-label {
      font-size: 13px; font-weight: 800; color: #555; letter-spacing: 0.5px;
      padding: 4px 10px; margin-bottom: 10px;
      border-left: 4px solid #9fa8da; background: #f5f7ff; border-radius: 0 6px 6px 0;
    }
    /* 練習メニューグリッド */
    .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .menu-card {
      background: white; border: 2px solid #e8eaf6; border-radius: 16px;
      padding: 16px 10px 14px; cursor: pointer; transition: all 0.18s;
      position: relative; text-align: center;
      box-shadow: 0 1px 5px rgba(0,0,0,0.05);
    }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.13); }
    .menu-card.done { background: #f9fbe7; border-color: #aed581; }
    /* 目標が設定されているが未達成のカード — 光る */
    .menu-card.target-unmet {
      border-color: #ffb300;
      animation: targetGlow 2s ease-in-out infinite;
    }
    @keyframes targetGlow {
      0%,100% { box-shadow: 0 1px 5px rgba(0,0,0,0.05); border-color: #ffb300; }
      50%     { box-shadow: 0 4px 22px rgba(255,179,0,0.55), 0 0 0 3px rgba(255,179,0,0.12); border-color: #ffd54f; }
    }
    .menu-target-badge {
      font-size: 10px; font-weight: 700; color: #e65100;
      background: #fff3e0; border-radius: 6px; padding: 1px 6px;
      margin-top: 3px; display: inline-block; border: 1px solid #ffcc80;
    }
    .menu-desc {
      font-size: 10px; color: #999; margin-top: 4px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; text-align: left;
    }
    .menu-icon-circle {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px; transition: opacity 0.18s;
    }
    .menu-card.done .menu-icon-circle { opacity: 0.75; }
    .menu-name { font-size: 13px; font-weight: bold; color: #222; }
    .menu-unit { font-size: 11px; color: #aaa; margin-top: 2px; }
    .menu-count { font-size: 19px; font-weight: bold; color: #558b2f; margin-top: 5px; }
    .done-badge { position: absolute; top: 8px; right: 8px; font-size: 15px; }
    .tap-hint { font-size: 10px; color: #ccc; margin-top: 6px; }

    /* モーダル */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: white; border-radius: 20px; padding: 36px 40px;
      width: 380px; animation: fadeScale 0.22s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    @keyframes fadeScale {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal-icon-wrap { text-align: center; font-size: 52px; color: #3f51b5; margin-bottom: 10px; }
    .modal-icon-wrap i { font-size: 48px; }
    .modal-title { font-size: 20px; font-weight: bold; text-align: center; color: #1a237e; }
    .modal-hint { font-size: 13px; color: #888; text-align: center; margin: 6px 0 24px; }
    .modal-input-row {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #f0f4ff; border-radius: 14px; padding: 14px 20px; margin-bottom: 24px;
    }
    .modal-input-row input {
      width: 110px; font-size: 44px; font-weight: bold; color: #1a237e;
      border: none; background: transparent; text-align: center; outline: none;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .modal-unit { font-size: 20px; color: #888; font-weight: bold; }
    .stamp-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #3f51b5, #5c6bc0);
      color: white; border: none; border-radius: 14px;
      font-size: 17px; font-weight: bold; cursor: pointer;
      transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .stamp-btn:hover { background: linear-gradient(135deg, #303f9f, #3f51b5); }
    .stamp-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .retry-btn {
      width: 100%; padding: 11px;
      background: #fff; color: #e53935;
      border: 2px solid #e53935; border-radius: 14px;
      font-size: 15px; font-weight: bold; cursor: pointer;
      transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 10px;
    }
    .retry-btn:hover { background: #fff5f5; }
    .modal-current-val {
      text-align: center; font-size: 13px; color: #888; margin-bottom: 12px;
    }
    .modal-current-val span { color: #1565c0; font-weight: 700; font-size: 15px; }

    /* スタンプアニメーション */
    .stamp-anim {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    .stamp-anim-inner { font-size: 130px; animation: stampPop 0.85s ease forwards; }
    @keyframes stampPop {
      0%   { transform: scale(0.1) rotate(-15deg); opacity: 0; }
      40%  { transform: scale(1.25) rotate(4deg);  opacity: 1; }
      60%  { transform: scale(0.95) rotate(0deg); }
      80%  { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* ===== スタンプ帳 ===== */
    .stamp-book {}
    .month-nav {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    }
    .month-title { font-size: 20px; font-weight: bold; color: #1a237e; }
    .month-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #c5cae9; background: white; color: #3f51b5;
      font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .month-btn:hover { background: #e8eaf6; }
    .month-stats { display: flex; gap: 14px; margin-bottom: 24px; }
    .stat-card {
      flex: 1; background: white; border-radius: 14px; padding: 14px 20px;
      text-align: center; box-shadow: 0 1px 5px rgba(0,0,0,0.06); border: 1.5px solid #e8eaf6;
    }
    .stat-num { font-size: 28px; font-weight: bold; color: #1a237e; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    .calendar {
      background: white; border-radius: 16px; padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1.5px solid #e8eaf6;
      display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px;
    }
    .cal-head { text-align: center; font-size: 13px; color: #999; padding: 4px 0 8px; font-weight: bold; }
    .cal-head:first-child { color: #e53935; }
    .cal-head:last-child  { color: #1565c0; }
    .cal-day {
      aspect-ratio: 1; border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 14px; position: relative;
      background: #fafafa; border: 1.5px solid #eeeeee;
      transition: all 0.15s;
    }
    .cal-day.today { border-color: #3f51b5; background: #e8eaf6; font-weight: bold; }
    .cal-day.has-stamp { background: #ffebee; border-color: #c62828; }
    .cal-day.empty { background: transparent; border-color: transparent; }
    .day-num { font-size: 13px; color: #555; }
    .day-stamp { font-size: 18px; line-height: 1; margin-top: 1px; }
    .stamp-legend { margin-top: 14px; font-size: 13px; color: #aaa; text-align: center; }

    /* ===== コレクション ===== */
    .collection {}
    /* ===== 選手カード（新デザイン）===== */
    .collection-score-bar {
      background: white; border-radius: 14px; padding: 18px 22px;
      border: 1.5px solid #e8eaf6; box-shadow: 0 1px 5px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .score-bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .score-bar-label { font-size: 14px; color: #555; }
    .score-bar-nums  { font-size: 20px; font-weight: bold; color: #1a237e; }
    .score-bar-sub   { font-size: 12px; color: #888; }
    .score-bar-bg { background: #e8eaf6; border-radius: 8px; height: 12px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 8px; transition: width 0.6s; background: linear-gradient(90deg, #3f51b5, #7986cb); }
    .score-bar-fill.maxed { background: linear-gradient(90deg, #f9a825, #ffd54f); }

    .level-row { margin-bottom: 20px; }
    .level-row-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; padding: 6px 0;
      border-bottom: 2px solid #e8eaf6;
    }
    .level-row-num { font-size: 14px; font-weight: bold; color: #1a237e; min-width: 52px; }
    .level-row-tier { font-size: 12px; padding: 2px 10px; border-radius: 12px; font-weight: bold; }
    .level-row-req  { font-size: 12px; color: #aaa; margin-left: auto; }
    .level-cards-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }

    /* トレーディングカード本体 */
    .pcard {
      border-radius: 12px; overflow: hidden; border: 3px solid #ccc;
      transition: all 0.2s; cursor: default; position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07); background: white;
    }
    /* レベル別ボーダー（Lv1〜50の8段階） */
    .pcard-rookie   { border-color: #b0b8c1; box-shadow: 0 2px 6px rgba(150,160,170,0.2); }
    .pcard-bronze   { border-color: #cd7f32; box-shadow: 0 2px 12px rgba(205,127,50,0.4); }
    .pcard-silver   { border-color: #a8a9ad; box-shadow: 0 3px 14px rgba(168,169,173,0.45); }
    .pcard-gold     { border-color: #c8a200; box-shadow: 0 4px 16px rgba(200,162,0,0.4); }
    .pcard-emerald  { border-color: #2e7d32; animation: emeraldGlow 2s ease-in-out infinite; }
    @keyframes emeraldGlow {
      0%,100% { border-color: #2e7d32; box-shadow: 0 4px 20px rgba(46,125,50,0.6); }
      50%     { border-color: #66bb6a; box-shadow: 0 6px 28px rgba(102,187,106,0.85); }
    }
    .pcard-sapphire { border-color: #1565c0; animation: sapphireGlow 2s ease-in-out infinite; }
    @keyframes sapphireGlow {
      0%,100% { border-color: #1565c0; box-shadow: 0 4px 20px rgba(21,101,192,0.6); }
      50%     { border-color: #42a5f5; box-shadow: 0 6px 28px rgba(66,165,245,0.85); }
    }
    .pcard-ruby     { border-color: #c62828; animation: rubyGlow 2s ease-in-out infinite; }
    @keyframes rubyGlow {
      0%,100% { border-color: #c62828; box-shadow: 0 4px 20px rgba(198,40,40,0.6); }
      50%     { border-color: #ef5350; box-shadow: 0 6px 28px rgba(239,83,80,0.85); }
    }
    .pcard-plat     { border-color: #e0e0e0; animation: platSparkle 1.6s linear infinite; }
    @keyframes platSparkle {
      0%   { border-color: #e0e0e0; box-shadow: 0 4px 24px rgba(220,220,220,0.7); }
      25%  { border-color: #ffffff; box-shadow: 0 6px 32px rgba(255,255,255,1), 0 0 18px rgba(180,200,255,0.7); }
      50%  { border-color: #c8d8ff; box-shadow: 0 4px 28px rgba(200,216,255,0.8); }
      75%  { border-color: #ffffff; box-shadow: 0 6px 32px rgba(255,255,255,1), 0 0 18px rgba(255,200,220,0.7); }
      100% { border-color: #e0e0e0; box-shadow: 0 4px 24px rgba(220,220,220,0.7); }
    }
    .pcard-locked { opacity: 0.55; filter: grayscale(0.6); }
    /* ─── レアリティ別ボーダー ─── */
    .rarity-N   { border: 2px solid #b0b8c1; box-shadow: 0 2px 6px rgba(150,160,170,0.2); }
    .rarity-R   { border: 2px solid #1565c0; box-shadow: 0 3px 14px rgba(21,101,192,0.4); }
    .rarity-SR  { border: 2px solid #c8a200; box-shadow: 0 4px 16px rgba(200,162,0,0.5); animation: srGlow 2s ease-in-out infinite; }
    @keyframes srGlow {
      0%,100% { border-color: #c8a200; box-shadow: 0 4px 16px rgba(200,162,0,0.4); }
      50%     { border-color: #ffd740; box-shadow: 0 5px 24px rgba(255,215,64,0.8); }
    }
    .rarity-SSR { border: 2.5px solid #7b1fa2; animation: ssrGlow 2s ease-in-out infinite; }
    @keyframes ssrGlow {
      0%,100% { border-color: #7b1fa2; box-shadow: 0 4px 20px rgba(123,31,162,0.6), 0 0 8px rgba(206,147,216,0.4); }
      50%     { border-color: #ce93d8; box-shadow: 0 6px 28px rgba(206,147,216,0.9), 0 0 16px rgba(123,31,162,0.6); }
    }
    .rarity-UR  { border: 3px solid #e53935; animation: urRainbow 2.4s linear infinite; }
    @keyframes urRainbow {
      0%   { border-color: #f44336; box-shadow: 0 0 16px rgba(244,67,54,0.8), 0 0 32px rgba(244,67,54,0.4); }
      16%  { border-color: #ff9800; box-shadow: 0 0 16px rgba(255,152,0,0.8),  0 0 32px rgba(255,152,0,0.4); }
      33%  { border-color: #ffeb3b; box-shadow: 0 0 16px rgba(255,235,59,0.8), 0 0 32px rgba(255,235,59,0.4); }
      50%  { border-color: #4caf50; box-shadow: 0 0 16px rgba(76,175,80,0.8),  0 0 32px rgba(76,175,80,0.4); }
      66%  { border-color: #2196f3; box-shadow: 0 0 16px rgba(33,150,243,0.8), 0 0 32px rgba(33,150,243,0.4); }
      83%  { border-color: #9c27b0; box-shadow: 0 0 16px rgba(156,39,176,0.8), 0 0 32px rgba(156,39,176,0.4); }
      100% { border-color: #f44336; box-shadow: 0 0 16px rgba(244,67,54,0.8), 0 0 32px rgba(244,67,54,0.4); }
    }
    /* レアリティバッジ */
    .rarity-badge { display:inline-block; border-radius:6px; padding:2px 7px; font-size:11px; font-weight:900; letter-spacing:0.5px; }
    .rarity-badge-N   { background:#f0f0f0; color:#757575; border:1px solid #ccc; }
    .rarity-badge-R   { background:#e3f2fd; color:#1565c0; border:1px solid #1565c0; }
    .rarity-badge-SR  { background:linear-gradient(90deg,#fff8dc,#fff3a0); color:#9a7200; border:1px solid #c8a200; }
    .rarity-badge-SSR { background:linear-gradient(90deg,#f3e5f5,#e1bee7); color:#6a1b9a; border:1px solid #7b1fa2; }
    .rarity-badge-UR  { background:linear-gradient(90deg,#ffebee,#fce4ec); color:#b71c1c; border:1px solid #e53935; animation:urBadgePulse 1.5s ease-in-out infinite; }
    @keyframes urBadgePulse {
      0%,100% { box-shadow: 0 0 4px rgba(229,57,53,0.5); }
      50%     { box-shadow: 0 0 10px rgba(229,57,53,0.9); }
    }
    .pcard-header { padding: 5px 8px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: bold; }
    .pcard-body   { padding: 0; overflow: hidden; }
    .pcard-img    { width: 100%; display: block; }
    .pcard-img-locked { width: 100%; display: block; opacity: 0.2; filter: grayscale(100%); }
    .pcard-foot   { padding: 6px 8px; }
    .pcard-stats  { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 6px; font-size: 10px; margin-bottom: 5px; }
    .pcard-stat-row { display: flex; justify-content: space-between; align-items: center; }
    .pcard-stat-label { color: #666; }
    .pcard-stat-val { font-weight: bold; font-size: 11px; min-width: 16px; text-align: right; }
    .pcard-upgrade-btn {
      width: 100%; margin-top: 3px; padding: 4px 0; font-size: 10px; font-weight: bold;
      border-radius: 6px; border: none; cursor: pointer; background: #e3f2fd; color: #1565c0;
      transition: background 0.15s;
    }
    .pcard-upgrade-btn:hover:not(:disabled) { background: #bbdefb; }
    .pcard-upgrade-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }
    .level-row-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px; border-radius: 8px; margin-bottom: 10px;
      min-height: 42px; /* 全レベルで高さを統一 */
    }
    .lrh-left {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 700;
      white-space: nowrap; /* 折り返し禁止 */
      flex: 1; min-width: 0; overflow: hidden;
    }
    .lrh-right {
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0; /* 右側は縮まない */
      margin-left: 8px;
    }

    /* ===== バッジ ===== */
    .badges {}
    .badge-category { margin-bottom: 24px; }
    .badge-category-label {
      font-size: 13px; font-weight: 800; color: #555; letter-spacing: 0.5px;
      padding: 4px 10px; margin-bottom: 12px;
      border-left: 4px solid #7986cb; background: #f5f7ff; border-radius: 0 6px 6px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .badge-category-count { font-size: 12px; color: #9fa8da; font-weight: 600; }
    .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .badge-item {
      background: white; border-radius: 14px; padding: 16px 10px 14px;
      text-align: center; border: 2px solid #e8eaf6;
      box-shadow: 0 1px 5px rgba(0,0,0,0.05); position: relative;
    }
    .badge-item.earned { background: linear-gradient(135deg,#fff9c4,#fff8e1); border-color: #fdd835; }
    .badge-emoji { font-size: 36px; margin-bottom: 7px; }
    .badge-name  { font-size: 12px; font-weight: bold; color: #333; }
    .badge-cond  { font-size: 10px; color: #aaa; margin-top: 3px; line-height: 1.4; }
    .badge-bonus { font-size: 11px; font-weight: bold; color: #3f51b5; margin-top: 5px; }
    .badge-earned-label {
      font-size: 11px; font-weight: 900; color: #b71c1c;
      border: 2.5px solid #b71c1c; border-radius: 5px;
      margin-top: 7px; padding: 3px 10px;
      display: inline-block;
      background: rgba(255,235,238,0.7);
      letter-spacing: 0.08em;
      transform: rotate(-10deg);
      box-shadow: 2px 2px 0 rgba(183,28,28,0.25);
      animation: stampAppear 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes stampAppear {
      0%   { opacity:0; transform: rotate(-10deg) scale(3); }
      70%  { opacity:1; transform: rotate(-10deg) scale(0.88); }
      100% { opacity:1; transform: rotate(-10deg) scale(1); }
    }
    .badge-prog-wrap { margin-top: 7px; background: #e8eaf6; border-radius: 4px; height: 5px; overflow: hidden; }
    .badge-prog-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg,#3f51b5,#7986cb); transition: width 0.5s; }
    .badge-prog-text { font-size: 10px; color: #aaa; margin-top: 3px; }

    /* バッジ獲得通知 */
    .badge-notify {
      position: fixed; top: 20px; right: 20px; z-index: 400;
      background: linear-gradient(135deg, #e65100 0%, #ff8f00 60%, #ffc107 100%);
      color: white; border-radius: 20px; padding: 16px 22px;
      box-shadow: 0 8px 40px rgba(230,81,0,0.55), 0 2px 10px rgba(0,0,0,0.2);
      display: flex; align-items: center; gap: 14px;
      animation: notifyPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 300px; overflow: hidden;
    }
    .badge-notify::before {
      content: ''; position: absolute;
      top: -50%; left: -75%; width: 50%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg);
      animation: badgeShimmer 0.8s ease 0.35s both;
      pointer-events: none;
    }
    @keyframes notifyPop {
      0%   { transform: translateX(120%) scale(0.6); opacity: 0; }
      65%  { transform: translateX(-10px) scale(1.04); opacity: 1; }
      100% { transform: translateX(0) scale(1); opacity: 1; }
    }
    @keyframes badgeShimmer {
      from { left: -75%; }
      to   { left: 135%; }
    }
    .badge-notify-emoji {
      font-size: 42px; display: block; flex-shrink: 0;
      animation: emojiPop 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    @keyframes emojiPop {
      0%   { transform: scale(0) rotate(-30deg); }
      65%  { transform: scale(1.4) rotate(8deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .badge-notify-text-title { font-size: 11px; opacity: 0.9; margin-bottom: 3px; font-weight: bold; letter-spacing: 0.04em; }
    .badge-notify-text-name  { font-size: 16px; font-weight: bold; }
    .badge-notify-text-bonus { font-size: 12px; color: #fff9c4; margin-top: 3px; }

    /* ===== レベルアップ通知 ===== */
    .level-up-notify {
      position: fixed; top: 20px; right: 20px; z-index: 401;
      background: linear-gradient(135deg, #0d47a1 0%, #1976d2 60%, #42a5f5 100%);
      color: white; border-radius: 20px; padding: 16px 22px;
      box-shadow: 0 8px 40px rgba(13,71,161,0.6), 0 2px 10px rgba(0,0,0,0.2);
      display: flex; align-items: center; gap: 14px;
      animation: notifyPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 300px; overflow: hidden;
    }
    .level-up-notify::before {
      content: ''; position: absolute;
      top: -50%; left: -75%; width: 50%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg);
      animation: badgeShimmer 0.8s ease 0.35s both;
      pointer-events: none;
    }

    /* ===== 宿題完了アニメーション ===== */
    .hw-complete-wrap { text-align: center; padding: 28px 16px; }
    .hw-svg-wrap {
      position: relative; width: 120px; height: 120px; margin: 0 auto 20px;
      animation: hwWrapPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes hwWrapPop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .hw-circle {
      fill: none; stroke: #43a047; stroke-width: 5.5; stroke-linecap: round;
      stroke-dasharray: 276; stroke-dashoffset: 276;
      animation: hwCircleDraw 0.55s ease-out 0.1s forwards;
    }
    @keyframes hwCircleDraw { to { stroke-dashoffset: 0; } }
    .hw-checkmark {
      fill: none; stroke: #43a047; stroke-width: 7;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 78; stroke-dashoffset: 78;
      animation: hwCheckDraw 0.4s ease-out 0.58s forwards;
    }
    @keyframes hwCheckDraw { to { stroke-dashoffset: 0; } }
    .hw-spark { position: absolute; border-radius: 50%; width: 10px; height: 10px; top: 50%; left: 50%; }
    .hw-spark-1 { background: #ffd54f; animation: hwS1 0.75s ease 0.55s both; }
    .hw-spark-2 { background: #ef5350; animation: hwS2 0.75s ease 0.60s both; }
    .hw-spark-3 { background: #42a5f5; animation: hwS3 0.75s ease 0.65s both; }
    .hw-spark-4 { background: #66bb6a; animation: hwS4 0.75s ease 0.60s both; }
    .hw-spark-5 { background: #ff8a65; animation: hwS5 0.75s ease 0.55s both; }
    .hw-spark-6 { background: #ce93d8; animation: hwS6 0.75s ease 0.65s both; }
    @keyframes hwS1 { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% + 62px),calc(-50% - 62px)) scale(1.5);opacity:0} }
    @keyframes hwS2 { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% + 82px),calc(-50% + 0px)) scale(1.5);opacity:0} }
    @keyframes hwS3 { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% + 55px),calc(-50% + 68px)) scale(1.5);opacity:0} }
    @keyframes hwS4 { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% - 55px),calc(-50% + 68px)) scale(1.5);opacity:0} }
    @keyframes hwS5 { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% - 82px),calc(-50% + 0px)) scale(1.5);opacity:0} }
    @keyframes hwS6 { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% - 55px),calc(-50% - 68px)) scale(1.5);opacity:0} }
    .hw-complete-title { font-weight:bold; font-size:21px; color:#2e7d32; margin-bottom:6px; animation:hwTextIn 0.5s ease 0.82s both; }
    .hw-complete-pts   { font-size:14px; color:#555; margin-bottom:18px; animation:hwTextIn 0.5s ease 0.94s both; }
    .hw-complete-msg   { display:inline-flex; align-items:center; gap:8px; background:#e8f5e9; border-radius:14px; padding:11px 22px; color:#2e7d32; font-weight:bold; font-size:15px; animation:hwTextIn 0.5s ease 1.06s both; }
    @keyframes hwTextIn {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ===== プロフィール ===== */
    .profile {}
    .profile-hero {
      background: linear-gradient(135deg, #1a237e, #3f51b5);
      color: white; border-radius: 18px; padding: 28px 32px;
      display: flex; align-items: center; gap: 28px; margin-bottom: 24px;
    }
    .profile-avatar { font-size: 72px; }
    .profile-info { flex: 1; }
    .profile-level { font-size: 13px; opacity: 0.8; }
    .profile-name  { font-size: 26px; font-weight: bold; margin: 4px 0 2px; }
    .profile-title { font-size: 15px; opacity: 0.85; }
    .level-bar-wrap { background: rgba(255,255,255,0.25); border-radius: 8px; height: 10px; margin-top: 14px; overflow: hidden; width: 100%; }
    .level-bar      { height: 100%; background: #ffd54f; border-radius: 8px; transition: width 0.5s; }
    .level-bar-hint { font-size: 11px; opacity: 0.65; margin-top: 4px; }
    .profile-stats-row {
      display: flex; gap: 14px; margin-bottom: 24px;
    }
    .chart-section { background: white; border-radius: 16px; padding: 22px 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1.5px solid #e8eaf6; }
    .chart-title { font-size: 16px; font-weight: bold; color: #1a237e; margin-bottom: 16px; }

    /* 獲得選手一覧（プロフィールタブ） */
    .owned-cards-section {
      background: white; border-radius: 16px; padding: 20px 22px;
      margin-bottom: 24px; margin-top: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1.5px solid #e8eaf6;
    }
    .owned-cards-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 4px;
    }
    .owned-cards-empty {
      text-align: center; padding: 32px 0; color: #bbb; font-size: 15px;
    }
    .owned-cards-empty-icon { font-size: 40px; margin-bottom: 8px; }
    .owned-cards-count { font-size: 13px; color: #888; margin-bottom: 14px; }
    .chart-row { margin-bottom: 12px; }
    .chart-label { display: flex; justify-content: space-between; font-size: 13px; color: #555; margin-bottom: 5px; }
    .chart-label-val { font-weight: bold; color: #3f51b5; }
    .chart-bar-bg { background: #e8eaf6; border-radius: 6px; height: 18px; overflow: hidden; }
    .chart-bar { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 10px; color: white; font-weight: bold; transition: width 0.6s; }
    .empty-hint { text-align: center; padding: 48px; color: #bbb; font-size: 15px; }
    .empty-hint div:first-child { font-size: 48px; margin-bottom: 10px; }

    /* セクションタイトル */
    .section-title { font-size: 16px; font-weight: bold; color: #1a237e; margin-bottom: 16px; display: flex; align-items: center; gap: 7px; }
    .progress-bar-wrap { background: #e8eaf6; border-radius: 8px; height: 10px; margin-bottom: 20px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #3f51b5, #7986cb); border-radius: 8px; transition: width 0.5s; }

    /* ===== スタンプ通知バナー ===== */
    .stamp-banner {
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, #fff9c4, #fffde7);
      border: 2px solid #fdd835; border-radius: 14px;
      padding: 14px 20px; margin-bottom: 24px;
      animation: bannerPulse 2s infinite;
    }
    @keyframes bannerPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(253,216,53,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(253,216,53,0); }
    }
    .stamp-banner-text { font-size: 15px; font-weight: bold; color: #f57f17; display: flex; align-items: center; gap: 8px; }
    .stamp-banner-btn {
      background: linear-gradient(135deg, #f9a825, #fbc02d);
      color: white; border: none; border-radius: 10px;
      padding: 9px 20px; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .stamp-banner-btn:hover { transform: scale(1.04); box-shadow: 0 4px 12px rgba(249,168,37,0.4); }

    /* ===== スタンプ帳の今日のスタンプエリア ===== */
    .today-stamp-area {
      background: white; border: 2px solid #e8eaf6; border-radius: 16px;
      padding: 24px 28px; margin-bottom: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: flex; align-items: center; gap: 24px;
    }
    .today-stamp-area.can-stamp { border-color: #fdd835; background: linear-gradient(135deg,#fffde7,#fff9c4); }
    .today-stamp-label { font-size: 14px; color: #666; }
    .today-stamp-label strong { font-size: 18px; color: #1a237e; display: block; margin-bottom: 4px; }
    .hanko-btn {
      min-width: 160px; padding: 14px 28px;
      background: linear-gradient(135deg, #c62828, #e53935);
      color: white; border: none; border-radius: 14px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      transition: transform 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(198,40,40,0.35);
      animation: hankoBtnPulse 1.8s ease-in-out infinite;
      position: relative; overflow: hidden;
    }
    .hanko-btn::after {
      content: ''; position: absolute;
      top: -50%; left: -75%; width: 50%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-20deg);
      animation: hankoBtnShimmer 2.4s ease-in-out 0.6s infinite;
    }
    @keyframes hankoBtnPulse {
      0%,100% { box-shadow: 0 4px 14px rgba(198,40,40,0.35); }
      50%     { box-shadow: 0 6px 26px rgba(198,40,40,0.7), 0 0 0 4px rgba(198,40,40,0.13); }
    }
    @keyframes hankoBtnShimmer {
      0%, 35%  { left: -75%; opacity: 0; }
      50%      { opacity: 1; }
      75%      { left: 135%; opacity: 0; }
      100%     { left: 135%; opacity: 0; }
    }
    .hanko-btn:hover { transform: translateY(-2px); }
    .hanko-btn:active { transform: scale(0.96); }
    /* 済ハンコ（サイズ別） */
    .hanko-seal {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%; color: #c62828; font-weight: 900;
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Georgia', serif;
      transform: rotate(-12deg); flex-shrink: 0;
      border: 3px double #c62828;
      background: rgba(255,235,238,0.45);
      box-shadow: 0 0 0 1.5px rgba(198,40,40,0.18), inset 0 1px 4px rgba(255,255,255,0.5);
      text-shadow: 1px 1px 0 rgba(183,28,28,0.25);
      position: relative; overflow: hidden;
      letter-spacing: -0.03em;
    }
    .hanko-seal::after {
      content: '';
      position: absolute; top: -50%; left: -70%;
      width: 40%; height: 200%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.75), transparent);
      transform: rotate(20deg);
      animation: hankoShimmer 3s ease-in-out 0.8s infinite;
    }
    @keyframes hankoShimmer {
      0%, 55%  { left: -70%; opacity: 0; }
      20%      { opacity: 1; }
      50%      { left: 130%; opacity: 0.9; }
      100%     { left: 130%; opacity: 0; }
    }
    .hanko-seal-sm   { width: 30px;  height: 30px;  font-size: 11px; border-width: 2px; }
    .hanko-seal-pill { width: 44px;  height: 44px;  font-size: 16px; border-width: 2.5px; }
    .hanko-seal-md   { width: 68px;  height: 68px;  font-size: 26px; border-width: 3px; }
    .hanko-seal-lg   { width: 130px; height: 130px; font-size: 52px; border-width: 6px; }

    .hanko-pressed {
      display: inline-flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 2px 6px rgba(198,40,40,0.35));
    }

    /* ハンコアニメーション */
    .hanko-stamp-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .hanko-stamp-inner {
      animation: hankoPress 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes getShimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .get-btn {
      background: linear-gradient(100deg, #ff6f00 0%, #ffd600 40%, #fff8e1 50%, #ffd600 60%, #ff6f00 100%);
      background-size: 300% auto;
      animation: getShimmer 1.4s linear infinite;
      color: #fff;
      font-weight: 900;
      border: none;
      border-radius: 8px;
      width: 100%;
      padding: 5px 0;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(255,180,0,0.6);
      letter-spacing: 1px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    }

    @keyframes slideUpSheet {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    @keyframes hankoPress {
      0%   { transform: scale(1.4) translateY(-90px) rotate(-15deg); opacity: 0; }
      40%  { transform: scale(1.0) translateY(8px)  rotate(-15deg); opacity: 1; }
      55%  { transform: scale(0.93) translateY(0px)  rotate(-15deg); opacity: 1; }
      70%  { transform: scale(1.04) translateY(3px)  rotate(-15deg); opacity: 1; }
      85%  { transform: scale(0.98) translateY(0px)  rotate(-15deg); opacity: 1; }
      100% { transform: scale(1.0) translateY(0px)  rotate(-15deg); opacity: 0.9; }
    }

    /* 達成率プログレスバー */
    .achievement-bar-wrap {
      background: #e8eaf6; border-radius: 8px; height: 14px; overflow: hidden; margin: 8px 0 4px;
    }
    .achievement-bar {
      height: 100%; border-radius: 8px; transition: width 0.5s;
      background: linear-gradient(90deg, #3f51b5, #7986cb);
    }
    .achievement-bar.full { background: linear-gradient(90deg, #2e7d32, #66bb6a); }

    /* ===== リセットボタン ===== */
    .reset-section {
      margin-top: 32px; padding: 20px 24px;
      background: #fff5f5; border: 2px solid #ffcdd2;
      border-radius: 14px;
    }
    .reset-section-title { font-size: 14px; font-weight: bold; color: #c62828; margin-bottom: 6px; }
    .reset-section-desc  { font-size: 13px; color: #888; margin-bottom: 14px; }
    .reset-btn {
      padding: 10px 24px; background: white;
      color: #c62828; border: 2px solid #c62828;
      border-radius: 10px; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: all 0.15s;
    }
    .reset-btn:hover { background: #ffebee; }
    .reset-confirm {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .reset-confirm-msg { font-size: 14px; font-weight: bold; color: #c62828; }
    .reset-confirm-yes {
      padding: 9px 20px; background: #c62828; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: all 0.15s;
    }
    .reset-confirm-yes:hover { background: #b71c1c; }
    .reset-confirm-no {
      padding: 9px 20px; background: white; color: #555;
      border: 2px solid #ddd; border-radius: 8px; font-size: 14px;
      cursor: pointer; transition: all 0.15s;
    }
    .reset-confirm-no:hover { background: #f5f5f5; }

    /* ===== 保護者承認PINモーダル ===== */
    .pin-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
    }
    .pin-modal {
      background: white; border-radius: 20px; padding: 32px 28px;
      width: 340px; max-width: 90vw; text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .pin-modal-icon { font-size: 48px; margin-bottom: 10px; }
    .pin-modal-title { font-size: 18px; font-weight: bold; color: #1a237e; margin-bottom: 6px; }
    .pin-modal-desc { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.7; }
    .pin-modal-input {
      width: 100%; padding: 14px; text-align: center;
      font-size: 28px; letter-spacing: 0.5em; font-weight: bold;
      border: 2px solid #c5cae9; border-radius: 12px;
      outline: none; color: #1a237e;
    }
    .pin-modal-input:focus { border-color: #3f51b5; }
    .pin-modal-error { color: #c62828; font-size: 13px; margin-top: 8px; font-weight: bold; }
    .pin-modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .pin-modal-ok {
      flex: 1; padding: 13px;
      background: linear-gradient(135deg, #1a237e, #3f51b5);
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: bold; cursor: pointer; transition: opacity 0.15s;
    }
    .pin-modal-ok:disabled { opacity: 0.35; cursor: not-allowed; }
    .pin-modal-cancel {
      flex: 1; padding: 13px;
      background: white; color: #555;
      border: 2px solid #ddd; border-radius: 12px;
      font-size: 15px; cursor: pointer; transition: background 0.15s;
    }
    .pin-modal-cancel:hover { background: #f5f5f5; }

    /* PIN設定セクション（プロフィール） */
    .pin-section {
      margin-top: 24px; padding: 20px 24px;
      background: #f3f4ff; border: 2px solid #c5cae9;
      border-radius: 14px;
    }
    .pin-section-title { font-size: 14px; font-weight: bold; color: #3f51b5; margin-bottom: 6px; }
    .pin-section-desc  { font-size: 13px; color: #888; margin-bottom: 14px; line-height: 1.6; }
    .pin-status { font-size: 13px; color: #2e7d32; font-weight: bold; margin-bottom: 10px; }
    .pin-set-btn {
      padding: 10px 20px; background: white;
      color: #3f51b5; border: 2px solid #3f51b5;
      border-radius: 10px; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: background 0.15s;
    }
    .pin-set-btn:hover { background: #e8eaf6; }
    .pin-del-btn {
      padding: 10px 20px; background: white;
      color: #c62828; border: 2px solid #c62828;
      border-radius: 10px; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: background 0.15s;
    }
    .pin-del-btn:hover { background: #ffebee; }
    .pin-input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
    .pin-input-row input {
      width: 140px; padding: 10px 14px; font-size: 22px; letter-spacing: 0.35em;
      border: 2px solid #c5cae9; border-radius: 10px; text-align: center;
      font-weight: bold; color: #1a237e; outline: none;
    }
    .pin-input-row input:focus { border-color: #3f51b5; }

    /* レスポンシブ（タブレット） */
    @media (max-width: 900px) {
      .menu-grid { grid-template-columns: repeat(3, 1fr); }
      .level-cards-row { grid-template-columns: repeat(6, 1fr); }
      .badge-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ===== モバイル/デスクトップ切り替えヘルパー ===== */
    .mobile-only  { display: none; }
    .desktop-only { display: block; }

    /* ===== スマホ対応（768px以下）===== */
    @media (max-width: 768px) {
      /* サイドバー非表示 */
      .sidebar { display: none; }

      /* メインエリア */
      .main {
        margin-left: 0;
        padding: 20px 16px;
        padding-bottom: calc(64px + env(safe-area-inset-bottom));
      }

      /* ページヘッダー */
      .page-header { margin-bottom: 16px; }
      .page-header h2 { font-size: 18px; }

      /* stat-pill: 2×2グリッド */
      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-pill { padding: 12px 14px; }
      .stat-pill-num { font-size: 24px; }

      /* 練習メニュー: 2列 */
      .menu-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .menu-card { padding: 14px 8px 12px; }

      /* モーダル: 画面幅に合わせる */
      .modal { width: calc(100% - 32px); padding: 28px 24px; margin: 16px; }

      /* スタンプカレンダー: 7列を確実に収める */
      .calendar {
        padding: 10px 8px;
        gap: 3px;
        overflow: visible;
      }
      .cal-head { font-size: 11px; padding: 2px 0 5px; }
      .cal-day  { font-size: 11px; border-radius: 6px; border-width: 1px; }
      .day-num  { font-size: 11px; }
      .day-stamp { font-size: 14px; margin-top: 0; }

      /* 選手カード: スマホでは2列縦型表示 */
      .level-cards-row { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .pcard-header { padding: 7px 10px; font-size: 12px; }
      .pcard-foot { padding: 8px 10px; }
      .pcard-stats { font-size: 11px; }
      .pcard-stat-val { font-size: 12px; }
      /* レベルヘッダー: スマホでは文字を少し小さく・パディング調整 */
      .level-row-head { padding: 8px 10px; min-height: 40px; }
      .lrh-left { font-size: 12px; gap: 3px; }
      .lrh-cost { font-size: 11px; padding: 2px 7px; }

      /* プロフィール獲得選手一覧 */
      .owned-cards-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }

      /* ===== モバイルゲームUI ===== */
      .mobile-only  { display: block; }
      .desktop-only { display: none; }

      /* mainのtop paddingをゼロに（HUDが上端から始まるため） */
      .main { padding-top: 0; }

      /* ゲームスタイルトップ（HUD＋週カレンダー） */
      .mobile-game-top {
        margin: 0 -16px;
        padding: 10px 16px 12px;
        background: linear-gradient(160deg, #1a237e 0%, #283593 55%, #1565c0 100%);
        border-radius: 0 0 22px 22px;
        box-shadow: 0 4px 18px rgba(26,35,126,0.28);
        margin-bottom: 14px;
      }
      /* ホーム専用：バナー画像モード */
      .mobile-game-top.home-banner {
        padding: 0;
        background: #0d1b4b;
        overflow: hidden;
      }

      /* HUDヘッダー */
      .mobile-hud {
        display: flex; align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .mobile-hud-streak, .mobile-hud-coins {
        display: flex; align-items: center; gap: 4px;
        background: rgba(255,255,255,0.13);
        border-radius: 20px; padding: 6px 12px;
      }
      .mobile-hud-coins { background: rgba(255,213,79,0.18); }
      .hud-fire { font-size: 20px; display: inline-block;
        animation: fireWiggle 1.8s ease-in-out infinite; }
      .hud-fire.fire-hot  { filter: drop-shadow(0 0 5px #ff6d00); }
      .hud-fire.fire-ultra{ filter: drop-shadow(0 0 8px #00bcd4); }
      @keyframes fireWiggle {
        0%,100% { transform: scale(1) rotate(-4deg); }
        50%      { transform: scale(1.18) rotate(4deg); }
      }
      .hud-streak-num  { font-size: 22px; font-weight: 900; color: #ffd54f; line-height: 1; }
      .hud-streak-label{ font-size: 11px; color: rgba(255,255,255,0.75); }
      .mobile-hud-center{ font-size: 12px; color: rgba(255,255,255,0.65); font-weight: 500; }
      .hud-coins-num   { font-size: 16px; font-weight: 900; color: #ffd54f; }
      .hud-coins-label { font-size: 11px; color: rgba(255,255,255,0.75); }

      /* 週カレンダー */
      .mobile-week-calendar {
        display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px;
      }
      .week-day {
        display: flex; flex-direction: column; align-items: center;
        padding: 5px 2px; border-radius: 10px;
        background: rgba(255,255,255,0.07);
      }
      .week-day.today   { background: rgba(255,213,79,0.22); box-shadow: 0 0 0 1.5px #ffd54f; }
      .week-day.stamped { background: rgba(76,175,80,0.28); }
      .week-day-label   { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; }
      .week-day.today .week-day-label { color: #ffd54f; }
      .week-day-icon    { font-size: 15px; min-height: 22px;
        display: flex; align-items: center; justify-content: center; }
      .week-day:not(.stamped) .week-day-icon { color: rgba(255,255,255,0.25); font-size: 11px; }
      .week-day.today:not(.stamped) .week-day-icon { color: #ffd54f; }

      /* 今日のポイント進捗カード */
      .mobile-progress-card {
        background: white; border-radius: 16px; padding: 14px 16px;
        margin-bottom: 10px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      }
      .mobile-progress-top {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 8px;
      }
      .mobile-progress-title { font-size: 12px; color: #666; font-weight: 600; }
      .mobile-progress-pts strong { font-size: 22px; font-weight: 900; color: #1a237e; }
      .mobile-progress-cap  { font-size: 11px; color: #bbb; }
      .mobile-progress-track {
        height: 10px; background: #e8eaf6; border-radius: 999px; overflow: hidden;
        margin-bottom: 6px;
      }
      .mobile-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #3f51b5, #7c4dff);
        border-radius: 999px;
        transition: width 0.6s cubic-bezier(.4,2,.55,1);
      }
      .mobile-progress-msg { font-size: 11px; color: #999; text-align: right; }

      /* バッジカウントダウン */
      .mobile-badge-cta {
        background: linear-gradient(135deg, #fff8e1, #fffde7);
        border: 1.5px solid #ffe082; border-radius: 14px;
        padding: 12px 14px; margin-bottom: 12px;
        box-shadow: 0 2px 8px rgba(255,193,7,0.15);
      }
      .mobile-badge-cta-inner {
        display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
      }
      .mobile-badge-emoji   { font-size: 28px; flex-shrink: 0; }
      .mobile-badge-info    { flex: 1; min-width: 0; }
      .mobile-badge-name    { font-size: 13px; font-weight: 700; color: #333;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mobile-badge-remaining { font-size: 12px; color: #e65100; margin-top: 2px; }
      .mobile-badge-remaining strong { font-size: 15px; }
      .mobile-badge-bar-track {
        height: 8px; background: rgba(255,193,7,0.25);
        border-radius: 999px; overflow: hidden;
      }
      .mobile-badge-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffb300, #ff6f00);
        border-radius: 999px;
        transition: width 0.6s cubic-bezier(.4,2,.55,1);
      }

      /* ボトムナビ非表示（ホームアイコン方式に移行） */
      .bottom-nav { display: none !important; }

      /* ホームFAB（練習・学習・カード以外の画面で表示） */
      .home-fab {
        position: fixed;
        bottom: calc(24px + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        z-index: 500;
        background: linear-gradient(135deg, #1a237e, #3f51b5);
        color: white;
        width: 64px; height: 64px;
        border-radius: 50%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 2px;
        font-size: 24px;
        box-shadow: 0 4px 20px rgba(26,35,126,0.45);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        border: 3px solid rgba(255,255,255,0.3);
      }
      .home-fab-label {
        font-size: 9px; font-weight: 800;
        color: rgba(255,255,255,0.9);
        letter-spacing: 0.5px;
      }

      /* メインエリアのbottom余白（ホームFAB分）— FABはhome以外で表示 */
      .main { padding-bottom: calc(100px + env(safe-area-inset-bottom)) !important; }
      /* ホームタブはFABなし → 余白を最小に */
      .main.main-home { padding-bottom: calc(16px + env(safe-area-inset-bottom)) !important; }

      /* ===== ホーム 3アイコングリッド ===== */
      /* ホーム アイコンセル（新デザイン：白カード） */
      /* ホームアイコンセル タップ時 */
      .home-grid-cell:active { transform: scale(0.94); }

      /* ===== ① 練習完了演出 ===== */
      .celebration-overlay {
        position: fixed; inset: 0; z-index: 6000;
        background: rgba(0,0,0,0.55);
        display: flex; align-items: center; justify-content: center;
        animation: celebFadeIn 0.25s ease;
      }
      @keyframes celebFadeIn { from { opacity:0 } to { opacity:1 } }
      .celebration-card {
        background: white; border-radius: 28px;
        padding: 28px 32px 24px; text-align: center; width: 280px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        animation: celebPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
        position: relative; overflow: hidden;
      }
      @keyframes celebPop {
        from { transform: scale(0.6); opacity:0 }
        to   { transform: scale(1);   opacity:1 }
      }
      .celebration-emoji { font-size: 48px; margin-bottom: 8px; line-height: 1; }
      .celebration-title { font-size: 22px; font-weight: 900; color: #1a237e; margin-bottom: 4px; }
      .celebration-menu  { font-size: 14px; color: #666; margin-bottom: 12px; }
      .celebration-pts   {
        font-size: 32px; font-weight: 900; color: #e65100;
        background: linear-gradient(135deg,#fff3e0,#ffe0b2);
        border-radius: 14px; padding: 8px 20px; display: inline-block;
        margin-bottom: 6px; letter-spacing: 1px;
      }
      .celebration-total { font-size: 12px; color: #888; margin-top: 4px; }
      .celebration-mascot { width: 60px; height: 60px; margin: 12px auto 0; display: block; border-radius: 12px; }
      /* 紙吹雪パーティクル */
      .confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
      .confetti-piece {
        position: absolute; width: 8px; height: 8px; border-radius: 2px;
        animation: confettiFall linear forwards;
      }
      @keyframes confettiFall {
        0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
        100% { transform: translateY(280px) rotate(720deg); opacity: 0; }
      }

      /* ===== ② 週間サマリー ===== */
      .weekly-row {
        display: flex; gap: 5px; justify-content: center; align-items: flex-end;
        padding: 6px 0 2px;
      }
      .weekly-day-col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
      .weekly-bar-wrap { width: 28px; height: 48px; display: flex; align-items: flex-end; justify-content: center; }
      .weekly-bar {
        width: 18px; border-radius: 5px 5px 0 0;
        min-height: 4px;
        background: linear-gradient(180deg,#42a5f5,#1565c0);
        transition: height 0.3s ease;
      }
      .weekly-bar.today { background: linear-gradient(180deg,#ffd54f,#f9a825); }
      .weekly-bar.empty { background: #e8eaf6; }
      .weekly-day-label { font-size: 10px; color: #999; font-weight: 600; }
      .weekly-day-label.today { color: #1565c0; font-weight: 800; }
      .weekly-summary-modal {
        background: white; border-radius: 22px; padding: 24px 20px 20px;
        width: 92%; max-width: 360px; max-height: 85vh; overflow-y: auto;
      }

      /* ===== ③ 図鑑 ===== */
      .zukan-card-wrap { position: relative; }
      .zukan-silhouette { filter: opacity(0.3) saturate(0.1) brightness(1.05); }
      .zukan-question {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 4px;
      }
      .zukan-q-mark { font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.9); text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
      .zukan-no-name {
        background: rgba(0,0,0,0.55); color: white; font-size: 10px;
        font-weight: 800; padding: 2px 6px; border-radius: 6px; letter-spacing: 0.5px;
      }
      .zukan-owned-badge {
        position: absolute; top: 4px; right: 4px; background: #43a047;
        color: white; font-size: 8px; font-weight: 900; border-radius: 6px;
        padding: 2px 5px; line-height: 1.3; z-index: 1;
      }

      /* ===== PWAインストールバナー ===== */
      .pwa-install-banner {
        position: fixed;
        left: 12px; right: 12px;
        bottom: calc(72px + env(safe-area-inset-bottom, 0px));
        z-index: 3500;
        background: linear-gradient(135deg, #1a237e, #283593);
        color: white;
        border-radius: 16px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 20px rgba(26,35,126,0.45);
        animation: pwaSlideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
      }
      @keyframes pwaSlideUp {
        from { transform: translateY(20px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
      .pwa-install-btn {
        background: #ffd54f; color: #1a237e;
        border: none; border-radius: 10px;
        padding: 7px 14px; font-size: 13px; font-weight: 900;
        cursor: pointer; white-space: nowrap; flex-shrink: 0;
        WebkitTapHighlightColor: transparent;
      }
      .pwa-install-close {
        background: rgba(255,255,255,0.2); border: none; color: white;
        border-radius: 8px; padding: 5px 8px; cursor: pointer;
        font-size: 14px; flex-shrink: 0; line-height: 1;
      }
      /* SW更新トースト */
      .pwa-update-toast {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        left: 12px; right: 12px;
        z-index: 5000;
        background: #263238;
        color: white;
        border-radius: 12px;
        padding: 10px 14px;
        display: flex; align-items: center; gap: 10px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        animation: pwaSlideDown 0.3s ease;
      }
      @keyframes pwaSlideDown {
        from { transform: translateY(-16px); opacity: 0; }
        to   { transform: translateY(0);     opacity: 1; }
      }
      .pwa-update-btn {
        background: #4caf50; color: white;
        border: none; border-radius: 8px;
        padding: 5px 12px; font-size: 12px; font-weight: 800;
        cursor: pointer; white-space: nowrap; flex-shrink: 0;
      }

      .tutorial-banner {
        position: fixed;
        left: 0; right: 0;
        bottom: calc(80px + env(safe-area-inset-bottom));
        z-index: 4000;
        padding: 0 12px 10px;
        pointer-events: none;
      }
      /* ホームで光るアイコンがあるときは上部に表示（下段アイコンと重ならないよう） */
      .tutorial-banner-top {
        position: fixed;
        left: 0; right: 0;
        top: env(safe-area-inset-top, 0px);
        z-index: 4000;
        padding: 10px 12px 0;
        pointer-events: none;
      }
      .tutorial-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 -4px 30px rgba(0,0,0,0.18), 0 4px 20px rgba(0,0,0,0.12);
        padding: 14px 16px 14px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: auto;
        border: 2px solid #ffd54f;
        position: relative;
      }
      .tutorial-mascot {
        width: 64px; height: 64px;
        border-radius: 16px;
        background: transparent;
        object-fit: contain;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      .tutorial-msg {
        flex: 1;
        font-size: 13.5px;
        font-weight: 700;
        color: #1a237e;
        line-height: 1.5;
      }
      .tutorial-skip {
        position: absolute;
        top: 8px; right: 10px;
        font-size: 11px;
        color: #bbb;
        cursor: pointer;
        padding: 2px 6px;
        background: none;
        border: none;
        pointer-events: auto;
      }
      .tutorial-arrow {
        animation: tutorialBounce 0.7s ease-in-out infinite alternate;
        font-size: 22px;
        display: block;
        text-align: center;
        margin-top: 4px;
      }
      @keyframes tutorialBounce {
        from { transform: translateY(0); }
        to   { transform: translateY(6px); }
      }
      .tutorial-step-dots {
        display: flex;
        gap: 4px;
        justify-content: center;
        margin-top: 8px;
      }
      .tutorial-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #ddd;
        transition: background 0.2s;
      }
      .tutorial-dot.active { background: #ffd54f; }
      .bottom-nav-badge {
        position: absolute; top: 6px; right: calc(50% - 18px);
        background: #ff5252; color: white; border-radius: 50%;
        width: 16px; height: 16px; font-size: 9px; font-weight: 900;
        display: flex; align-items: center; justify-content: center;
      }

      /* mainのbottom余白（ボトムナビ分） */
      .main { padding-bottom: calc(80px + env(safe-area-inset-bottom) + 16px); }

      /* スタンプバナー（白カード統一） */
      .mobile-stamp-banner {
        border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
        display: flex; align-items: center; justify-content: space-between;
        cursor: pointer; border: 2px solid #43a047; width: 100%;
        background: white;
        box-shadow: 0 2px 12px rgba(67,160,71,0.18);
        -webkit-tap-highlight-color: transparent;
        position: relative; overflow: hidden;
      }
      /* 押せる状態のときキラキラ光る */
      .mobile-stamp-banner.can-stamp-now {
        animation: stampBannerGlow 1.8s ease-in-out infinite;
      }
      .mobile-stamp-banner.can-stamp-now::after {
        content: ''; position: absolute;

    var el = document.getElementById('splash');

      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 500);

})();

// 漢字ごとの習得学年（小1=1 〜 小6=6、中学以上=7）
const KANJI_GRADE = {
  '日':1,'学':1,'入':1,'力':1,'手':1,'本':1,
  '今':2,'毎':2,'回':2,'数':2,'記':2,'光':2,'買':2,'番':2,
  '練':3,'習':3,
  '録':4,'覚':4,'戦':4,'完':4,'続':4,'選':4,'達':4,'成':4,
  '挑':7,'了':7,'戻':7,
};
// 学年区分ごとに習得済みとみなす最大学年
const GRADE_MAX = { low:1, mid:2, high:4, jhs:99 };

function getGrade() { return localStorage.getItem(GRADE_KEY) || 'mid'; }

// {漢字|かな}マーカーを学年に応じて残す/除去する
// → maxGrade >= その漢字の習得学年 なら振り仮名不要（漢字のみ）
// 未登録の漢字はデフォルト99扱い（常に振り仮名を表示）
function processFuri(text, maxGrade) {
  if (!text) return text;
  return text.replace(/\{([^|]+)\|([^}]+)\}/g, (match, kanji, kana) => {
    const kanjiChars = [...kanji].filter(c => /[\u4e00-\u9fff]/.test(c));
    if (!kanjiChars.length) return kanji;
    const maxKG = kanjiChars.reduce((mx, c) => Math.max(mx, KANJI_GRADE[c] ?? 99), 0);
    return maxGrade >= maxKG ? kanji : match;
  });
}
function isOnboardingDone() { return !!localStorage.getItem(ONBOARDING_KEY); }

// 効果音ユーティリティ（キャッシュ済みAudioをcloneして即再生）
function playSound(file, volume) {
  if (!isSoundEnabled()) return;
  try {
    let a;
    if (_audioCache[file]) {
      a = _audioCache[file].cloneNode(); // デコード済みをクローン → ラグなし
    } else {
      a = new Audio('sounds/' + file);
    }
    if (volume !== undefined) a.volume = volume;
    a.play();
  } catch(e) {}
}

// 振り仮名ヘルパー: {漢字|かんじ} 形式をrubyタグに変換
function Furi({ t }) {
  const parts = t.split(/(\{[^}|]+\|[^}]+\})/);
  return <>{parts.map((p, i) => {
    const m = p.match(/^\{(.+?)\|(.+?)\}$/);
    if (m) return <ruby key={i}>{m[1]}<rt style={{fontSize:'0.55em',letterSpacing:'0.05em'}}>{m[2]}</rt></ruby>;
    return <React.Fragment key={i}>{p}</React.Fragment>;
  })}</>;
}

// guaranteeSR=true のとき SR以上から抽選（10連ラスト1枚保証用）
function pickScoutCard(guaranteeSR) {
  let rarity;
  if (guaranteeSR) {
    // SR:75% / SSR:20% / UR:5% でSR以上を保証
    const r = Math.random() * 100;
    if      (r < 5)  rarity = 'UR';
    else if (r < 25) rarity = 'SSR';
    else             rarity = 'SR';
  } else {
    const r = Math.random() * 100;
    if      (r < 1)  rarity = 'UR';
    else if (r < 5)  rarity = 'SSR';
    else if (r < 20) rarity = 'SR';
    else if (r < 50) rarity = 'R';
    else             rarity = 'N';
  }
  const candidates = PLAYERS.filter(p => p.rarity === rarity);
  const player = candidates[Math.floor(Math.random() * candidates.length)];
  return { ...player, key: player.id }; // key は ownedCards への保存・compat 用
}

  return PLAYERS.find(p => p.id === id) || null;
}

// カードキーを返す（例: "lv01_meet"）

}

// レベルからボーダークラスを返す
function getCardBorderClass(lv) {
  if (lv >= 50) return 'pcard-plat';
  if (lv >= 30) return 'pcard-ruby';
  if (lv >= 25) return 'pcard-sapphire';
  if (lv >= 20) return 'pcard-emerald';
  if (lv >= 15) return 'pcard-gold';
  if (lv >= 10) return 'pcard-silver';
  if (lv >= 5)  return 'pcard-bronze';
  return 'pcard-rookie';
}

// レベルからヘッダー情報を返す
function getLevelInfo(lv) {
  if (lv >= 50) return { label:'プラチナ', starCount:7, bg:'linear-gradient(90deg,#616161,#bdbdbd,#fafafa)', color:'#fff' };
  if (lv >= 30) return { label:'ルビー',   starCount:6, bg:'linear-gradient(90deg,#b71c1c,#e53935,#ef9a9a)', color:'#fff' };
  if (lv >= 25) return { label:'サファイア', starCount:5, bg:'linear-gradient(90deg,#0d47a1,#1976d2,#90caf9)', color:'#fff' };
  if (lv >= 20) return { label:'エメラルド', starCount:4, bg:'linear-gradient(90deg,#1b5e20,#388e3c,#a5d6a7)', color:'#fff' };
  if (lv >= 15) return { label:'ゴールド',  starCount:3, bg:'linear-gradient(90deg,#c8a200,#ffd700)', color:'#fff' };
  if (lv >= 10) return { label:'シルバー',  starCount:2, bg:'linear-gradient(90deg,#78909c,#cfd8dc)', color:'#fff' };

}

// 能力ランクのインデックス（0=G ... 7=S）
function rankIdx(r) { return STAT_RANKS.indexOf(r); }

// 1枚のカードのアップグレード消費ポイントを計算
function calcUpgradeSpend(key, cardUpgrades) {
  const player  = getPlayerById(key);
  const base    = CARD_BASE_STATS[key] || (player && player.stats);
  const current = (cardUpgrades || {})[key];
  if (!base || !current) return 0;
  let spend = 0;
  for (const stat of ['meet','power','speed','arm','defense']) {
    const bIdx = rankIdx(base[stat]);
    const cIdx = rankIdx(current[stat]);
    for (let i = bIdx; i < cIdx; i++) spend += UPGRADE_COSTS[i];
  }
  return spend;
}

// メニューごとの量→ポイント換算テーブル [[しきい値, ポイント], ...]
// 少しでもやったら3pt + 量に比例して加算
// 回メニュー: 3 + floor(回数/10)、秒メニュー: 3 + floor(秒数/10)、分メニュー: 3 + floor(分数/3)
function calcMenuPoints(menuId, count) {
  if (!count || count <= 0) return 0;
  const menu = MENUS.find(m => m.id === menuId);
  const base = 3;
  if (!menu) return base;
  if (menu.unit === '分') return base + Math.floor(count / 3);
  if (menu.unit === '秒') return base + Math.floor(count / 10);
  return base + Math.floor(count / 10); // 回
}

// 1日の上限ポイント
const DAILY_POINT_CAP = 200;

// 学習タブ: 1日の目標テスト回数・上限ポイント
const QUIZ_DAILY_GOAL = 2;
const QUIZ_DAILY_CAP  = 100; // テスト日次上限（練習と合算で200pt上限内に収める）
const KISO_DAILY_CAP  = 80;  // 覚えよう日次上限（1セクション30ptなので約2〜3セクション分）

// 1日分のポイント合計（キャップ前）
function calcDayPoints(rec) {
  return Object.entries(rec).reduce((d, [id, cnt]) => d + calcMenuPoints(id, cnt), 0);
}

// 練習スコア = 各日の合計を100ptでキャップして累計（クイズボーナス込み）
function calcPracticeScore(records, quizBonus) {
  return Object.keys(records).reduce((sum, date) => {
    const rec = records[date];
    const dayPts = Object.entries(rec).reduce((d, [id, cnt]) => d + calcMenuPoints(id, cnt), 0);
    const qPts = (quizBonus || {})[date] || 0;
    return sum + Math.min(DAILY_POINT_CAP, dayPts + qPts);
  }, 0);
}

// ===== バッジヘルパー =====
function _qdAll(d) {
  return Object.values(d.quizDone || {}).flat();
}
function _qdDiff(d, diff) {
  return _qdAll(d).filter(e => (typeof e==='string'?e:e.diff)===diff).length;
}
function _qdPerfect(d, diff) {
  return _qdAll(d).filter(e => typeof e==='object' && e.diff===diff && e.perfect).length;
}
function _qdTotal(d) { return _qdAll(d).length; }
function _qdStreak(d) {
  let streak=0, dt=new Date();
  while(true){
    const k=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    if(!((d.quizDone||{})[k]||[]).length) break;
    streak++; dt.setDate(dt.getDate()-1);
  }
  return streak;
}
function _upgradeCount(d) {
  return Object.keys(d.cardUpgrades||{}).reduce((sum,key)=>{
    const base=CARD_BASE_STATS[key], cur=(d.cardUpgrades||{})[key];
    if(!base||!cur) return sum;
    return sum+['meet','power','speed','arm','defense'].reduce((s,st)=>s+Math.max(0,rankIdx(cur[st])-rankIdx(base[st])),0);
  },0);
}
function _sRankCount(d) {
  return (d.ownedCards||[]).reduce((sum,key)=>{
    const cur=(d.cardUpgrades||{})[key]||CARD_BASE_STATS[key]||{};
    return sum+['meet','power','speed','arm','defense'].filter(s=>cur[s]==='S').length;
  },0);
}
function _fullUpgradeCount(d) {
  return (d.ownedCards||[]).filter(key=>{
    const cur=(d.cardUpgrades||{})[key]||CARD_BASE_STATS[key]||{};
    return ['meet','power','speed','arm','defense'].every(s=>cur[s]==='S');
  }).length;
}
function _practiceDays(d) { return Object.keys(d.records||{}).filter(dt=>Object.values((d.records||{})[dt]||{}).some(v=>v>0)).length; }
function _maxDayMenus(d) { return Math.max(0,...Object.values(d.records||{}).map(r=>Object.values(r).filter(v=>v>0).length)); }
function _daysSince(d) { if(!d.firstDate) return 0; return Math.floor((new Date()-new Date(d.firstDate))/86400000); }
function _maxDayPt(d,rec,qb) {
  // 1日でもキャップ到達した日があるか
  return Object.keys(rec||{}).some(dt=>{
    const raw=Object.entries(rec[dt]||{}).reduce((s,[id,cnt])=>s+calcMenuPoints(id,cnt),0);
    const q=(qb||{})[dt]||0;
    return Math.min(100,raw+q)>=100;
  });
}
function _capDayCount(d) {
  return Object.keys(d.records||{}).filter(dt=>{
    const raw=Object.entries((d.records||{})[dt]||{}).reduce((s,[id,cnt])=>s+calcMenuPoints(id,cnt),0);
    const q=(d.quizBonus||{})[dt]||0;
    return Math.min(100,raw+q)>=100;
  }).length;
}
function _totalPts(d) {
  const claimedBadges=d.claimedBadges||[];
  const bonus=BADGES.filter(b=>claimedBadges.includes(b.id)).reduce((s,b)=>s+b.bonus,0);
  const hw=Object.values(d.homeworkBonus||{}).reduce((s,v)=>s+v,0);
  const kiso=Object.values(d.kisoBonus||{}).reduce((s,v)=>s+v,0);
  return calcPracticeScore(d.records,d.quizBonus)+hw+kiso+bonus;
}
function _hwCount(d) { return Object.values(d.homeworkBonus||{}).filter(v=>v>0).length; }
function _kisoCleared(d) {
  const p = d.kisoProgress || {};
  let n = 0;
  ['easy','normal','hard'].forEach(diff => Object.values(p[diff]||{}).forEach(v=>{ if(v==='cleared') n++; }));
  return n;
}

function loadData() {
  try {
    const d = localStorage.getItem('baseball_app_v3');
    const base = { records:{}, totalStats:{}, streak:0, lastDate:null, firstDate:null, stamps:{}, ownedCards:[], cardUpgrades:{}, earnedBadges:[], claimedBadges:[], quizBonus:{}, quizDone:{}, homeworkBonus:{}, kisoProgress:{}, kisoBonusLog:{}, kisoBonus:{}, scoutSpent:0, scoutCoins:0 };
    const saved = d ? { ...base, ...JSON.parse(d) } : base;
    // v2→v3移行: awardedBadges があれば claimedBadges / earnedBadges に統合
    if (saved.awardedBadges && saved.awardedBadges.length > 0) {
      saved.claimedBadges = [...new Set([...saved.claimedBadges, ...saved.awardedBadges])];
      saved.earnedBadges  = [...new Set([...saved.earnedBadges,  ...saved.awardedBadges])];
      delete saved.awardedBadges;
    }
    if (!saved.homeworkBonus) saved.homeworkBonus = {};
    if (!saved.scoutSpent)  saved.scoutSpent  = 0;
    if (!saved.scoutCoins)  saved.scoutCoins  = 0;
    return saved;
  } catch { return { records:{}, totalStats:{}, streak:0, lastDate:null, firstDate:null, stamps:{}, ownedCards:[], cardUpgrades:{}, earnedBadges:[], claimedBadges:[], quizBonus:{}, quizDone:{}, homeworkBonus:{}, kisoProgress:{}, kisoBonusLog:{}, kisoBonus:{}, scoutSpent:0, scoutCoins:0 }; }
}

// 利用開始日からの経過日数に応じた「今日の目標種目数」を返す
function getDailyThreshold(firstDate) {
  if (!firstDate) return 2;
  const start = new Date(firstDate);
  const now   = new Date();
  const days  = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  if (days < 30) return 2;   // 1ヶ月目
  if (days < 60) return 4;   // 2ヶ月目
  return 5;                  // 3ヶ月目以降
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(str) {
  const [y,m,d] = str.split('-');
  return `${parseInt(m)}月${parseInt(d)}日`;
}

// ===== パシッ音 =====
function playStampSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    const bufLen = Math.floor(ctx.sampleRate * 0.055);
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 4);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 3500; bp.Q.value = 0.8;
    const gn = ctx.createGain();
    gn.gain.setValueAtTime(2.8, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
    noise.connect(bp); bp.connect(gn); gn.connect(ctx.destination);
    noise.start(t); noise.stop(t + 0.055);
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(190, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.09);
    og.gain.setValueAtTime(0.55, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    osc.connect(og); og.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.09);
  } catch(e) {}
}

const DAY_LABELS = ['日','月','火','水','木','金','土'];
function WeeklyBar({ todayStr, records }) {
  // 今週の月〜日
  const days = React.useMemo(() => {
    const result = [];
    const base = new Date(todayStr + 'T00:00:00');
    const todayKey = todayStr;
    // 今週の月曜日を求める
    const dayOfWeek = base.getDay(); // 0=日, 1=月, ..., 6=土
    const daysFromMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const monday = new Date(base);
    monday.setDate(base.getDate() - daysFromMonday);
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate() + i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const pts = Math.min(DAILY_POINT_CAP, calcDayPoints(records[key] || {}));
      const isToday = key === todayKey;
      result.push({ key, label: DAY_LABELS[d.getDay()], pts, isToday });
    }
    return result;
  }, [todayStr, records]);
  const maxPts = Math.max(...days.map(d => d.pts), 1);
  return (
    <div className="weekly-row">
      {days.map(d => (
        <div key={d.key} className="weekly-day-col">
          <div className="weekly-bar-wrap">
            <div
              className={`weekly-bar${d.isToday ? ' today' : d.pts === 0 ? ' empty' : ''}`}
              style={{height: d.pts === 0 ? '4px' : `${Math.max(10, Math.round((d.pts / maxPts) * 40))}px`}}
            />
          </div>
          <div className={`weekly-day-label${d.isToday ? ' today' : ''}`}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ===== PWA インストールバナー =====
const PWA_INSTALL_DISMISSED_KEY = 'baseball_pwa_install_dismissed';

function PWAInstallBanner() {
  const [show, setShow] = React.useState(false);
  const [isIOS, setIsIOS] = React.useState(false);
  const [isInstalled, setIsInstalled] = React.useState(false);

  React.useEffect(() => {
    // すでにPWAとして起動中 or 非表示済みなら出さない
    const standalone = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
    if (standalone) { setIsInstalled(true); return; }
    if (localStorage.getItem(PWA_INSTALL_DISMISSED_KEY)) return;

    const ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
    setIsIOS(ios);

    if (ios) {
      // iOS: beforeinstallpromptは発火しないのでSafariで開いていれば常に案内
      const isSafari = /safari/i.test(navigator.userAgent) && !/crios|fxios/i.test(navigator.userAgent);
      if (isSafari) setShow(true);
    } else {
      // Android/Desktop Chrome: beforeinstallpromptイベント待ち
      if (window.pwaInstallPrompt) setShow(true);
      const onAvailable = () => setShow(true);
      const onInstalled = () => setShow(false);
      window.addEventListener('pwa-install-available', onAvailable);
      window.addEventListener('pwa-installed', onInstalled);
      return () => {
        window.removeEventListener('pwa-install-available', onAvailable);
        window.removeEventListener('pwa-installed', onInstalled);
      };
    }
  }, []);

  function handleInstall() {
    if (isIOS) { handleDismiss(); return; }
    const prompt = window.pwaInstallPrompt;
    if (!prompt) return;
    prompt.prompt();
    prompt.userChoice.then(choice => {
      if (choice.outcome === 'accepted') {
        window.pwaInstallPrompt = null;
        setShow(false);
      }
    });
  }

  function handleDismiss() {
    localStorage.setItem(PWA_INSTALL_DISMISSED_KEY, '1');
    setShow(false);
  }

  if (!show || isInstalled) return null;

  return (
    <div className="pwa-install-banner">
      <span style={{fontSize:22, flexShrink:0}}>📲</span>
      <div style={{flex:1, fontSize:12, lineHeight:1.4}}>
        {isIOS ? (
          <>
            <div style={{fontWeight:900, fontSize:13, marginBottom:2}}>ホーム画面に追加しよう！</div>
            <div style={{opacity:0.85}}>Safariの <strong>共有ボタン</strong> → 「ホーム画面に追加」でアプリとして使えるよ</div>
          </>
        ) : (
          <>
            <div style={{fontWeight:900, fontSize:13, marginBottom:2}}>ホーム画面に追加しよう！</div>
            <div style={{opacity:0.85}}>アプリとしてインストールすると、もっと快適に使えるよ⚾</div>
          </>
        )}
      </div>
      {!isIOS && (
        <button className="pwa-install-btn" onClick={handleInstall}>追加する</button>
      )}
      <button className="pwa-install-close" onClick={handleDismiss}>✕</button>
    </div>
  );
}

// ===== SW 更新トースト =====
function PWAUpdateToast() {
  const [show, setShow] = React.useState(false);

  React.useEffect(() => {
    const onUpdate = () => setShow(true);
    window.addEventListener('pwa-update-ready', onUpdate);
    return () => window.removeEventListener('pwa-update-ready', onUpdate);
  }, []);

  function handleReload() {
    // 待機中のSWをアクティベートしてリロード
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    });
    setShow(false);
    setTimeout(() => window.location.reload(), 200);
  }

  if (!show) return null;

  return (
    <div className="pwa-update-toast">
      <span style={{fontSize:18, flexShrink:0}}>🔄</span>
      <div style={{flex:1, fontSize:12, lineHeight:1.4}}>

}
