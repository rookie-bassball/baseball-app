const STAT_LABELS = { meet:'ミート', power:'パワー', speed:'走力', arm:'肩力', defense:'守備力' };
const STAT_ORDER  = ['meet','power','speed','arm','defense'];

function PlayerCard({ lv, typeInfo, isOwned, canAfford, cost, onBuy, currentStats, onUpgrade, availablePoints, onDetail, isScoutOnly }) {
  const lvInfo     = getLevelInfo(lv);
  const borderCls  = getCardBorderClass(lv);
  const imgFile    = `images/card_lv${String(lv).padStart(2,'0')}_${typeInfo.id}.png`;
  const cname      = getCardName(cardKey(lv, typeInfo.id));

  // 選手名表示（カード内共通）
  const nameRow = cname ? (
    <div style={{
      textAlign:'center', padding:'3px 4px 2px', background:'#f8f9ff',
      borderTop:'1px solid #eee',
    }}>
      <ruby style={{fontSize:12, fontWeight:900, color:'#1a237e', lineHeight:1.15}}>
        {cname.last}<rt style={{fontSize:8, fontWeight:400, color:'#666'}}>{cname.lastKana}</rt>
      </ruby>
      <span style={{fontSize:11, color:'#333', marginLeft:3, fontWeight:700}}>{cname.first}</span>
    </div>
  ) : null;

  if (!isOwned) {
    return (
      <div className={`pcard ${borderCls} pcard-locked`}>
        <div className="pcard-header" style={{background: typeInfo.headerBg, color: typeInfo.headerColor}}>
          <span>{typeInfo.emoji} {typeInfo.label}</span>
          <i className="fa-solid fa-lock" />
        </div>
        <div className="pcard-body">
          <img className="pcard-img-locked" src={imgFile} alt="" />
        </div>
        {nameRow}
        <div className="pcard-foot" style={{paddingTop:6}}>
          {isScoutOnly ? (
            <button className="get-btn"
              style={{width:'100%', background:'linear-gradient(135deg,#4a148c,#9c27b0)', fontSize:10}}
              onClick={onBuy}>
              🎴 スカウトで入手
            </button>
          ) : (
            <>
              <div style={{textAlign:'center', fontSize:12, color:'#888', fontWeight:700, marginBottom:4}}>{cost} pt</div>
              {canAfford
                ? <button onClick={onBuy} className="get-btn" style={{width:'100%'}}>✨ ゲット ✨</button>
                : <button disabled style={{width:'100%', padding:'5px 0', fontSize:11, fontWeight:700, borderRadius:8, border:'none', background:'#ddd', color:'#aaa', cursor:'not-allowed'}}>ポイント不足</button>
              }
            </>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className={`pcard ${borderCls}`} style={{cursor:'pointer'}} onClick={onDetail}>
      <div className="pcard-header" style={{background: typeInfo.headerBg, color: typeInfo.headerColor}}>
        <span>{typeInfo.emoji} {typeInfo.label}</span>
        <span style={{fontSize:10}}>{renderLvStars(lv, 'sm')}</span>
      </div>
      <div className="pcard-body">
        <img className="pcard-img" src={imgFile} alt={typeInfo.label} />
      </div>
      {nameRow}
      <div className="pcard-foot">
        <div className="pcard-stats">
          {STAT_ORDER.map(s => (
            <div key={s} className="pcard-stat-row">
              <span className="pcard-stat-label">{STAT_LABELS[s]}</span>
              <span className="pcard-stat-val" style={{color: STAT_RANK_COLOR[currentStats[s]]}}>{currentStats[s]}</span>
            </div>
          ))}
        </div>
        <div style={{
          textAlign:'center', fontSize:14, fontWeight:'bold', marginTop:6,
          padding:'5px 0',
          background:'linear-gradient(100deg,#1565c0 0%,#42a5f5 40%,#fff8e1 50%,#42a5f5 60%,#1565c0 100%)',
          backgroundSize:'300% auto',
          animation:'getShimmer 2s linear infinite',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
          backgroundClip:'text',
          letterSpacing:1,
        }}>⚡ 強化</div>
      </div>
    </div>
  );
}

// カード詳細モーダル（player オブジェクトを受け取る）
function CardDetailModal({ player, currentStats, baseStats, availablePoints, onUpgrade, onClose }) {
  const rarity  = player.rarity;
  const rc      = RARITY_CONFIG[rarity];
  const posInfo = POSITION_CONFIG[player.pos] || {};
  const imgFile = `images/card_${player.img}.png`;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}
        style={{maxWidth:440, width:'92%', padding:0, overflow:'hidden', borderRadius:18}}>

        {/* ヘッダー */}
        <div style={{background: posInfo.headerBg||'#333', color: posInfo.headerColor||'#fff', padding:'12px 18px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:4}}>
              <span className={`rarity-badge rarity-badge-${rarity}`}>{rarity}</span>
              <span style={{fontWeight:'bold', fontSize:15}}>{posInfo.emoji} {posInfo.label}</span>
            </div>
            {/* 選手名 */}
            <div style={{display:'flex', alignItems:'baseline', gap:8}}>
              <ruby style={{fontSize:20, fontWeight:900, color:'white', lineHeight:1.1, letterSpacing:1}}>
                {player.last}
                <rt style={{fontSize:10, fontWeight:400, letterSpacing:0.5}}>{player.lastKana}</rt>
              </ruby>
              <span style={{fontSize:15, fontWeight:800, color:'rgba(255,255,255,0.9)'}}>{player.first}</span>
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.25)', border:'none', color:'white', borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:18, lineHeight:1}}>✕</button>
        </div>

        {/* キャラクターセリフ */}
        <div style={{
          background:'linear-gradient(135deg,#1a237e,#283593)',
          padding:'10px 14px',
          display:'flex', alignItems:'flex-start', gap:10,
        }}>
          <div style={{fontSize:24, flexShrink:0}}>💬</div>
          <div>
            <div style={{fontSize:11, color:'rgba(255,255,255,0.7)', fontWeight:700, marginBottom:3}}>
              {player.last} {player.first}
            </div>
            <div style={{fontSize:13, color:'white', fontWeight:700, lineHeight:1.5}}>
              「{player.quote}」
            </div>
          </div>
        </div>

        {/* 画像 + 残りポイント */}
        <div style={{background:'#f8f9ff', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 18px', gap:12}}>
          <img src={imgFile} alt={posInfo.label} style={{width:90, height:90, borderRadius:8, objectFit:'contain', flexShrink:0}} />
          <div style={{flex:1, textAlign:'right'}}>
            <div style={{fontSize:11, color:'#888', marginBottom:2}}>残りポイント</div>
            <div style={{fontSize:26, fontWeight:900, color:'#1565c0', lineHeight:1}}>{availablePoints}<span style={{fontSize:14, fontWeight:'normal', color:'#555'}}> pt</span></div>
          </div>
        </div>

        {/* ステータス強化リスト */}
        <div style={{padding:'12px 14px 16px', background:'#fff', display:'flex', flexDirection:'column', gap:10}}>
          <div style={{fontWeight:'bold', fontSize:13, color:'#555', marginBottom:2, paddingLeft:2}}>⬆ 能力強化</div>
          {STAT_ORDER.map(stat => {
            const base    = baseStats[stat];
            const current = currentStats[stat];
            const bIdx    = rankIdx(base);
            const cIdx    = rankIdx(current);
            const isMax   = cIdx >= STAT_RANKS.length - 1;
            const nextRank = isMax ? null : STAT_RANKS[cIdx + 1];
            const upgCost  = isMax ? null : UPGRADE_COSTS[cIdx];
            const canUpg   = !isMax && availablePoints >= upgCost;
            const barPct   = Math.round((cIdx / (STAT_RANKS.length - 1)) * 100);
            return (
              <div key={stat} style={{
                background: canUpg ? '#f0f7ff' : isMax ? '#f9f0ff' : '#fafafa',
                border: `2px solid ${canUpg ? '#90caf9' : isMax ? '#ce93d8' : '#e0e0e0'}`,
                borderRadius: 12, padding:'10px 12px',
              }}>
                {/* 上段: 名前・ランクバー・現在値 */}
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
                  <span style={{fontWeight:'bold', fontSize:13, color:'#333', minWidth:52, flexShrink:0}}>{STAT_LABELS[stat]}</span>
                  <div style={{flex:1, background:'#e0e0e0', borderRadius:6, height:12, overflow:'hidden'}}>
                    <div style={{width: barPct+'%', height:'100%', background: STAT_RANK_COLOR[current], borderRadius:6, transition:'width 0.4s'}} />
                  </div>
                  <span style={{fontWeight:900, fontSize:22, color: STAT_RANK_COLOR[current], minWidth:28, textAlign:'center', lineHeight:1}}>{current}</span>
                </div>
                {/* 下段: ボタン or MAX表示 */}
                {isMax ? (
                  <div style={{
                    textAlign:'center', padding:'8px 0', fontWeight:'bold', fontSize:13,
                    color:'#9c27b0', letterSpacing:1,
                  }}>✨ MAX！完全強化済み</div>
                ) : (
                  <button
                    onClick={() => onUpgrade(stat)}
                    disabled={!canUpg}
                    style={{
                      width:'100%', padding:'10px 0',
                      borderRadius:9, border:'none', cursor: canUpg ? 'pointer' : 'not-allowed',
                      fontWeight:'bold', fontSize:14, letterSpacing:0.5,
                      background: canUpg
                        ? 'linear-gradient(135deg,#1565c0,#42a5f5)'
                        : '#e0e0e0',
                      color: canUpg ? '#fff' : '#aaa',
                      boxShadow: canUpg ? '0 3px 10px rgba(21,101,192,0.35)' : 'none',
                      display:'flex', alignItems:'center', justifyContent:'center', gap:10,
                      transition:'all 0.15s',
                    }}
                  >
                    <span style={{fontSize:16}}>{current}</span>
                    <span style={{opacity: canUpg ? 1 : 0.5}}>→</span>
                    <span style={{fontSize:16, color: canUpg ? '#ffd54f' : '#bbb'}}>{nextRank}</span>
                    <span style={{
                      background: canUpg ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.05)',
                      borderRadius:6, padding:'2px 8px', fontSize:12, marginLeft:4,
                    }}>{upgCost} pt</span>
                  </button>
                )}
                {bIdx < cIdx && (
                  <div style={{fontSize:10, color:'#9c27b0', textAlign:'right', marginTop:5}}>
                    ベース {base} から +{cIdx - bIdx} 段階強化済み
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function CollectionTab({ totalEarnedPoints, availablePoints, isPlayerOwned, onBuyCard, cardUpgrades, onUpgradeStat, pendingCardDetail, onClearPendingCard, today, profileLevel, stampDays, initialView, onScout, scoutResults, onClearScoutResults, scoutCoins, onCoinExchange }) {
  const totalCards = PLAYERS.length;
  const ownedCount = PLAYERS.filter(p => isPlayerOwned(p.id)).length;
  const [zukanOpenRarities, setZukanOpenRarities] = React.useState(new Set());
  const [detailCard, setDetailCard] = React.useState(null); // player object
  const [activeView, setActiveView] = React.useState(initialView || 'scout');
  const [showScoutResults, setShowScoutResults] = React.useState(false);
  const [revealedCount, setRevealedCount] = React.useState(0);   // 公開済みカード枚数
  const [flashRarity,   setFlashRarity]   = React.useState(null); // 'SR'|'SSR'|'UR'|null
  const revealTimerRef = React.useRef(null);

  // ホームから遷移時に initialView に追従
  React.useEffect(() => { if (initialView) setActiveView(initialView); }, [initialView]);

  // プロフィールタブから特定カードへのジャンプ
  React.useEffect(() => {
    if (!pendingCardDetail) return;
    const { playerId } = pendingCardDetail;
    const player = getPlayerById(playerId);
    if (player && isPlayerOwned(player.id)) {
      setDetailCard(player);
    }
    onClearPendingCard();
  }, [pendingCardDetail]);

  // スカウト結果が来たら順番フリップ開始
  React.useEffect(() => {
    if (!scoutResults || scoutResults.length === 0) return;
    setRevealedCount(0);
    setFlashRarity(null);
    setShowScoutResults(true);
    let idx = 0;
    const revealNext = () => {
      if (idx >= scoutResults.length) return;
      const card = scoutResults[idx];
      const curIdx = idx;
      idx++;
      setRevealedCount(curIdx + 1);
      // レア演出
      const r = card.rarity;
      if (r === 'UR') {
        playSound('upgrade.mp3');
        setFlashRarity('UR');
        setTimeout(() => setFlashRarity(null), 1800);
      } else if (r === 'SSR') {
        playSound('get_card.mp3');
        setFlashRarity('SSR');
        setTimeout(() => setFlashRarity(null), 1300);
      } else if (r === 'SR') {
        playSound('get_card.mp3');
        setFlashRarity('SR');
        setTimeout(() => setFlashRarity(null), 1000);
      } else {
        if (curIdx === 0) playSound('get_card.mp3');
      }
      if (idx < scoutResults.length) {
        const delay = r === 'UR' ? 1400 : r === 'SSR' ? 1100 : r === 'SR' ? 900 : 450;
        revealTimerRef.current = setTimeout(revealNext, delay);
      }
    };
    revealTimerRef.current = setTimeout(revealNext, 500);
    return () => { if (revealTimerRef.current) clearTimeout(revealTimerRef.current); };
  }, [scoutResults]);


  return (
    <>
      {/* モバイル用ゲームスタイルヘッダー */}
      <div className="mobile-only">
        <div className="mobile-game-top" style={{marginBottom:10}}>
          <div className="mobile-hud">
            <div style={{fontSize:15, fontWeight:800, color:'white', letterSpacing:1}}>
              🃏 <Furi t="{選手|せんしゅ}カード" />
            </div>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.8)', fontWeight:600}}>
              {today ? formatDate(today) : ''}
            </div>
          </div>
          <div style={{textAlign:'center', color:'rgba(255,255,255,0.85)', fontSize:12, fontWeight:600, marginTop:4}}>
            {ownedCount} / {totalCards} まい入手ずみ　🪙 {availablePoints}pt
          </div>
        </div>
      </div>
      {/* デスクトップ用ヘッダー */}
      <div className="desktop-only">
        <div className="page-header">
          <div>
            <h2><Furi t="{選手|せんしゅ}カードコレクション" /></h2>
            <p>{ownedCount} / {totalCards} 枚入手済み</p>
          </div>
        </div>
      </div>

      {/* ─── ビュー切り替えタブ ─── */}
      <div style={{display:'flex', gap:8, marginBottom:12}}>
        {[
          { id:'scout',   label:'🎴 スカウト',  sub:`${SCOUT_COST_SINGLE}pt〜` },
          { id:'mycards', label:'🃏 マイカード', sub:`${ownedCount}枚所持` },
          { id:'zukan',   label:'📖 図鑑',       sub:`${ownedCount}/${totalCards}枚` },
        ].map(v => (
          <button key={v.id}
            style={{
              flex:1, padding:'10px 4px', borderRadius:14,
              border: activeView === v.id ? '2px solid #6a1b9a' : '2px solid #e0e0e0',
              background: activeView === v.id ? 'linear-gradient(135deg,#6a1b9a,#8e24aa)' : 'white',
              color: activeView === v.id ? 'white' : '#555',
              fontWeight:800, fontSize:12, cursor:'pointer',
              WebkitTapHighlightColor:'transparent',
              transition:'all 0.15s',
              boxShadow: activeView === v.id ? '0 3px 10px rgba(106,27,154,0.35)' : 'none',
            }}
            onClick={() => { playSound('menu_select.mp3', 0.35); setActiveView(v.id); }}
          >
            <div>{v.label}</div>
            <div style={{fontSize:10, opacity:0.8, marginTop:2, fontWeight:600}}>{v.sub}</div>
          </button>
        ))}
      </div>

      {/* ─── マイカードビュー ─── */}
      {activeView === 'mycards' && (() => {
        // 所持選手をレアリティグループ別に表示（UR→N順）
        const rarityOrder = ['UR','SSR','SR','R','N'];
        const ownedGroups = rarityOrder.map(rar => {
          const cards = PLAYERS.filter(p => p.rarity === rar && isPlayerOwned(p.id));
          return { rarity: rar, cards };
        }).filter(g => g.cards.length > 0);

        if (ownedGroups.length === 0) return (
          <div style={{textAlign:'center', padding:'48px 24px', color:'#999'}}>
            <div style={{fontSize:48, marginBottom:12}}>🎴</div>
            <div style={{fontSize:16, fontWeight:700, color:'#6a1b9a', marginBottom:8}}>まだカードがないよ！</div>
            <div style={{fontSize:13}}>スカウトでポイントを使って選手を獲得しよう⚾</div>
            <button style={{marginTop:16, background:'linear-gradient(135deg,#6a1b9a,#8e24aa)',
              color:'white', border:'none', borderRadius:12, padding:'12px 28px',
              fontSize:14, fontWeight:800, cursor:'pointer'}}
              onClick={() => setActiveView('scout')}>
              🎴 スカウトする
            </button>
          </div>
        );

        return (
          <div style={{display:'flex', flexDirection:'column', gap:16}}>
            {ownedGroups.map(({ rarity, cards }) => {
              const rc = RARITY_CONFIG[rarity];
              return (
                <div key={rarity}>
                  {/* レアリティヘッダー */}
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10,
                    padding:'8px 14px', background:rc.bg, borderRadius:12,
                    border:`2px solid ${rc.color}`}}>
                    <span className={`rarity-badge rarity-badge-${rarity}`}>{rarity}</span>
                    <span style={{color:rc.textColor, fontWeight:900, fontSize:14}}>
                      {rarity === 'N' && 'ノーマル'}
                      {rarity === 'R' && 'レア'}
                      {rarity === 'SR' && 'スーパーレア'}
                      {rarity === 'SSR' && 'スペシャルスーパーレア'}
                      {rarity === 'UR' && 'ウルトラレア ✨'}
                    </span>
                    <span style={{marginLeft:'auto', fontSize:12, color:rc.textColor, opacity:0.8}}>
                      {cards.length}枚
                    </span>
                  </div>
                  {/* カードグリッド */}
                  <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:12}}>
                    {cards.map(player => {
                      const base = CARD_BASE_STATS[player.id] || player.stats;
                      const stats = cardUpgrades[player.id] || base;
                      const posInfo = POSITION_CONFIG[player.pos] || {};
                      return (
                        <div key={player.id}
                          className={`rarity-${rarity}`}
                          style={{borderRadius:14, overflow:'hidden', cursor:'pointer', background:'white'}}
                          onClick={() => { playSound('menu_select.mp3', 0.35); setDetailCard(player); }}
                        >
                          {/* レアリティバーヘッダー */}
                          <div style={{padding:'3px 8px', background:rc.bg, display:'flex', alignItems:'center', gap:6}}>
                            <span className={`rarity-badge rarity-badge-${rarity}`} style={{fontSize:9, padding:'1px 5px'}}>{rarity}</span>
                            <span style={{fontSize:9, color:rc.textColor, fontWeight:700}}>{posInfo.emoji} {posInfo.label}</span>
                          </div>
                          {/* カード画像 */}
                          <div style={{width:'100%', aspectRatio:'3/4', background:'#f5f5f5'}}>
                            <img
                              src={`images/card_${player.img}.png`}
                              alt={posInfo.label}
                              style={{width:'100%', height:'100%', objectFit:'cover'}}
                              onError={e => { e.target.style.display='none'; }}
                            />
                          </div>
                          {/* フッター（選手名） */}
                          <div style={{padding:'6px 10px 5px', background:posInfo.headerBg||'#333'}}>
                            <div style={{display:'flex', alignItems:'baseline', gap:4}}>
                              <ruby style={{fontSize:12, fontWeight:900, color:'white'}}>
                                {player.last}<rt style={{fontSize:7}}>{player.lastKana}</rt>
                              </ruby>
                              <span style={{fontSize:10, fontWeight:800, color:'rgba(255,255,255,0.9)'}}>{player.first}</span>
                            </div>
                          </div>
                          {/* 能力値ストリップ */}
                          <div style={{padding:'5px 8px 6px', background:'white', display:'flex', justifyContent:'space-between'}}>
                            {STAT_ORDER.map(stat => (
                              <div key={stat} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:1}}>
                                <span style={{fontSize:8, color:'#aaa', fontWeight:600}}>{STAT_LABELS[stat]}</span>
                                <span style={{fontSize:13, fontWeight:900, color:STAT_RANK_COLOR[stats[stat]||'G'], lineHeight:1}}>{stats[stat]||'G'}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ─── お店ビュー（既存のレベルグループ）─── */}

    {/* ─── スカウトビュー ─── */}
    {activeView === 'scout' && <>
      {/* スカウト結果モーダル */}
      {showScoutResults && scoutResults && (() => {
        const allRevealed = revealedCount >= scoutResults.length;
        const isSingle    = scoutResults.length === 1;
        const closeModal  = () => {
          if (revealTimerRef.current) clearTimeout(revealTimerRef.current);
          setRevealedCount(0); setFlashRarity(null);
          setShowScoutResults(false); onClearScoutResults();
        };
        const skipAll = () => {
          if (revealTimerRef.current) clearTimeout(revealTimerRef.current);
          // 未公開のレア演出を一括処理
          const remaining = scoutResults.slice(revealedCount);
          const topRarity = remaining.reduce((best, c) => {
            const order = { UR:4, SSR:3, SR:2, R:1, N:0 };
            return (order[c.rarity]||0) > (order[best]||0) ? c.rarity : best;
          }, 'N');
          if (['SR','SSR','UR'].includes(topRarity)) {
            setFlashRarity(topRarity);
            setTimeout(() => setFlashRarity(null), 1500);
          }
          setRevealedCount(scoutResults.length);
        };
        return (
          <div style={{
            position:'fixed', inset:0, background:'rgba(5,5,20,0.95)',
            zIndex:8000, display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', padding:16,
          }}
          onClick={allRevealed ? closeModal : skipAll}>
            {/* レア演出フラッシュ */}
            {flashRarity === 'SR'  && <div className="scout-flash-sr"  key={`flash-sr-${revealedCount}`}  />}
            {flashRarity === 'SSR' && <div className="scout-flash-ssr" key={`flash-ssr-${revealedCount}`} />}
            {flashRarity === 'UR'  && <div className="scout-flash-ur"  key={`flash-ur-${revealedCount}`}  />}

            {/* タイトル */}
            <div style={{color:'white', fontSize:18, fontWeight:900, marginBottom:12, letterSpacing:1, textShadow:'0 0 20px rgba(255,255,255,0.5)'}}>
              {allRevealed
                ? (scoutResults.some(r => r.rarity === 'UR') ? '🌈 ウルトラレア！！！'
                  : scoutResults.some(r => r.rarity === 'SSR') ? '✨ スペシャルスーパーレア！！'
                  : scoutResults.some(r => r.rarity === 'SR') ? '⭐ スーパーレア！'
                  : '🎴 スカウト結果！')
                : '🎴 スカウト中...'}
            </div>

            {/* カードグリッド */}
            <div style={{
              display:'grid',
              gridTemplateColumns: isSingle ? '1fr' : 'repeat(3, 1fr)',
              gap: isSingle ? 0 : 8,
              maxWidth: isSingle ? 200 : 340, width:'100%',
            }}>
              {scoutResults.map((r, i) => {
                const revealed = i < revealedCount;
                const imgFile  = `images/card_${r.img}.png`;
                const rarity   = r.rarity;
                const rc       = RARITY_CONFIG[rarity];
                const posInfo  = POSITION_CONFIG[r.pos] || {};
                const isLast10 = !isSingle && i === scoutResults.length - 1;
                return (
                  <div key={i} style={{
                    position:'relative',
                    gridColumn: isLast10 ? '1 / -1' : undefined,
                    maxWidth: isLast10 ? 120 : undefined,
                    margin: isLast10 ? '0 auto' : undefined,
                  }}>
                    {/* NEWバッジ */}
                    {r.isNew && revealed && (
                      <div className="scout-new-badge">NEW!</div>
                    )}
                    {/* 重複コイン通知 */}
                    {!r.isNew && revealed && (
                      <div className="scout-coin-pop" key={`coin-${i}`}>🪙+{SCOUT_COIN_PER_DUP}</div>
                    )}
                    <div className={revealed ? `rarity-${rarity}` : ''} style={{
                      borderRadius: 10, overflow:'hidden',
                      minHeight: isSingle ? 300 : isLast10 ? 160 : 110,
                      display:'flex', flexDirection:'column',
                      transition:'box-shadow 0.4s',
                    }}>
                      {revealed ? (
                        <div className="scout-card-revealed" style={{display:'flex', flexDirection:'column', flex:1}}>
                          {/* レアリティ帯 */}
                          <div style={{
                            display:'flex', justifyContent:'space-between', alignItems:'center',
                            padding:'3px 5px', background: rc.bg,
                          }}>
                            <span className={`rarity-badge rarity-badge-${rarity}`} style={{fontSize: isSingle ? 11 : 9}}>{rarity}</span>
                            <span style={{fontSize: isSingle ? 10 : 8, color:rc.textColor, fontWeight:700}}>{posInfo.emoji}</span>
                          </div>
                          {/* カード画像 */}
                          <div style={{flex:1, background:'#f5f5f5', minHeight: isSingle ? 230 : isLast10 ? 110 : 70, overflow:'hidden'}}>
                            <img src={imgFile} alt="" style={{width:'100%', height:'100%', objectFit:'cover'}}
                              onError={e => { e.target.style.display='none'; }} />
                          </div>
                          {/* 名前帯 */}
                          <div style={{
                            padding:'3px 5px', background: posInfo.headerBg || '#333',
                            fontSize: isSingle ? 12 : isLast10 ? 10 : 8,
                            fontWeight:900, color:'white', textAlign:'center',
                          }}>
                            {r.last} {r.first}
                          </div>
                        </div>
                      ) : (
                        <div style={{
                          flex:1, display:'flex', alignItems:'center', justifyContent:'center',
                          background:'linear-gradient(135deg,#0d0d2e,#1a237e)',
                          minHeight: isSingle ? 300 : isLast10 ? 160 : 110,
                        }}>
                          <div style={{fontSize: isSingle ? 52 : isLast10 ? 32 : 24, opacity:0.7}}>🎴</div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* フッター */}
            <div style={{color:'rgba(255,255,255,0.55)', fontSize:12, marginTop:16, textAlign:'center'}}>
              {allRevealed
                ? 'タップして閉じる'
                : 'タップでスキップ'}
            </div>
          </div>
        );
      })()}

      {/* スカウト UI */}
      <div style={{marginBottom:12, padding:'12px 14px', background:'linear-gradient(135deg,#4a148c,#7b1fa2)', borderRadius:14, color:'white'}}>
        <div style={{fontWeight:900, fontSize:15, marginBottom:2}}>🎴 スペシャルスカウト</div>
        <div style={{fontSize:12, opacity:0.85}}>ランダムで選手カードが手に入る！UR・SSRは激レア！</div>
        <div style={{marginTop:6, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <div style={{fontSize:12, background:'rgba(255,255,255,0.15)', borderRadius:99, padding:'3px 10px', fontWeight:800}}>
            🪙 スカウトコイン: <span style={{color:'#ffd54f'}}>{scoutCoins}</span>枚
          </div>
          {scoutCoins >= SCOUT_COINS_FOR_SR ? (
            <button
              onClick={e => { e.stopPropagation(); onCoinExchange(); }}
              style={{
                background:'linear-gradient(135deg,#ffd54f,#ff8f00)',
                color:'#3e2700', fontSize:11, fontWeight:900,
                padding:'4px 10px', borderRadius:99, border:'none', cursor:'pointer',
              }}
            >
              🔄 SR確定交換（{SCOUT_COINS_FOR_SR}枚）
            </button>
          ) : (
            <div style={{fontSize:10, opacity:0.7}}>
              {SCOUT_COINS_FOR_SR - scoutCoins}枚でSR確定交換
            </div>
          )}
        </div>
      </div>

      {/* 確率表示 */}
      <div style={{background:'white', borderRadius:12, padding:'12px 14px', marginBottom:12, boxShadow:'0 2px 8px rgba(0,0,0,0.08)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
          <div style={{fontWeight:800, fontSize:12, color:'#333'}}>📊 排出確率</div>
          <div style={{fontSize:10, color:'#7b1fa2', fontWeight:700, background:'#f3e5f5', padding:'2px 8px', borderRadius:99}}>
            ✨ 10連ラストはSR以上確定
          </div>
        </div>
        {RARITIES.map(r => {
          const rc = RARITY_CONFIG[r];
          return (
            <div key={r} style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:7}}>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span className={`rarity-badge rarity-badge-${r}`}>{rc.label}</span>
                <span style={{fontSize:11, color:'#777'}}>
                  {r === 'N'   && `${PLAYERS.filter(p=>p.rarity==='N').length}名`}
                  {r === 'R'   && `${PLAYERS.filter(p=>p.rarity==='R').length}名`}
                  {r === 'SR'  && `${PLAYERS.filter(p=>p.rarity==='SR').length}名`}
                  {r === 'SSR' && `${PLAYERS.filter(p=>p.rarity==='SSR').length}名`}
                  {r === 'UR'  && `${PLAYERS.filter(p=>p.rarity==='UR').length}名 ✨`}
                </span>
              </div>
              <span style={{fontSize:13, fontWeight:900, color:rc.color}}>{rc.prob}%</span>
            </div>
          );
        })}
      </div>

      {/* 所持pt表示 */}
      <div style={{display:'flex', justifyContent:'center', marginBottom:12}}>
        <div style={{background:'#e8f5e9', borderRadius:10, padding:'8px 20px', fontSize:14, fontWeight:800, color:'#2e7d32'}}>
          🪙 残り {availablePoints} pt
        </div>
      </div>

      {/* スカウトボタン */}
      <div style={{display:'flex', flexDirection:'column', gap:10}}>
        <button
          style={{
            padding:'16px', borderRadius:14, border:'none', cursor: availablePoints >= SCOUT_COST_SINGLE ? 'pointer' : 'not-allowed',
            background: availablePoints >= SCOUT_COST_SINGLE
              ? 'linear-gradient(135deg,#4a148c,#9c27b0)'
              : '#ccc',
            color:'white', fontWeight:900, fontSize:16,
            boxShadow: availablePoints >= SCOUT_COST_SINGLE ? '0 4px 16px rgba(74,20,140,0.4)' : 'none',
            WebkitTapHighlightColor:'transparent',
          }}
          disabled={availablePoints < SCOUT_COST_SINGLE}
          onClick={() => onScout(1)}
        >
          🎴 スカウト × 1　 <span style={{fontSize:13, opacity:0.85}}>{SCOUT_COST_SINGLE} pt</span>
        </button>
        <button
          style={{
            padding:'16px', borderRadius:14, border:'none', cursor: availablePoints >= SCOUT_COST_MULTI ? 'pointer' : 'not-allowed',
            background: availablePoints >= SCOUT_COST_MULTI
              ? 'linear-gradient(135deg,#e65100,#ff6f00)'
              : '#ccc',
            color:'white', fontWeight:900, fontSize:16,
            boxShadow: availablePoints >= SCOUT_COST_MULTI ? '0 4px 16px rgba(230,81,0,0.4)' : 'none',
            WebkitTapHighlightColor:'transparent',
            position:'relative',
          }}
          disabled={availablePoints < SCOUT_COST_MULTI}
          onClick={() => onScout(10)}
        >
          <span style={{
            position:'absolute', top:-8, right:12,
            background:'#ffd54f', color:'#5d4037', fontSize:10, fontWeight:900,
            padding:'2px 8px', borderRadius:99,
          }}>SR以上確定！1連お得！</span>
          🎴🎴 スカウト × 10　 <span style={{fontSize:13, opacity:0.85}}>{SCOUT_COST_MULTI} pt</span>
        </button>
      </div>
    </>} {/* end activeView === 'scout' */}

    {/* ─── カード詳細モーダル（全ビュー共通）─── */}
    {detailCard && (() => {
      const player = detailCard; // player object
      const base = CARD_BASE_STATS[player.id] || player.stats || {};
      const currentStats = (cardUpgrades[player.id]) || base;
      return (
        <CardDetailModal
          player={player}
          currentStats={currentStats}
          baseStats={base}
          availablePoints={availablePoints}
          onUpgrade={stat => { onUpgradeStat(player.id, stat); }}
          onClose={() => setDetailCard(null)}
        />
      );
    })()}

    {/* ─── 図鑑ビュー（レアリティ別）─── */}
    {activeView === 'zukan' && <>
      <div style={{marginBottom:12, padding:'10px 14px', background:'linear-gradient(135deg,#1a237e,#283593)', borderRadius:14, color:'white'}}>
        <div style={{fontWeight:900, fontSize:14, marginBottom:2}}>📖 図鑑</div>
        <div style={{fontSize:12, opacity:0.85}}>
          <span style={{fontWeight:800, fontSize:18}}>{ownedCount}</span>
          <span style={{opacity:0.7}}>/{totalCards}名</span>
          <span style={{marginLeft:10, opacity:0.7}}>コンプリートを目指そう！</span>
        </div>
        <div style={{marginTop:6, height:6, background:'rgba(255,255,255,0.2)', borderRadius:99, overflow:'hidden'}}>
          <div style={{height:'100%', width:`${Math.round(ownedCount/totalCards*100)}%`, background:'linear-gradient(90deg,#ffd54f,#ff9800)', borderRadius:99, transition:'width 0.5s'}} />
        </div>
      </div>
      {['UR','SSR','SR','R','N'].map(rar => {
        const rc = RARITY_CONFIG[rar];
        const open = zukanOpenRarities.has(rar);
        const rarPlayers = PLAYERS.filter(p => p.rarity === rar);
        const ownedInRar = rarPlayers.filter(p => isPlayerOwned(p.id)).length;
        const rarLabel = { N:'ノーマル', R:'レア', SR:'スーパーレア', SSR:'スペシャルスーパーレア', UR:'ウルトラレア ✨' }[rar];
        return (
          <div key={rar} style={{marginBottom:8}}>
            <div
              onClick={() => setZukanOpenRarities(prev => { const n = new Set(prev); n.has(rar) ? n.delete(rar) : n.add(rar); return n; })}
              style={{
                display:'flex', alignItems:'center', justifyContent:'space-between',
                padding:'8px 14px', borderRadius:12, cursor:'pointer',
                background: rc.bg, border: `2px solid ${rc.color}`,
              }}
            >
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span className={`rarity-badge rarity-badge-${rar}`}>{rar}</span>
                <span style={{fontWeight:900, fontSize:13, color:rc.textColor}}>{rarLabel}</span>
              </div>
              <span style={{fontSize:12, fontWeight:700, color:rc.textColor, opacity:0.9}}>
                {ownedInRar}/{rarPlayers.length}名 {open ? '▲' : '▼'}
              </span>
            </div>
            {open && (
              <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, paddingTop:8}}>
                {rarPlayers.map(player => {
                  const isOwned = isPlayerOwned(player.id);
                  const posInfo = POSITION_CONFIG[player.pos] || {};
                  return (
                    <div key={player.id}
                      className={`rarity-${rar}`}
                      style={{borderRadius:12, overflow:'hidden', background:'white', cursor: isOwned ? 'pointer' : 'default', opacity: isOwned ? 1 : 0.85}}
                      onClick={() => isOwned && setDetailCard(player)}
                    >
                      {/* ポジションヘッダー */}
                      <div style={{padding:'2px 6px', background: isOwned ? posInfo.headerBg||'#333' : '#bbb', display:'flex', alignItems:'center', justifyContent:'space-between', fontSize:9, color:'white', fontWeight:700}}>
                        <span>{posInfo.emoji} {posInfo.label}</span>
                        {isOwned && <span style={{background:'rgba(255,255,255,0.25)', borderRadius:4, padding:'0px 4px'}}>✓</span>}
                      </div>
                      {/* 画像 */}
                      <div style={{position:'relative', aspectRatio:'3/4', background:'#f0f0f0', overflow:'hidden'}}>
                        <img
                          src={`images/card_${player.img}.png`}
                          alt=""
                          style={{width:'100%', height:'100%', objectFit:'cover', filter: isOwned ? 'none' : 'brightness(0.15) grayscale(1)'}}
                        />
                        {!isOwned && (
                          <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2}}>
                            <div style={{fontSize:22, color:'rgba(255,255,255,0.7)'}}>？</div>
                            <div style={{fontSize:8, color:'rgba(255,255,255,0.5)', fontWeight:700}}>未取得</div>
                          </div>
                        )}
                      </div>
                      {/* 名前フッター */}
                      <div style={{padding:'3px 5px 4px', background:'#f8f9ff', borderTop:'1px solid #eee', textAlign:'center'}}>
                        {isOwned ? (
                          <>
                            <ruby style={{fontSize:10, fontWeight:900, color:'#1a237e', lineHeight:1.3}}>
                              {player.last}<rt style={{fontSize:7}}>{player.lastKana}</rt>
                            </ruby>
                            <span style={{fontSize:9, color:'#555', marginLeft:2}}>{player.first}</span>
                          </>
                        ) : (
                          <span style={{fontSize:10, color:'#ccc', fontWeight:700}}>？？？</span>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </>}

  </>);
}

function BadgeTab({ badges, data, earnedBadges, claimedBadges, badgeBonusPoints, onClaim, today }) {
  const claimedCount = claimedBadges.length;
  const earnedCount = earnedBadges.length;
  const unclaimedCount = earnedBadges.filter(id => !claimedBadges.includes(id)).length;
  // カテゴリ: 未受け取りがあるカテゴリはデフォルト展開
  const defaultOpen = new Set(['はじめの記念','継続','学習・テスト','スペシャル']);
  for (const cat of BADGE_CATEGORIES) {
    const catBadges = badges.filter(b => b.category === cat);
    if (catBadges.some(b => earnedBadges.includes(b.id) && !claimedBadges.includes(b.id))) {
      defaultOpen.add(cat);
    }
  }
  const [openCats, setOpenCats] = React.useState(defaultOpen);
  function toggleCat(cat) {
    setOpenCats(prev => { const n = new Set(prev); n.has(cat) ? n.delete(cat) : n.add(cat); return n; });
  }
  const catRuby = {
    'はじめの記念':'はじめの{記念|きねん}', '素振り':'{素振|すぶ}り',
    'シャドーピッチング':'シャドーピッチング', 'ピッチング':'ピッチング',
    'ティーバッティング':'ティーバッティング', 'トスバッティング':'トスバッティング',
    '壁当てキャッチボール':'{壁当|かべあ}てキャッチボール',
    'スクワット':'スクワット', 'ランニング':'ランニング', 'ダッシュ':'ダッシュ',
    'ストレッチング':'ストレッチング', '縄跳び':'{縄跳|なわと}び',
    '腕立て伏せ':'{腕立|うでた}て{伏|ふ}せ', '腹筋':'{腹筋|ふっきん}', '背筋':'{背筋|はいきん}',
    'バランス・複合':'バランス・{複合|ふくごう}', '継続':'{継続|けいぞく}', '宿題':'{宿題|しゅくだい}',
    '学習・テスト':'{学習|がくしゅう}・テスト', '覚えよう':'{覚|おぼ}えよう', 'カードコレクション':'カードコレクション',
    '能力強化':'{能力|のうりょく}{強化|きょうか}', '獲得ポイント':'{獲得|かくとく}ポイント',
    'スペシャル':'スペシャル',
  };
  return (
    <>
      {/* モバイル用ゲームスタイルヘッダー */}
      <div className="mobile-only">
        <div className="mobile-game-top" style={{marginBottom:10}}>
          <div className="mobile-hud">
            <div style={{fontSize:15, fontWeight:800, color:'white', letterSpacing:1}}>
              🏅 バッジ
            </div>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.8)', fontWeight:600}}>
              {today ? formatDate(today) : ''}
            </div>
          </div>
          <div style={{textAlign:'center', color:'rgba(255,255,255,0.85)', fontSize:12, fontWeight:600, marginTop:4}}>
            {unclaimedCount > 0 ? `🎁 受け取れるバッジが ${unclaimedCount} こあります！` : `受け取りずみ ${claimedCount} / ${badges.length} こ　+${badgeBonusPoints}pt`}
          </div>
        </div>
      </div>
      {/* デスクトップ用ヘッダー */}
      <div className="desktop-only">
        <div className="page-header">
          <div>
            <h2><Furi t="バッジ" /></h2>
            <p>
              受け取り済み: <strong style={{color:'#3f51b5'}}>{claimedCount}</strong> / {badges.length} 個　|　ボーナスPT合計: <strong style={{color:'#3f51b5'}}>{badgeBonusPoints}pt</strong>
            </p>
          </div>
        </div>
      </div>
      {unclaimedCount > 0 && (
        <div style={{
          background:'linear-gradient(135deg,#fff8e1,#fffde7)', border:'2px solid #ffc107',
          borderRadius:14, padding:'14px 18px', marginBottom:20,
          display:'flex', alignItems:'center', gap:12, flexWrap:'wrap',
        }}>
          <span style={{fontSize:24}}>🎁</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:'bold', color:'#f57f17', fontSize:15}}>受け取れるバッジが {unclaimedCount} 個あります！</div>
            <div style={{fontSize:12, color:'#888', marginTop:2}}>各バッジの「受け取る！」ボタンを押してポイントをゲットしよう</div>
          </div>
        </div>
      )}
      {BADGE_CATEGORIES.map(cat => {
        const catBadges = badges.filter(b => b.category === cat);
        const catClaimed = catBadges.filter(b => claimedBadges.includes(b.id)).length;
        const catUnclaimed = catBadges.filter(b => earnedBadges.includes(b.id) && !claimedBadges.includes(b.id)).length;
        const isOpen = openCats.has(cat);
        return (
          <div key={cat} className="badge-category">
            <div className="badge-category-label" onClick={() => toggleCat(cat)}
              style={{cursor:'pointer', userSelect:'none', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
              <span><Furi t={catRuby[cat] || cat} /></span>
              <span style={{display:'flex', alignItems:'center', gap:8}}>
                {catUnclaimed > 0 && (
                  <span style={{
                    background:'#ff5252', color:'white', borderRadius:10,
                    fontSize:10, fontWeight:'bold', padding:'1px 7px',
                  }}>受取{catUnclaimed}</span>
                )}
                <span className="badge-category-count">{catClaimed}/{catBadges.length}</span>
                <i className={`fa-solid fa-chevron-${isOpen?'up':'down'}`} style={{fontSize:11, color:'#9fa8da'}} />
              </span>
            </div>
            {isOpen && (
              <div className="badge-grid">
                {catBadges.map(b => {
                  const isClaimed = claimedBadges.includes(b.id);
                  const isEarned = earnedBadges.includes(b.id);
                  const canClaim = isEarned && !isClaimed;
                  const hasProgress = b.target != null && b.getVal != null;
                  const curVal = hasProgress ? b.getVal(data) : 0;
                  const pct = hasProgress ? Math.min(100, Math.floor(curVal / b.target * 100)) : 0;
                  return (
                    <div key={b.id} className={`badge-item ${isClaimed ? 'earned' : canClaim ? 'can-claim' : ''}`}
                      style={canClaim ? {border:'2px solid #ffc107', background:'#fffde7'} : {}}>
                      <div className="badge-emoji" style={isEarned ? {} : {filter:'grayscale(1)', opacity:0.35}}>{b.emoji}</div>
                      <div className="badge-name"><Furi t={b.nameRuby || b.name} /></div>
                      <div className="badge-cond"><Furi t={b.condRuby || b.cond} /></div>
                      <div className="badge-bonus">+{b.bonus}pt</div>
                      {isClaimed ? (
                        <div className="badge-earned-label">✓ 受取済み</div>
                      ) : canClaim ? (
                        <button
                          onClick={() => onClaim(b.id)}
                          className="get-btn"
                          style={{
                            marginTop:6, padding:'5px 10px',
                            borderRadius:8,
                            fontWeight:'bold', fontSize:12, cursor:'pointer',
                          }}
                        >🎁 受け取る！+{b.bonus}pt</button>
                      ) : hasProgress ? (
                        <>
                          <div className="badge-prog-wrap">
                            <div className="badge-prog-fill" style={{width: pct+'%'}} />
                          </div>
                          <div className="badge-prog-text">{curVal.toLocaleString()} / {b.target.toLocaleString()}</div>
                        </>
                      ) : null}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

function DefenseField({ runners = [], highlight = null, showHighlight = false }) {
  const W = 260, H = 195;
  const HOME  = [130, 178];
  const FIRST = [196, 112];
  const SEC   = [130,  46];
  const THIRD = [ 64, 112];
  const MOUND = [130, 115];

  const FIELDERS = { p:[130,115], c:[130,182], '1b':[201,107], '2b':[172,83], '3b':[59,107], ss:[90,76], lf:[44,36], cf:[130,18], rf:[216,36] };
  const BASE_HIGHLIGHTS = { home:HOME, '1b':FIRST, '2b':SEC, '3b':THIRD };

  function RunnerDot({ cx, cy }) {
    return <circle cx={cx} cy={cy} r={7} fill="#ef5350" stroke="white" strokeWidth="1.5" />;
  }

  function HighlightCircle({ cx, cy, r = 11 }) {
    if (!showHighlight) return null;
    return (
      <>
        <circle cx={cx} cy={cy} r={r+3} fill="rgba(255,213,79,0.35)" />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#ffd54f" strokeWidth="2.5" strokeDasharray="5 2" />
      </>
    );
  }

  const hlBase = showHighlight && BASE_HIGHLIGHTS[highlight];
  const hlFielder = showHighlight && FIELDERS[highlight];

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{maxWidth:260, display:'block', margin:'0 auto', borderRadius:10}}>
      {/* Sky/background */}
      <rect width={W} height={H} fill="#c8e6c9" rx="10" />
      {/* Outfield arc */}
      <path d={`M 20 ${HOME[1]} Q ${HOME[0]} 5 ${W-20} ${HOME[1]}`} fill="#a5d6a7" stroke="none" />
      {/* Foul lines */}
      <line x1={HOME[0]} y1={HOME[1]} x2={20} y2={HOME[1]-80} stroke="white" strokeWidth="1.5" opacity="0.7" />
      <line x1={HOME[0]} y1={HOME[1]} x2={W-20} y2={HOME[1]-80} stroke="white" strokeWidth="1.5" opacity="0.7" />
      {/* Infield dirt */}
      <polygon points={`${HOME[0]},${HOME[1]} ${FIRST[0]},${FIRST[1]} ${SEC[0]},${SEC[1]} ${THIRD[0]},${THIRD[1]}`}
        fill="#d4a574" stroke="none" />
      {/* Infield grass circle */}
      <circle cx={130} cy={112} r={48} fill="#88c57a" />
      {/* Diamond lines */}
      <polygon points={`${HOME[0]},${HOME[1]} ${FIRST[0]},${FIRST[1]} ${SEC[0]},${SEC[1]} ${THIRD[0]},${THIRD[1]}`}
        fill="none" stroke="white" strokeWidth="1.5" />
      {/* Pitcher mound */}
      <circle cx={MOUND[0]} cy={MOUND[1]} r={6} fill="#c09060" stroke="#a07040" strokeWidth="1" />
      {/* Bases */}
      {[[HOME,'H'],[FIRST,'1'],[SEC,'2'],[THIRD,'3']].map(([[bx,by],lbl],i)=>{
        const isHL = hlBase && hlBase[0]===bx && hlBase[1]===by;
        return (
          <g key={i}>
            <rect x={bx-7} y={by-7} width={14} height={14} rx="2"
              fill={isHL ? '#ffd54f' : 'white'} stroke={isHL ? '#ff6f00' : '#9e9e9e'} strokeWidth={isHL ? 2 : 1.5} />
            <text x={bx} y={by+4} textAnchor="middle" fontSize="8" fontWeight="bold" fill={isHL ? '#e65100' : '#555'}>{lbl}</text>
          </g>
        );
      })}
      {/* Fielder highlight (non-base positions) */}
      {hlFielder && !hlBase && <HighlightCircle cx={hlFielder[0]} cy={hlFielder[1]} r={11} />}
      {hlFielder && !hlBase && (
        <text x={hlFielder[0]} y={hlFielder[1]+4} textAnchor="middle" fontSize="9" fontWeight="bold"
          fill={showHighlight ? '#e65100' : '#555'}>
          {highlight==='p'?'P':highlight==='ss'?'SS':highlight==='c'?'C':highlight.toUpperCase()}
        </text>
      )}
      {/* Runners */}
      {runners.includes(1) && <RunnerDot cx={FIRST[0]+10} cy={FIRST[1]-10} />}
      {runners.includes(2) && <RunnerDot cx={SEC[0]+10}   cy={SEC[1]-10}   />}
      {runners.includes(3) && <RunnerDot cx={THIRD[0]-10} cy={THIRD[1]-10} />}
      {/* (Out count shown outside SVG, not here) */}
    </svg>
  );
}

function CountdownCircle({ timeLeft, total = 5 }) {
  const r = 18, circ = 2 * Math.PI * r;
  const frac = timeLeft / total;
  const dash = circ * frac;
  const color = timeLeft <= 1 ? '#ef5350' : timeLeft <= 2 ? '#ff9800' : '#43a047';
  return (
    <svg width="50" height="50" viewBox="0 0 50 50" style={{display:'block'}}>
      <circle cx="25" cy="25" r={r} fill="none" stroke="#e0e0e0" strokeWidth="4" />
      <circle cx="25" cy="25" r={r} fill="none" stroke={color} strokeWidth="4"
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform="rotate(-90 25 25)" style={{transition:'stroke-dasharray 0.2s linear, stroke 0.2s'}} />
      <text x="25" y="30" textAnchor="middle" fontSize="16" fontWeight="bold" fill={color}>{timeLeft}</text>
    </svg>
  );
}

function DefenseQuizSession({ situations, onBack, onComplete }) {
  // phase: 'intro' | 'q' | 'result'
  // qPhase: 'speaking' (読み上げ中) | 'active' (カウントダウン中) | 'answered'
  const [phase, setPhase] = React.useState('intro');
  const [qPhase, setQPhase] = React.useState('speaking');
  const [qIdx, setQIdx] = React.useState(0);
  const [timeLeft, setTimeLeft] = React.useState(5);
  const [selected, setSelected] = React.useState(null);
  const [timedOut, setTimedOut] = React.useState(false);
  const [scores, setScores] = React.useState([]);
  const [showExplanation, setShowExplanation] = React.useState(false);

  const shuffled = React.useMemo(() => {
    const arr = [...situations];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }, []);

  const q = shuffled[qIdx];
  const answered = selected !== null || timedOut;
  const isCorrect = selected === q?.ans;
  const correct = scores.filter(Boolean).length;

  // 再生中Audioを管理（アンマウント時に停止）
  const audioRef = React.useRef(null);
  React.useEffect(() => {
    return () => { try { if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; } } catch(e){} };
  }, []);

  // Countdown timer — only runs when qPhase === 'active'
  React.useEffect(() => {
    if (phase !== 'q' || qPhase !== 'active' || answered) return;
    if (timeLeft <= 0) {
      setTimedOut(true);
      setQPhase('answered');
      playSound('quiz_wrong.mp3', 1.0);
      return;
    }
    const t = setTimeout(() => setTimeLeft(n => n - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, qPhase, timeLeft, answered]);

  // onComplete fires after result render (scores fully updated by then)
  React.useEffect(() => {
    if (phase !== 'result') return;
    const allCorrect = scores.every(Boolean) && scores.length === shuffled.length;
    onComplete({ diff:'reflex', key:'session', isPerfect: allCorrect });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [phase]);

  // ---- 音声再生 ----
  function speakAndStart(questionData, onDone) {
    function playStart() {
      try {
        const startAudio = new Audio('sounds/reflex_start.mp3');
        audioRef.current = startAudio;
        startAudio.onended = () => { audioRef.current = null; onDone(); };
        startAudio.onerror = () => { audioRef.current = null; onDone(); };
        startAudio.play().catch(() => { audioRef.current = null; onDone(); });
      } catch(e) { onDone(); }
    }
    try {
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
      const audio = new Audio(`sounds/reflex_${questionData.id}.mp3`);
      audioRef.current = audio;
      audio.onended = () => { audioRef.current = null; playStart(); };
      audio.onerror  = () => { audioRef.current = null; playStart(); };
      audio.play().catch(() => { audioRef.current = null; playStart(); });
    } catch(e) { playStart(); }
  }

  // ---- Actions ----
  function startQuiz() {
    const q0 = shuffled[0];
    setPhase('q');
    setQPhase('speaking');
    setQIdx(0);
    setTimeLeft(5);
    setSelected(null);
    setTimedOut(false);
    setScores([]);
    setShowExplanation(false);
    playSound('quiz_question.mp3', 0.5);
    speakAndStart(q0, () => setQPhase('active'));
  }

  function handleAnswer(idx) {
    if (answered || qPhase !== 'active') return;
    try { if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; } } catch(e){}
    setSelected(idx);
    setQPhase('answered');
    setShowExplanation(true);
    const ok = idx === q.ans;
    playSound(ok ? 'quiz_correct.mp3' : 'quiz_wrong.mp3', 1.0);
    setScores(s => [...s, ok]);
  }

  function nextQ() {
    try { if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; } } catch(e){}
    if (qIdx + 1 >= shuffled.length) {
      setPhase('result');
      return;
    }
    const nextIdx = qIdx + 1;
    const nextQ_ = shuffled[nextIdx];
    setQIdx(nextIdx);
    setQPhase('speaking');
    setTimeLeft(5);
    setSelected(null);
    setTimedOut(false);
    setShowExplanation(false);
    playSound('quiz_question.mp3', 0.5);
    speakAndStart(nextQ_, () => setQPhase('active'));
  }

  // ---- Renders ----
  if (phase === 'intro') {
    return (
      <div style={{padding:'4px 0'}}>
        <div style={{background:'linear-gradient(135deg,#1565c0,#0d47a1)', borderRadius:16, padding:'20px 16px', marginBottom:16, color:'white', textAlign:'center'}}>
          <div style={{fontSize:28, marginBottom:6}}>⚡</div>
          <div style={{fontWeight:'bold', fontSize:18, marginBottom:4}}><ruby>瞬間判断<rt>しゅんかんはんだん</rt></ruby>クイズ</div>
          <div style={{fontSize:12, opacity:0.9, lineHeight:1.7}}>
            もんだいを<ruby>読<rt>よ</rt></ruby>み<ruby>上<rt>あ</rt></ruby>げるので、よく<ruby>聞<rt>き</rt></ruby>いてから<ruby>答<rt>こた</rt></ruby>えよう！
          </div>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:10, marginBottom:16}}>
          {[
            ['🔊', '問題を読み上げます。聞きながら準備しよう！'],
            ['🟢', '「用意、スタート！」でカウントダウン開始'],
            ['⏱', '5秒以内にタップして答えよう'],
            ['🔴', '赤い丸がランナーの位置だよ'],
          ].map(([em, txt]) => (
            <div key={em} style={{display:'flex', alignItems:'center', gap:10, background:'#e3f2fd', borderRadius:10, padding:'10px 12px'}}>
              <span style={{fontSize:18, flexShrink:0}}>{em}</span>
              <span style={{fontSize:12, color:'#1565c0'}}>{txt}</span>
            </div>
          ))}
        </div>
        <div style={{background:'#fff3e0', borderRadius:10, padding:'10px 12px', marginBottom:16, fontSize:12, color:'#e65100'}}>
          ※ 音量をオンにしてからスタートしよう！全{situations.length}問チャレンジ。
        </div>
        <button onClick={startQuiz}
          style={{width:'100%', padding:'16px', background:'linear-gradient(135deg,#1565c0,#0d47a1)', border:'none',
                  borderRadius:14, color:'white', fontWeight:'bold', fontSize:17, cursor:'pointer',
                  boxShadow:'0 4px 12px rgba(21,101,192,0.4)'}}>
          🔊 スタート！
        </button>
      </div>
    );
  }

  if (phase === 'q') {
    const isSpeaking = qPhase === 'speaking';
    const isActive   = qPhase === 'active';
    return (
      <div style={{padding:'4px 0'}}>
        {/* Header */}
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}>
          <div style={{flex:1, background:'#e0e0e0', borderRadius:10, height:8}}>
            <div style={{width:`${((qIdx+1)/shuffled.length)*100}%`, background:'#1565c0', height:8, borderRadius:10, transition:'width 0.3s'}} />
          </div>
          <span style={{fontSize:12, color:'#888', fontWeight:'bold', flexShrink:0}}>{qIdx+1}/{shuffled.length}</span>
          {isSpeaking && (
            <div style={{display:'flex', alignItems:'center', gap:4, background:'#e3f2fd', borderRadius:20, padding:'4px 10px', flexShrink:0}}>
              <span style={{fontSize:14}}>🔊</span>
              <span style={{fontSize:11, color:'#1565c0', fontWeight:'bold'}}>よんでいます…</span>
            </div>
          )}
          {isActive && <CountdownCircle timeLeft={timeLeft} total={5} />}
          {answered && <div style={{fontSize:24}}>{isCorrect ? '⭕' : '❌'}</div>}
        </div>

        {/* Reading indicator bar */}
        {isSpeaking && (
          <div style={{background:'linear-gradient(135deg,#e3f2fd,#bbdefb)', borderRadius:12, padding:'10px 14px', marginBottom:10,
                       display:'flex', alignItems:'center', gap:8, border:'1.5px solid #90caf9'}}>
            <span style={{fontSize:20}}>🔊</span>
            <div>
              <div style={{fontWeight:'bold', fontSize:13, color:'#1565c0'}}>もんだいを読み上げています…</div>
              <div style={{fontSize:11, color:'#555', marginTop:2}}>聞きながら準備しよう！「用意、スタート！」でカウント開始</div>
            </div>
          </div>
        )}

        {/* "Ready Go!" indicator */}
        {isActive && !answered && (
          <div style={{background:'linear-gradient(135deg,#e8f5e9,#c8e6c9)', borderRadius:12, padding:'8px 14px', marginBottom:10,
                       textAlign:'center', border:'1.5px solid #66bb6a'}}>
            <span style={{fontWeight:'bold', fontSize:13, color:'#2e7d32'}}>⚡ 用意、スタート！ — 答えをタップしよう！</span>
          </div>
        )}

        {/* Field SVG */}
        <div style={{background:'white', borderRadius:14, padding:'10px', marginBottom:10, boxShadow:'0 1px 6px rgba(0,0,0,0.08)'}}>
          <DefenseField runners={q.runners} highlight={q.highlight} showHighlight={answered} />
          <div style={{display:'flex', justifyContent:'center', alignItems:'center', gap:8, marginTop:6, flexWrap:'wrap'}}>
            <div style={{display:'flex', gap:4}}>
              {[0,1,2].map(i=>(
                <div key={i} style={{width:16, height:16, borderRadius:'50%',
                  background: i < q.outs ? '#ef5350' : 'transparent',
                  border:'2px solid ' + (i < q.outs ? '#ef5350' : '#ccc')}} />
              ))}
            </div>
            <span style={{fontSize:11, color:'#666'}}>{q.outs}アウト</span>
            {q.runners.length > 0
              ? <span style={{fontSize:11, color:'#ef5350', fontWeight:'bold'}}>
                  🔴 ランナー{q.runners.map(r=>['','1塁','2塁','3塁'][r]).join('・')}
                </span>
              : <span style={{fontSize:11, color:'#888'}}>ランナーなし</span>
            }
          </div>
        </div>

        {/* Situation text */}
        <div style={{background:'#e3f2fd', borderRadius:12, padding:'10px 14px', marginBottom:10,
                     fontSize:13, color:'#0d47a1', fontWeight:'bold', lineHeight:1.8}}>
          <Furi t={q.situation} />
        </div>

        {/* Question */}
        <div style={{fontWeight:'bold', fontSize:15, color:'#1a237e', marginBottom:12, textAlign:'center', lineHeight:1.6}}>
          <Furi t={q.question} />
        </div>

        {/* Choices — visible always, tappable only during 'active' */}
        <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:10}}>
          {q.choices.map((c, i) => {
            let bg = 'white', border = '2px solid #e0e0e0', color = '#333', opacity = 1;
            if (isSpeaking) { bg = '#f5f5f5'; color = '#aaa'; opacity = 0.7; }
            if (answered) {
              if (i === q.ans) { bg = '#e8f5e9'; border = '2px solid #2e7d32'; color = '#2e7d32'; opacity = 1; }
              else if (i === selected) { bg = '#ffebee'; border = '2px solid #c62828'; color = '#c62828'; opacity = 1; }
              else { opacity = 0.5; }
            }
            return (
              <button key={i}
                onClick={() => handleAnswer(i)}
                disabled={isSpeaking || answered}
                style={{padding:'13px 14px', borderRadius:12, background:bg, border, color, opacity,
                        fontWeight:'bold', fontSize:13,
                        cursor: isSpeaking || answered ? 'default' : 'pointer',
                        textAlign:'left', transition:'all 0.15s'}}>
                {String.fromCharCode(65+i)}. <Furi t={c} />
              </button>
            );
          })}
        </div>

        {/* Time out */}
        {timedOut && (
          <div style={{textAlign:'center', color:'#c62828', fontWeight:'bold', fontSize:13, marginBottom:8}}>
            ⏱ 時間切れ！ こたえは「<Furi t={q.choices[q.ans]} />」だよ
          </div>
        )}

        {/* Explanation */}
        {answered && (
          <div style={{background:'#fffde7', borderRadius:10, padding:'10px 12px', marginBottom:10,
                       fontSize:12, color:'#f57f17', lineHeight:1.8}}>
            💡 <Furi t={q.explanation} />
          </div>
        )}

        {/* Next button */}
        {answered && (
          <button onClick={nextQ}
            style={{width:'100%', padding:'13px', background:'linear-gradient(135deg,#1565c0,#0d47a1)',
                    border:'none', borderRadius:14, color:'white', fontWeight:'bold', fontSize:15, cursor:'pointer'}}>
            {qIdx + 1 < shuffled.length ? 'つぎへ →' : 'けっかをみる →'}
          </button>
        )}
      </div>
    );
  }

  if (phase === 'result') {
    const total = shuffled.length;
    const allCorrect = scores.every(Boolean) && scores.length === total;
    return (
      <div style={{textAlign:'center', padding:'4px 0'}}>
        <div style={{fontSize:52, marginBottom:8}}>{allCorrect ? '🎉' : correct >= Math.ceil(total/2) ? '⭐' : '😢'}</div>
        <div style={{fontWeight:'bold', fontSize:22, color: correct >= Math.ceil(total/2) ? '#1565c0' : '#c62828', marginBottom:4}}>
          {allCorrect ? 'かんぺき！' : correct >= Math.ceil(total/2) ? 'よくできました！' : 'もういちど！'}
        </div>
        <div style={{fontSize:15, color:'#555', marginBottom:20}}>
          {total}もんちゅう <span style={{fontWeight:'bold', fontSize:24, color:'#1565c0'}}>{correct}</span>もんせいかい
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          <button onClick={startQuiz}
            style={{padding:'14px', background:'linear-gradient(135deg,#1565c0,#0d47a1)',
                    border:'none', borderRadius:14, color:'white', fontWeight:'bold', fontSize:15, cursor:'pointer'}}>
            🔄 もういちどチャレンジ！
          </button>
          <button onClick={onBack}
            style={{padding:'14px', background:'linear-gradient(135deg,#546e7a,#37474f)',
                    border:'none', borderRadius:14, color:'white', fontWeight:'bold', fontSize:15, cursor:'pointer'}}>
            ← もどる
          </button>
        </div>
      </div>
    );
  }

  return null;
}

  const [view, setView] = React.useState('top'); // 'top' | 'kiso' | 'test' | 'homework'
  // diffFilterをQuizTabレベルで管理（KisoSection remount時もリセットしない）
  const [kisoDiffFilter, setKisoDiffFilter] = React.useState('easy');
  // KisoSectionの内部ビュー状態をQuizTabレベルで管理（ヘッダーの「もどる」で制御するため）
  const [kisoView, setKisoView] = React.useState('list'); // 'list'|'reading'|'quiz'|'result'
  const homeworkDoneToday = (homeworkBonus[today] || 0) > 0;

  // kiso内部ビューの変化をAppに通知（チュートリアルバナー制御用）
  React.useEffect(() => {
    if (!onViewStateChange) return;
    if (view !== 'kiso') { onViewStateChange(null); return; }
    if (kisoView === 'list' || kisoView === 'result') { onViewStateChange('list'); }
    else { onViewStateChange('active'); } // reading/quiz中はバナーを非表示

      else if (kisoView === 'reading') { setKisoView('list'); }

      setQuestions(shuffled);
      setCurrent(0);
      setLocalCorrect(0);
      setSelectedAns(null);
      setLocalAnswered(false);
      setPhase('testing');
      playQuizSound();
    }

    function handleSelectAns(idx) {
      if (localAnswered) return;
      setSelectedAns(idx);
      setLocalAnswered(true);
      if (idx === questions[current].answer) {
        setLocalCorrect(c => c + 1);
        playSound('quiz_correct.mp3', 1.0);
      } else {
        playSound('quiz_wrong.mp3', 1.0);
      }
    }

    function handleNext() {
      if (current + 1 >= questions.length) { setPhase('result'); return; }
      setCurrent(c => c + 1);
      setSelectedAns(null);
      setLocalAnswered(false);
      playQuizSound();
    }

    function handleCollect() {
      const cfg = QUIZ_DIFFICULTY_CONFIG[selectedDiff];
      const isPerfect = localCorrect === QUIZ_SIZE;
      const earnedPts = localCorrect * cfg.ptsPerQ + (isPerfect ? cfg.perfectBonus : 0);
      if (earnedPts > 0) onQuizComplete(earnedPts, selectedDiff, isPerfect);
      setPhase('select');
      setSelectedDiff(null);
    }

    // --- PHASE: SELECT ---
    if (phase === 'select') {
      return (
        <>
          <div style={{background:'white', borderRadius:14, padding:'18px 20px', border:'1.5px solid #e8eaf6', marginBottom:16, boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
            <div style={{fontWeight:'bold', fontSize:14, color:'#1a237e', marginBottom:10}}>📝 <ruby>難易度<rt>なんいど</rt></ruby>を<ruby>選<rt>えら</rt></ruby>んでね</div>
            <div style={{fontSize:12, color:'#555', lineHeight:1.8, marginBottom:12}}>
              • 10<ruby>問<rt>もん</rt></ruby>の<ruby>テスト<rt>てすと</rt></ruby>だよ<br/>
              • <ruby>難<rt>むずか</rt></ruby>しいほど<ruby>獲得<rt>かくとく</rt></ruby>ポイントが<ruby>高<rt>たか</rt></ruby>くなるよ<br/>
              • 1<ruby>日<rt>にち</rt></ruby>{QUIZ_DAILY_GOAL}<ruby>回<rt>かい</rt></ruby><ruby>達成<rt>たっせい</rt></ruby>で<ruby>今日<rt>きょう</rt></ruby>の<ruby>目標<rt>もくひょう</rt></ruby>クリア！（1<ruby>日<rt>にち</rt></ruby>の<ruby>上限<rt>じょうげん</rt></ruby>{QUIZ_DAILY_CAP}pt）
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:10}}>
              {Object.entries(QUIZ_DIFFICULTY_CONFIG).map(([key, cfg]) => {
                const doneCount = doneTodayList.filter(d => (typeof d === 'string' ? d : d.diff) === key).length;
                return (
                  <button key={key}
                    onClick={() => startTest(key)}
                    style={{
                      padding:'14px 18px', borderRadius:12, border:`2px solid ${cfg.color}`,
                      background: cfg.bg,
                      cursor: 'pointer',
                      display:'flex', alignItems:'center', justifyContent:'space-between',
                      transition:'all 0.15s',
                    }}
                  >
                    <div style={{textAlign:'left'}}>
                      <div style={{fontWeight:'bold', fontSize:15, color:cfg.color}}>
                        {cfg.emoji} {cfg.label}
                      </div>
                      <div style={{fontSize:11, color:'#888', marginTop:2}}>{cfg.desc}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      {doneCount > 0 && (
                        <div style={{fontSize:11, color:'#43a047', marginBottom:3}}>✅ {doneCount}<ruby>回<rt>かい</rt></ruby><ruby>完了<rt>かんりょう</rt></ruby></div>
                      )}
                      <div style={{fontWeight:'bold', color:cfg.color, fontSize:13}}><ruby>最大<rt>さいだい</rt></ruby>{cfg.maxPts}pt</div>
                      <div style={{fontSize:10, color:'#aaa'}}>1<ruby>問<rt>もん</rt></ruby>{cfg.ptsPerQ}pt{cfg.perfectBonus>0?` + まんてんボーナス${cfg.perfectBonus}pt`:''}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </>
      );
    }

    // --- PHASE: RESULT ---
    if (phase === 'result') {
      const cfg = QUIZ_DIFFICULTY_CONFIG[selectedDiff];
      const earnedPts = localCorrect * cfg.ptsPerQ + (localCorrect === QUIZ_SIZE ? cfg.perfectBonus : 0);
      const msg = localCorrect === QUIZ_SIZE ? '🏆 まんてん！すごい！' :
                  localCorrect >= 8 ? '🌟 よくできました！' :
                  localCorrect >= 6 ? '👍 いい<ruby>感<rt>かん</rt></ruby>じ！' : '📖 もう<ruby>一度<rt>いちど</rt></ruby><ruby>基礎<rt>きそ</rt></ruby>を<ruby>読<rt>よ</rt></ruby>もう！';
      return (
        <div className="quiz-result">
          <div style={{fontSize:13, color:'#888', marginBottom:4}}>{cfg.emoji} {cfg.label}</div>
          <div className="quiz-result-score">{localCorrect}<span style={{fontSize:32,color:'#aaa'}}>/{QUIZ_SIZE}</span></div>
          <div className="quiz-result-label"><ruby>正解<rt>せいかい</rt></ruby><ruby>数<rt>すう</rt></ruby></div>
          <div className="quiz-result-msg" dangerouslySetInnerHTML={{__html:msg}} />
          <div className="quiz-result-pts">+{earnedPts}pt</div>
          <div className="quiz-result-pts-label">
            ({localCorrect}<ruby>問<rt>もん</rt></ruby>×{cfg.ptsPerQ}pt{localCorrect===QUIZ_SIZE?` + まんてんボーナス${cfg.perfectBonus}pt`:''})
          </div>
          <button className="quiz-start-btn" style={{marginBottom:12}} onClick={handleCollect}>
            <i className="fa-solid fa-check" /> ポイントをうけとる
          </button>
          <button className="quiz-retry-btn" onClick={()=>startTest(selectedDiff)}>
            もう<ruby>一度<rt>いちど</rt></ruby>チャレンジ
          </button>
        </div>
      );
    }

    // --- PHASE: TESTING ---
    const q = questions[current];
    if (!q) return null;
    const pct = (current / QUIZ_SIZE) * 100;
    const cfg = QUIZ_DIFFICULTY_CONFIG[selectedDiff];
    return (
      <div className="quiz-q-wrap">
        <div className="quiz-progress">{cfg.emoji} {cfg.label}　<ruby>問題<rt>もんだい</rt></ruby> {current+1} / {QUIZ_SIZE}</div>

        <div className="quiz-choices">
          {q.choices.map((c,i)=>{

  const doneTodayList = ((quizDone || {})[today] || []);

                  </div>
                </div>
                <div style={{fontSize:13, color:'#888', textAlign:'center', marginBottom:16}}>
                  <Furi t="{保護者|ほごしゃ}の{方|かた}へ：{宿題|しゅくだい}の{完了|かんりょう}を{確認|かくにん}してPINコードを{入力|にゅうりょく}してください" />
                </div>
                <button
                  onClick={onHomeworkComplete}
                  style={{
                    width:'100%', padding:'18px',
                    background:'linear-gradient(135deg, #1b5e20, #388e3c)',
                    color:'white', border:'none', borderRadius:16,
                    fontSize:18, fontWeight:'bold', cursor:'pointer',
                    boxShadow:'0 4px 16px rgba(27,94,32,0.3)',
                    display:'flex', alignItems:'center', justifyContent:'center', gap:10,
                  }}
                >
                  <i className="fa-solid fa-circle-check" />

                </button>
              </>
            )}
          </div>

          {/* 連続記録 */}
          {(() => {
            let streak = 0;
            const dt = new Date(today);
            while (true) {
              const k = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
              if (!(homeworkBonus[k] > 0)) break;
              streak++;
              dt.setDate(dt.getDate() - 1);
            }
            if (streak < 2) return null;
            return (
              <div style={{marginTop:14, background:'#fff8e1', borderRadius:14, padding:'14px 18px', border:'1.5px solid #ffe082', display:'flex', alignItems:'center', gap:12}}>
                <div style={{fontSize:28}}>🔥</div>
                <div>
                  <div style={{fontWeight:'bold', fontSize:15, color:'#e65100'}}>{streak}日連続で宿題完了！</div>
                  <div style={{fontSize:12, color:'#888', marginTop:2}}>この調子で続けよう！</div>
                </div>
              </div>
            );
          })()}
        </>
      )}
    </>
  );
}

// ===== プロフィールタブ =====
function ProfileTab({ data, streak, totalStats, onNavigateToCard }) {
  const stampDays   = Object.keys(data.stamps || {}).filter(k => data.stamps[k]).length;
  const totalDays   = Object.keys(data.records || {})
    .filter(k => Object.values(data.records[k]).some(v => v > 0)).length;
  const level       = Math.floor(stampDays / 5) + 1;
  const levelInCur  = stampDays % 5; // 現レベル内の進捗（0〜4）
  const levelPct    = (levelInCur / 5) * 100;
  const titles      = [[0,'野球少年'],[5,'練習生'],[15,'一塁手'],[30,'スターター'],[60,'レギュラー'],[100,'主力選手'],[200,'キャプテン']];
  const title       = [...titles].reverse().find(([min]) => stampDays >= min)?.[1] || '野球少年';
  const nextTitle   = titles.find(([min]) => min > stampDays);
  const toNextTitle = nextTitle ? nextTitle[0] - stampDays : 0;

  const topMenus = MENUS
    .map(m => ({ ...m, val: totalStats[m.id] || 0 }))
    .filter(m => m.val > 0)
    .sort((a, b) => b.val - a.val)
    .slice(0, 8);
  const maxVal = topMenus[0]?.val || 1;
  const barColors = ['#3f51b5','#7b1fa2','#c62828','#2e7d32','#e65100','#1565c0','#880e4f','#00695c'];

  return (
    <>
      <div className="page-header"><h2>プロフィール</h2></div>
      <div className="profile-hero" style={{flexDirection:'column', alignItems:'stretch', gap:0, padding:'24px 24px 20px'}}>
        {/* レベル・称号 */}
        <div style={{display:'flex', alignItems:'baseline', gap:10, marginBottom:4}}>
          <span style={{fontSize:32, fontWeight:900, letterSpacing:1}}>Lv.{level}</span>
          <span style={{fontSize:18, fontWeight:700, opacity:0.9}}>「{title}」</span>
        </div>
        {/* 進捗バー */}
        <div style={{marginTop:10, marginBottom:6}}>
          <div style={{background:'rgba(255,255,255,0.22)', borderRadius:8, height:12, overflow:'hidden', width:'100%'}}>
            <div style={{height:'100%', width: levelPct+'%', background:'linear-gradient(90deg,#ffd54f,#ffb300)',
              borderRadius:8, transition:'width 0.5s ease',
              boxShadow:'0 1px 6px rgba(255,179,0,0.5)'}} />
          </div>
        </div>
        {/* バー下テキスト */}
        <div style={{display:'flex', justifyContent:'space-between', fontSize:12, opacity:0.75}}>
          <span>このレベルで {levelInCur} / 5 日</span>
          {nextTitle
            ? <span>「{nextTitle[1]}」まであと {toNextTitle} 日</span>
            : <span>🏆 最高ランク到達！</span>}
        </div>
        {/* スタンプ日数サマリー */}
        <div style={{marginTop:12, fontSize:12, opacity:0.65, textAlign:'center'}}>
          累計 {stampDays} 日練習してスタンプを押した
        </div>
      </div>

      <div className="profile-stats-row">
        {[
          { num: totalDays,       label: '総練習日数' },
          { num: streak,          label: '現在の連続日数' },
          { num: stampDays,       label: '総スタンプ日数' },
        ].map(s => (
          <div key={s.label} className="stat-pill">
            <div className="stat-pill-num">{s.num}</div>
            <div className="stat-pill-label">{s.label}</div>
          </div>
        ))}
      </div>

      {topMenus.length > 0 ? (
        <div className="chart-section">
          <div className="chart-title"><i className="fa-solid fa-chart-bar" /> 練習量ランキング</div>
          {topMenus.map((m, i) => (
            <div key={m.id} className="chart-row">
              <div className="chart-label">
                <span><MenuIcon icon={m.icon} size={14} /> {m.name}</span>
                <span className="chart-label-val">{m.val}{m.unit}</span>
              </div>
              <div className="chart-bar-bg">
                <div className="chart-bar"
                  style={{width:`${(m.val/maxVal)*100}%`, background: barColors[i]}}>
                  {i===0 ? '👑' : ''}
                </div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div className="chart-section">
          <div className="empty-hint">
            <div>⚾</div>
            練習を記録するとここにグラフが表示されます
          </div>
        </div>
      )}

      {/* 獲得選手一覧 */}
      {(() => {
        const rarityOrder = { UR:4, SSR:3, SR:2, R:1, N:0 };
        const ownedList = (data.ownedCards || []).map(key => {
          const player = getPlayerById(key);
          return player || null;
        }).filter(Boolean).sort((a, b) =>
          (rarityOrder[b.rarity]||0) - (rarityOrder[a.rarity]||0) ||
          a.last.localeCompare(b.last)
        );

        return (
          <div className="owned-cards-section">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
              <div className="section-title" style={{marginBottom:0}}>🃏 獲得選手一覧</div>
              <span style={{fontSize:13, color:'#888'}}>{ownedList.length} 名</span>
            </div>
            {ownedList.length === 0 ? (
              <div className="owned-cards-empty">
                <div className="owned-cards-empty-icon">🃏</div>
                まだ選手を獲得していません
              </div>
            ) : (
              <div style={{borderRadius:12, overflow:'hidden', border:'1.5px solid #e8eaf6'}}>
                {ownedList.map((player, i) => {
                  const rc = RARITY_CONFIG[player.rarity] || {};
                  const posInfo = POSITION_CONFIG[player.pos] || {};
                  const isLast = i === ownedList.length - 1;
                  return (
                    <button
                      key={player.id}
                      onClick={() => onNavigateToCard(player.id)}
                      style={{
                        display: 'flex', alignItems: 'center', width: '100%',
                        padding: '12px 16px',
                        borderBottom: isLast ? 'none' : '1px solid #f0f0f5',
                        background: 'white', border: 'none',
                        cursor: 'pointer', textAlign: 'left',
                        transition: 'background 0.1s',
                      }}
                      onMouseEnter={e => e.currentTarget.style.background='#f5f6ff'}
                      onMouseLeave={e => e.currentTarget.style.background='white'}
                      onTouchStart={e => e.currentTarget.style.background='#f5f6ff'}
                      onTouchEnd={e => e.currentTarget.style.background='white'}
                    >
                      {/* ポジション絵文字 */}
                      <span style={{fontSize:20, marginRight:12, flexShrink:0}}>{posInfo.emoji}</span>
                      {/* 名称 */}
                      <span style={{flex:1, display:'flex', flexDirection:'column', gap:1}}>
                        <span style={{fontSize:14, fontWeight:900, color:'#1a237e'}}>
                          <ruby>{player.last}<rt style={{fontSize:9, fontWeight:400}}>{player.lastKana}</rt></ruby>
                          <span style={{marginLeft:4, fontSize:13}}>{player.first}</span>
                        </span>
                        <span style={{fontSize:11, color:'#666', fontWeight:600}}>{posInfo.label}</span>
                      </span>
                      {/* レアリティバッジ */}
                      <span className={`rarity-badge rarity-badge-${player.rarity}`} style={{marginRight:10, flexShrink:0}}>{player.rarity}</span>
                      {/* 矢印 */}
                      <i className="fa-solid fa-chevron-right" style={{fontSize:12, color:'#ccc', flexShrink:0}} />
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
