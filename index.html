// ===== メインアプリ =====
function App() {
  // スプラッシュ画面をフェードアウトして除去（React初回レンダー後）
  React.useEffect(() => {
    const splash = document.getElementById('splash');
    if (!splash) return;
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 450);
  }, []);

  const [tab, setTab]         = useState(() => window.innerWidth <= 768 ? 'home' : 'practice');
  const [data, setData]       = useState(loadData);
  const [modal, setModal]     = useState(null);
  const [inputVal, setInputVal] = useState('');
  const [stampAnim, setStampAnim]   = useState(null);  // 練習記録時のアニメ
  const [hankoAnim, setHankoAnim]   = useState(false); // スタンプ帳のハンコアニメ
  const [celebration, setCelebration] = useState(null); // 練習完了演出 { menuName, menuEmoji, pts, totalToday }
  const [badgeQueue, setBadgeQueue]   = useState([]);   // バッジ通知キュー
  const [badgeNotify, setBadgeNotify] = useState(null); // 現在表示中のバッジ通知
  const [levelUpNotify, setLevelUpNotify] = useState(null); // レベルアップ通知 { level, title }
  const badgeTimerRef = useRef(null);
  const inputRef = useRef(null);
  const [pinModal, setPinModal] = useState(null); // { num, menu } | null
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState('');
  const [pendingCardDetail, setPendingCardDetail] = useState(null); // { lv, typeId } — プロフィールから特定カードを開く
  const [collectionView, setCollectionView] = useState('scout'); // 'scout' | 'shop' | 'mycards' | 'zukan'
  const [scoutResults, setScoutResults] = useState(null); // スカウト結果
  // 設定（リセット耐性あり・別localStorage キー）
  const [soundOn,       setSoundOn]       = useState(isSoundEnabled);
  const [playerName,    setPlayerNameSt]  = useState(getPlayerName);
  const [dailyTargets,  setDailyTargetsSt]= useState(getDailyTargets);
  // オンボーディング
  const [onboardingDone, setOnboardingDone] = useState(isOnboardingDone);
  // kiso内部ビュー状態（null=kiso外, 'list'=ポジション一覧, 'active'=読み/クイズ/結果中）
  const [kisoViewState, setKisoViewState] = React.useState(null);

  const today = todayStr();
  const todayRec = data.records[today] || {};
  const totalPracticed = MENUS.filter(m => (todayRec[m.id] || 0) > 0).length;

  // 今日の目標種目数（利用開始日から自動算出）
  const threshold     = getDailyThreshold(data.firstDate);
  // 今日スタンプが押せる状態かどうか
  const goalReached   = totalPracticed >= threshold;
  const stampedToday  = !!data.stamps[today];
  const canStampToday = goalReached && !stampedToday;

  function updateData(nd) { setData(nd); saveData(nd); }

  // 設定ハンドラ
  function handleSoundToggle() {
    const next = !soundOn;
    setSoundSetting(next);
    setSoundOn(next);
  }
  function handleNameSave(name) {
    savePlayerName(name);
    setPlayerNameSt(name.trim());
  }
  function handleTargetsChange(newTargets) {
    saveDailyTargets(newTargets);
    setDailyTargetsSt(newTargets);
  }
  function handleOnboardingComplete({ name, targets, grade }) {
    if (name) {
      savePlayerName(name);
      setPlayerNameSt(name);
    }
    if (targets && Object.keys(targets).length > 0) {
      saveDailyTargets(targets);
      setDailyTargetsSt(targets);
    }
    if (grade) saveGrade(grade);
    markOnboardingDone();
    setOnboardingDone(true);
    setTab('home');
    playSound('upgrade.mp3');
  }

  function openModal(menu) {
    setInputVal('');
    setModal(menu);
    setTimeout(() => inputRef.current?.focus(), 80);
    playSound('menu_select.mp3', 0.35);
  }

  // バッジ通知キュー処理
  React.useEffect(() => {
    if (badgeNotify !== null) return; // 表示中は待つ
    if (badgeQueue.length === 0) return;
    // 次のバッジを取り出して表示
    const [next, ...rest] = badgeQueue;
    setBadgeQueue(rest);
    setBadgeNotify(next);
    clearTimeout(badgeTimerRef.current);
    badgeTimerRef.current = setTimeout(() => {
      setBadgeNotify(null);
    }, 3000);
  }, [badgeNotify, badgeQueue]);

  // バッジ条件チェック（獲得済みに追加のみ。ポイント付与はバッジタブで手動）
  function checkAndAwardBadges(newData) {
    const earned = newData.earnedBadges || [];
    const newlyEarnable = [];
    for (const b of BADGES) {
      if (!earned.includes(b.id) && b.reqFn(newData)) {
        newlyEarnable.push(b);
      }
    }
    if (newlyEarnable.length > 0) {
      const updated = { ...newData, earnedBadges: [...earned, ...newlyEarnable.map(b => b.id)] };
      updateData(updated);
      // キューに追加（表示中のものがあってもキューで順番待ち）
      setBadgeQueue(prev => [...prev, ...newlyEarnable]);
    } else {
      updateData(newData);
    }
  }

  // 練習記録の実際の保存処理（PINあり・なし両経路から呼ばれる）
  function doStamp(num, menu) {
    const newRec = { ...data.records };
    if (!newRec[today]) newRec[today] = {};
    newRec[today][menu.id] = (newRec[today][menu.id] || 0) + num;
    const newTotal = { ...data.totalStats };
    newTotal[menu.id] = (newTotal[menu.id] || 0) + num;
    let streak = data.streak;
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    const yStr = `${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
    if (data.lastDate === yStr || data.lastDate === today) {
      if (data.lastDate !== today) streak += 1;
    } else { streak = 1; }
    const firstDate = data.firstDate || today;
    const newData = { ...data, records: newRec, totalStats: newTotal, streak, lastDate: today, firstDate };
    checkAndAwardBadges(newData);
    playStampSound();
    setStampAnim(menu.icon);
    setModal(null);
    setPinModal(null);
    setPinInput('');
    setPinError('');
    setTimeout(() => setStampAnim(null), 900);
    // 練習完了演出：記録後に表示
    const newDayPts = Math.min(DAILY_POINT_CAP, calcDayPoints(newRec[today] || {}));
    const addedPts  = calcMenuPoints(menu.id, num);
    const menuEmoji = menu.icon.type === 'emoji' ? menu.icon.val : (menu.icon.type === 'fa' ? '⚾' : '⚾');
    setCelebration({ menuName: menu.name, menuEmoji, pts: addedPts, totalToday: newDayPts });
  }

  // 練習記録ボタン（閾値超えかつPIN設定済みならPINモーダルへ）
  function handleStamp() {
    const num = parseInt(inputVal, 10);
    if (!num || num <= 0) return;
    const thresh = APPROVAL_THRESHOLDS[modal.id];
    if (thresh && num > thresh && getPin()) {
      setPinModal({ num, menu: modal });
      setModal(null);
      return;
    }
    doStamp(num, modal);
  }

  // 宿題完了の保存（PINあり・なし両経路から呼ばれる）
  function doHomework() {
    const newHw = { ...(data.homeworkBonus || {}), [today]: 100 };
    const newData = { ...data, homeworkBonus: newHw };
    checkAndAwardBadges(newData);
    setPinModal(null);
    setPinInput('');
    setPinError('');
  }

  // 覚えようセクションクリア
  function handleKisoComplete({ diff, key, isPerfect }) {
    const nd = {...data};
    if(!nd.kisoProgress) nd.kisoProgress={};
    if(!nd.kisoProgress[diff]) nd.kisoProgress[diff]={};
    nd.kisoProgress[diff][key]='cleared';
    if(!nd.kisoBonusLog) nd.kisoBonusLog={};
    const lk=`${diff}.${key}`;
    if(!nd.kisoBonusLog[lk]) nd.kisoBonusLog[lk]={};
    if(!nd.kisoBonus) nd.kisoBonus={};
    let pts=0;
    if(!nd.kisoBonusLog[lk].base){ pts+=30; nd.kisoBonusLog[lk].base=true; }
    if(isPerfect && !nd.kisoBonusLog[lk].perfect){ pts+=50; nd.kisoBonusLog[lk].perfect=true; }
    if(pts>0) {
      const todayKiso = nd.kisoBonus[today] || 0;
      const capped = Math.max(0, Math.min(pts, KISO_DAILY_CAP - todayKiso));
      if(capped>0) nd.kisoBonus[today] = todayKiso + capped;
    }
    // checkAndAwardBadges calls updateData internally — do NOT call updateData separately
    checkAndAwardBadges(nd);
  }

  // 宿題完了ボタン（PIN設定済みならPINモーダルへ）
  function handleHomeworkComplete() {
    if (getPin()) {
      setPinModal({ type: 'homework' });
      return;
    }
    doHomework();
  }

  // PIN確認OK
  function handlePinConfirm() {
    if (pinInput !== getPin()) {
      setPinError('PINコードが違います');
      setPinInput('');
      return;
    }
    if (pinModal.type === 'homework') {
      doHomework();
    } else {
      doStamp(pinModal.num, pinModal.menu);
    }
  }

  // モーダルのやり直し（今日のそのメニューをリセット）
  function handleRetry() {
    const prev = todayRec[modal.id] || 0;
    if (prev <= 0) return;
    const newRec = { ...data.records };
    if (!newRec[today]) newRec[today] = {};
    newRec[today][modal.id] = 0;
    const newTotal = { ...data.totalStats };
    newTotal[modal.id] = Math.max(0, (newTotal[modal.id] || 0) - prev);
    updateData({ ...data, records: newRec, totalStats: newTotal });
    setInputVal('');
    setTimeout(() => inputRef.current?.focus(), 50);
  }

  // 全データリセット
  function handleReset() {
    const empty = { records:{}, totalStats:{}, streak:0, lastDate:null, firstDate:null, stamps:{}, ownedCards:[], cardUpgrades:{}, earnedBadges:[], claimedBadges:[], quizBonus:{}, quizDone:{} };
    updateData(empty);
    savePlayerName('');
    setPlayerNameSt('');
    // オンボーディングもリセット → また最初から案内する
    localStorage.removeItem(ONBOARDING_KEY);
    setOnboardingDone(false);
    setTab('home');
  }

  // スタンプ帳へのハンコを手動で押す
  function handlePressHanko() {
    const newStamps = { ...data.stamps, [today]: true };
    checkAndAwardBadges({ ...data, stamps: newStamps });
    playHankoSound();
    setHankoAnim(true);
    setTimeout(() => setHankoAnim(false), 700);
  }

  const earnedBadges = data.earnedBadges || [];
  const claimedBadges = data.claimedBadges || [];
  const badgeBonusPoints = BADGES.filter(b => claimedBadges.includes(b.id)).reduce((sum, b) => sum + b.bonus, 0);
  const unclaimedBadgeCount = earnedBadges.filter(id => !claimedBadges.includes(id)).length;
  const homeworkBonusTotal = Object.values(data.homeworkBonus || {}).reduce((s, v) => s + v, 0);
  const kisoBonusTotal = Object.values(data.kisoBonus || {}).reduce((s, v) => s + v, 0);
  const totalEarnedPoints = calcPracticeScore(data.records, data.quizBonus) + homeworkBonusTotal + kisoBonusTotal + badgeBonusPoints;
  const todayQuizBonus = (data.quizBonus || {})[today] || 0;
  const todayKisoBonus = (data.kisoBonus || {})[today] || 0;
  const todayPoints = Math.min(DAILY_POINT_CAP, calcDayPoints(todayRec) + todayQuizBonus);
  const spentPoints = (() => {
    // カード購入コスト
    const buyCost = (data.ownedCards || []).reduce((sum, key) => {
      // key format: "lv01_meet"
      const lvNum = parseInt(key.replace('lv','').split('_')[0]);
      return sum + (CARD_PURCHASE_COSTS[lvNum] || 0);
    }, 0);
    // 強化コスト
    const upgradeCost = Object.keys(data.cardUpgrades || {}).reduce((sum, key) => {
      return sum + calcUpgradeSpend(key, data.cardUpgrades);
    }, 0);
    return buyCost + upgradeCost + (data.scoutSpent || 0);
  })();
  const availablePoints = totalEarnedPoints - spentPoints;

  const nextBadge = (() => {
    const earned = data.earnedBadges || [];
    const candidates = BADGES
      .filter(b => !earned.includes(b.id) && b.target && b.getVal)
      .map(b => { const val = b.getVal(data); return { id:b.id, name:b.name, nameRuby:b.nameRuby, emoji:b.emoji, target:b.target, val, pct: val / b.target }; })
      .filter(b => b.pct < 1)
      .sort((a, b) => b.pct - a.pct);
    return candidates[0] || null;
  })();

  // ホームタブ用追加データ
  const quizDoneToday   = ((data.quizDone || {})[today] || []).length > 0;
  const ownedCardsCount = (data.ownedCards || []).length;
  // レベル計算：スタンプ日数ベース（1日練習してスタンプ押す = 1pt）
  // → 種類・回数に関係なく、毎日コツコツやった人が平等に成長できる設計
  const _stampDays   = Object.keys(data.stamps || {}).filter(k => data.stamps[k]).length;
  const profileLevel = Math.floor(_stampDays / 5) + 1; // 5日ごとに1レベルアップ
  const _TITLES = [[0,'野球少年'],[5,'練習生'],[15,'一塁手'],[30,'スターター'],[60,'レギュラー'],[100,'主力選手'],[200,'キャプテン']];
  const profileTitle    = [..._TITLES].reverse().find(([min]) => _stampDays >= min)?.[1] || '野球少年';
  const _nextTitle      = _TITLES.find(([min]) => min > _stampDays);
  const _curTitle       = [..._TITLES].reverse().find(([min]) => _stampDays >= min) || _TITLES[0];
  const profileProgress = _nextTitle
    ? { pct: Math.round((_stampDays - _curTitle[0]) / (_nextTitle[0] - _curTitle[0]) * 100),
        remaining: _nextTitle[0] - _stampDays, nextName: _nextTitle[1] }
    : { pct: 100, remaining: 0, nextName: null }; // キャプテン到達済み

  // レベルアップ検出（練習を記録するたびにprofileLevelが変わったか確認）
  React.useEffect(() => {
    const stored = parseInt(localStorage.getItem('baseball_app_last_level') || '1');
    if (profileLevel > stored) {
      setLevelUpNotify({ level: profileLevel, title: profileTitle });
      localStorage.setItem('baseball_app_last_level', String(profileLevel));
      playSound('upgrade.mp3');
      const t = setTimeout(() => setLevelUpNotify(null), 4000);
      return () => clearTimeout(t);
    } else {
      localStorage.setItem('baseball_app_last_level', String(profileLevel));
    }
  }, [profileLevel]);

  function handleQuizComplete(earnedPts, difficulty, isPerfect) {
    const currentBonus = (data.quizBonus || {})[today] || 0;
    const capped = Math.max(0, Math.min(earnedPts, QUIZ_DAILY_CAP - currentBonus));
    const newQuizBonus = { ...(data.quizBonus || {}), [today]: currentBonus + capped };
    const entry = { diff: difficulty, perfect: !!isPerfect };
    const newQuizDone = { ...(data.quizDone || {}), [today]: [...((data.quizDone || {})[today] || []), entry] };
    const newData = { ...data, quizBonus: newQuizBonus, quizDone: newQuizDone };
    checkAndAwardBadges(newData);
  }

  function isPlayerOwned(playerId) {
    return (data.ownedCards || []).includes(playerId);
  }
  // 後方互換（バッジ条件等で引き続き使用）
  function isCardOwned(lv, typeId) {
    return isPlayerOwned(cardKey(lv, typeId));
  }
  function handleBuyCard(lv, typeId) {
    const cost = CARD_PURCHASE_COSTS[lv] || 0;
    if (availablePoints < cost) return;
    const key = cardKey(lv, typeId);
    if ((data.ownedCards || []).includes(key)) return;
    const newOwned = [...(data.ownedCards || []), key];
    checkAndAwardBadges({ ...data, ownedCards: newOwned });
    playSound('get_card.mp3');
  }
  function handleScout(count) {
    const cost = count === 1 ? SCOUT_COST_SINGLE : SCOUT_COST_MULTI;
    if (availablePoints < cost) return;
    const results = [];
    for (let i = 0; i < count; i++) {
      // 10連のラスト1枚はSR以上確定
      const guaranteeSR = (count === 10 && i === count - 1);
      results.push(pickScoutCard(guaranteeSR));
    }
    const prevOwned = data.ownedCards || [];
    const newOwned = [...prevOwned];
    results.forEach(r => {
      if (!newOwned.includes(r.key)) newOwned.push(r.key);
    });
    // 重複分のコイン計算
    const dupCount = results.filter(r => prevOwned.includes(r.key)).length;
    const earnedCoins = dupCount * SCOUT_COIN_PER_DUP;
    const newData = {
      ...data,
      ownedCards: newOwned,
      scoutSpent:  (data.scoutSpent  || 0) + cost,
      scoutCoins:  (data.scoutCoins  || 0) + earnedCoins,
    };
    saveData(newData);
    setData(newData);
    checkAndAwardBadges(newData);
    // 結果にisNew情報を付加
    const resultsWithNew = results.map(r => ({
      ...r,
      isNew: !prevOwned.includes(r.key),
    }));
    setScoutResults(resultsWithNew);
  }
  function handleCoinExchange() {
    if ((data.scoutCoins || 0) < SCOUT_COINS_FOR_SR) return;
    const result = pickScoutCard(true); // SR以上確定
    const prevOwned = data.ownedCards || [];
    const newOwned = [...prevOwned];
    const isNew = !newOwned.includes(result.key);
    if (isNew) newOwned.push(result.key);
    // 重複の場合はコインの半額を返還
    const coinReturn = isNew ? 0 : Math.floor(SCOUT_COIN_PER_DUP / 2);
    const newData = {
      ...data,
      ownedCards:  newOwned,
      scoutCoins:  (data.scoutCoins || 0) - SCOUT_COINS_FOR_SR + coinReturn,
    };
    saveData(newData);
    setData(newData);
    checkAndAwardBadges(newData);
    setScoutResults([{ ...result, isNew }]);
  }
  function handleUpgradeStat(playerId, stat) {
    const player = getPlayerById(playerId);
    const base = CARD_BASE_STATS[playerId] || (player && player.stats);
    if (!base) return;
    const upgrades = data.cardUpgrades || {};
    const current = upgrades[playerId] || { ...base };
    const curRankIdx = rankIdx(current[stat]);
    if (curRankIdx >= STAT_RANKS.length - 1) return; // already S
    const cost = UPGRADE_COSTS[curRankIdx];
    if (availablePoints < cost) return;
    const newStat = STAT_RANKS[curRankIdx + 1];
    const newCurrent = { ...current, [stat]: newStat };
    const newUpgrades = { ...upgrades, [playerId]: newCurrent };
    checkAndAwardBadges({ ...data, cardUpgrades: newUpgrades });
    playSound('upgrade.mp3');
  }

  // バッジ手動受け取り
  function handleClaimBadge(badgeId) {
    const badge = BADGES.find(b => b.id === badgeId);
    if (!badge) return;
    const claimed = data.claimedBadges || [];
    if (claimed.includes(badgeId)) return;
    const earned = data.earnedBadges || [];
    if (!earned.includes(badgeId)) return;
    const newClaimed = [...claimed, badgeId];
    // ポイントはbadgeBonusPointsで自動計算されるのでデータ保存のみ
    const newData = { ...data, claimedBadges: newClaimed };
    // 受け取りで新バッジ条件が満たされる場合もあるのでcheckを通す
    checkAndAwardBadges(newData);
    playSound('get_card.mp3');
  }

  const navItems = [
    { id:'home',       icon:'fa-house',          labelStr:'ホーム',     labelRuby:'ホーム' },
    { id:'practice',   icon:'fa-dumbbell',       labelStr:'練習',       labelRuby:'{練習|れんしゅう}' },
    { id:'quiz',       icon:'fa-graduation-cap', labelStr:'学習',       labelRuby:'{学習|がくしゅう}' },
    { id:'stamp',      icon:'fa-calendar',       labelStr:'スタンプ帳', labelRuby:'スタンプ{帳|ちょう}' },
    { id:'collection', icon:'fa-id-card',        labelStr:'選手カード', labelRuby:'{選手|せんしゅ}カード' },
    { id:'badge',      icon:'fa-medal',          labelStr:'バッジ',     labelRuby:'バッジ' },
    { id:'profile',    icon:'fa-chart-bar',      labelStr:'プロフィール', labelRuby:'プロフィール' },
  ];

  return (
    <div className="app">
      {/* オンボーディング（初回起動時のみ）*/}
      {!onboardingDone && (
        <OnboardingModal onComplete={handleOnboardingComplete} />
      )}

      {/* バッジ獲得通知 */}
      {badgeNotify && (
        <div className="badge-notify">
          <div className="badge-notify-emoji">{badgeNotify.emoji}</div>
          <div style={{flex:1}}>
            <div className="badge-notify-text-title">🎉 バッジ解放！</div>
            <div className="badge-notify-text-name">{badgeNotify.name}</div>
            <div className="badge-notify-text-bonus">バッジアイコンから受け取れます！</div>
          </div>
          {badgeQueue.length > 0 && (
            <div style={{
              background:'rgba(255,255,255,0.2)', borderRadius:10,
              padding:'2px 7px', fontSize:11, fontWeight:'bold',
              color:'white', flexShrink:0, alignSelf:'flex-start',
            }}>+{badgeQueue.length}</div>
          )}
        </div>
      )}

      {/* レベルアップ通知 */}
      {levelUpNotify && (
        <div className="level-up-notify">
          <div style={{fontSize:38, animation:'emojiPop 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.2s both'}}>⬆️</div>
          <div style={{flex:1}}>
            <div style={{fontSize:11, opacity:0.9, fontWeight:'bold', letterSpacing:'0.04em'}}>レベルアップ！</div>
            <div style={{fontSize:20, fontWeight:'bold'}}>Lv.{levelUpNotify.level}</div>
            <div style={{fontSize:12, color:'#b3e5fc', marginTop:2}}>「{levelUpNotify.title}」になった！</div>
          </div>
        </div>
      )}

      {/* 練習記録アニメーション */}
      {stampAnim && (
        <div className="stamp-anim">
          <div className="stamp-anim-inner">
            <MenuIcon icon={stampAnim} size={100} />
          </div>
        </div>
      )}
      {/* ハンコアニメーション */}
      {hankoAnim && (
        <div className="hanko-stamp-overlay">
          <div className="hanko-stamp-inner"><HankoSeal size="lg" /></div>
        </div>
      )}

      {/* モーダル */}
      {modal && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-icon-wrap">
              <MenuIcon icon={modal.icon} size={48} color="#3f51b5" />
            </div>
            <div className="modal-title">{modal.name}</div>
            {modal.desc && (
              <div style={{fontSize:12, color:'#888', marginBottom:6, lineHeight:1.5,
                padding:'0 4px', textAlign:'left'}}>{modal.desc}</div>
            )}
            <div className="modal-hint">{modal.hint}</div>
            {(todayRec[modal.id] || 0) > 0 && (
              <div className="modal-current-val">
                今日の記録：<span>{todayRec[modal.id]}{modal.unit}</span>
              </div>
            )}
            <div className="modal-input-row">
              <input
                ref={inputRef}
                type="number" min="1"
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleStamp()}
                placeholder="0"
              />
              <span className="modal-unit">{modal.unit}</span>
            </div>
            <button
              className="stamp-btn"
              onClick={handleStamp}
              disabled={!inputVal || parseInt(inputVal) <= 0}
            >
              <i className="fa-solid fa-stamp" /> スタンプを押す！
            </button>
            {(todayRec[modal.id] || 0) > 0 && (
              <button className="retry-btn" onClick={handleRetry}>
                <i className="fa-solid fa-rotate-left" /> やり直し
              </button>
            )}
          </div>
        </div>
      )}

      {/* 保護者承認PINモーダル */}
      {pinModal && (
        <div className="pin-modal-overlay">
          <div className="pin-modal">
            <div className="pin-modal-icon">🔐</div>
            <div className="pin-modal-title">おうちの人に確認してもらおう！</div>
            <div className="pin-modal-desc">
              {pinModal.type === 'homework' ? (
                <>
                  <strong>宿題完了（100pt）</strong>を記録しようとしています。<br />
                  本当に宿題が終わりましたか？<br />
                  保護者のPINコードを入力してください。
                </>
              ) : (
                <>
                  <strong>{pinModal.menu.name} {pinModal.num}{pinModal.menu.unit}</strong>を記録しようとしています。<br />
                  保護者のPINコードを入力してください。
                </>
              )}
            </div>
            <input
              className="pin-modal-input"
              type="password"
              maxLength={4}
              inputMode="numeric"
              value={pinInput}
              placeholder="••••"
              onChange={e => { setPinInput(e.target.value.replace(/\D/g, '')); setPinError(''); }}
              onKeyDown={e => e.key === 'Enter' && pinInput.length === 4 && handlePinConfirm()}
              autoFocus
            />
            {pinError && <div className="pin-modal-error">⚠️ {pinError}</div>}
            <div className="pin-modal-btns">
              <button
                className="pin-modal-cancel"
                onClick={() => {
                  setPinModal(null); setPinInput(''); setPinError('');
                  setModal(pinModal.menu); setInputVal(String(pinModal.num));
                }}
              >もどる</button>
              <button
                className="pin-modal-ok"
                disabled={pinInput.length !== 4}
                onClick={handlePinConfirm}
              >確認する</button>
            </div>
          </div>
        </div>
      )}

      {/* サイドバー */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-title">⚾ ROOKIE BASEBALL</div>
          <div className="sidebar-logo-sub">毎日コツコツ積み上げよう！</div>
        </div>
        {data.streak > 0 && (
          <div className="sidebar-streak">
            🔥 <strong>{data.streak}日</strong>連続練習中！
          </div>
        )}
        <nav className="sidebar-nav">
          {navItems.map(n => (
            <div
              key={n.id}
              className={`nav-item ${tab === n.id ? 'active' : ''}`}
              onClick={() => { playSound('menu_select.mp3', 0.35); setTab(n.id); }}
            >
              <span className="nav-icon"><i className={`fa-solid ${n.icon}`} /></span>
              <span><Furi t={n.labelRuby} /></span>
              {n.id === 'badge' && unclaimedBadgeCount > 0 && (
                <span style={{
                  marginLeft:'auto', background:'#ff5252', color:'white',
                  borderRadius:'50%', width:20, height:20,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:11, fontWeight:'bold', flexShrink:0,
                }}>{unclaimedBadgeCount}</span>
              )}
            </div>
          ))}
        </nav>
      </div>

      {/* ボトムナビ（スマホ専用・6タブ）*/}
      <div className="bottom-nav">
        {navItems.filter(n => n.id !== 'profile').map(n => {
          return (
            <div
              key={n.id}
              className={`bottom-nav-item ${tab === n.id ? 'active' : ''}`}
              onClick={() => setTab(n.id)}
            >
              <i className={`fa-solid ${n.icon}`} />
              <span className="bottom-nav-item-label">{n.labelStr}</span>
              {n.id === 'badge' && unclaimedBadgeCount > 0 && (
                <span className="bottom-nav-badge">{unclaimedBadgeCount}</span>
              )}
            </div>
          );
        })}
      </div>

      {/* PWAインストールバナー */}
      {onboardingDone && <PWAInstallBanner />}

      {/* SW更新トースト */}
      <PWAUpdateToast />

      {/* 練習完了演出 */}
      {celebration && <CelebrationOverlay data={celebration} onClose={() => setCelebration(null)} />}


      {/* ホームFAB（ホーム以外のタブで表示・スマホ専用） */}
      {tab !== 'home' && (
        <div className="home-fab mobile-only"
          onClick={() => { playSound('menu_select.mp3', 0.35); setTab('home'); }}>
          <i className="fa-solid fa-house" />
          <span className="home-fab-label">ホーム</span>
        </div>
      )}

      {/* メインコンテンツ */}
      <main className={`main${tab === 'home' ? ' main-home' : ''}`}>
        <div className="content">
          {tab === 'home' && <HomeTab today={today} streak={data.streak} stampedToday={stampedToday} availablePoints={availablePoints} todayPoints={todayPoints} nextBadge={nextBadge} canStampToday={canStampToday} totalPracticed={totalPracticed} threshold={threshold} profileLevel={profileLevel} profileTitle={profileTitle} profileProgress={profileProgress} ownedCards={data.ownedCards || []} onNavigate={setTab} onNavigateToCard={(playerId) => { setPendingCardDetail({ playerId }); setTab('collection'); }} onReset={handleReset} soundOn={soundOn} playerName={playerName} dailyTargets={dailyTargets} onSoundToggle={handleSoundToggle} onNameSave={handleNameSave} onTargetsChange={handleTargetsChange} todayRec={todayRec} openModal={openModal} unclaimedBadgeCount={unclaimedBadgeCount} onNavigateToShop={() => { setCollectionView('scout'); setTab('collection'); }} onNavigateToMyCards={() => { setCollectionView('mycards'); setTab('collection'); }} cardUpgrades={data.cardUpgrades || {}} records={data.records || {}} />}
          {tab === 'practice' && <PracticeTab today={today} todayRec={todayRec} openModal={openModal} totalPracticed={totalPracticed} threshold={threshold} canStampToday={canStampToday} stampedToday={stampedToday} onGoToStamp={() => setTab('stamp')} todayPoints={todayPoints} streak={data.streak} stamps={data.stamps} availablePoints={availablePoints} nextBadge={nextBadge} dailyTargets={dailyTargets} />}
          {tab === 'quiz' && <QuizTab onQuizComplete={handleQuizComplete} onHomeworkComplete={handleHomeworkComplete} todayQuizBonus={todayQuizBonus} todayKisoBonus={todayKisoBonus} quizDone={data.quizDone || {}} homeworkBonus={data.homeworkBonus || {}} today={today} kisoProgress={data.kisoProgress||{}} kisoBonusLog={data.kisoBonusLog||{}} onKisoComplete={handleKisoComplete} profileLevel={profileLevel} onKisoEnter={() => {}} onViewStateChange={setKisoViewState} />}
          {tab === 'stamp' && <StampTab data={data} today={today} threshold={threshold} goalReached={goalReached} canStampToday={canStampToday} onPressHanko={handlePressHanko} />}
          {tab === 'collection' && <CollectionTab totalEarnedPoints={totalEarnedPoints} availablePoints={availablePoints} isPlayerOwned={isPlayerOwned} onBuyCard={handleBuyCard} cardUpgrades={data.cardUpgrades || {}} onUpgradeStat={handleUpgradeStat} pendingCardDetail={pendingCardDetail} onClearPendingCard={() => setPendingCardDetail(null)} today={today} profileLevel={profileLevel} stampDays={_stampDays} initialView={collectionView} onScout={handleScout} scoutResults={scoutResults} onClearScoutResults={() => setScoutResults(null)} scoutCoins={data.scoutCoins || 0} onCoinExchange={handleCoinExchange} />}
          {tab === 'badge' && <BadgeTab badges={BADGES} data={data} earnedBadges={earnedBadges} claimedBadges={claimedBadges} badgeBonusPoints={badgeBonusPoints} onClaim={handleClaimBadge} today={today} />}
          {tab === 'profile' && <ProfileTab data={data} streak={data.streak} totalStats={data.totalStats} onNavigateToCard={(playerId) => { setPendingCardDetail({ playerId }); setTab('collection'); }} />}
        </div>
      </main>
    </div>
  );
}

// ===== 設定モーダル =====
function SettingsModal({ onClose, onReset, soundOn, playerName, dailyTargets, onSoundToggle, onNameSave, onTargetsChange }) {
  const [confirmReset, setConfirmReset] = React.useState(false);
  const [resetPinInput, setResetPinInput] = React.useState('');
  const [resetPinError, setResetPinError] = React.useState('');
  const [pinMode, setPinMode]   = React.useState(null);
  const [pinVal, setPinVal]     = React.useState('');
  const [pinErr, setPinErr]     = React.useState('');
  const [hasPin, setHasPin]     = React.useState(!!getPin());
  // 表示名の編集用ローカル state
  const [nameInput, setNameInput] = React.useState(playerName || '');
  const [nameSaved, setNameSaved] = React.useState(false);
  // 練習目標の編集用ローカル state
  const [targetEditMode, setTargetEditMode] = React.useState(false);
  const [targetPinInput, setTargetPinInput] = React.useState('');
  const [targetPinError, setTargetPinError] = React.useState('');
  const [targetPinVerified, setTargetPinVerified] = React.useState(false); // PIN認証済みフラグ
  const [targetInputs, setTargetInputs]     = React.useState(() => {
    const init = {};
    MENUS.forEach(m => {
      init[m.id] = dailyTargets[m.id] === -1 ? 'hidden'
                 : dailyTargets[m.id] > 0    ? String(dailyTargets[m.id])
                 : '';
    });
    return init;
  });
  const [targetSaved, setTargetSaved] = React.useState(false);

  function handleResetWithPin() {
    const pin = getPin();
    if (!pin) { onReset(); setConfirmReset(false); onClose(); return; }
    if (resetPinInput !== pin) { setResetPinError('PINコードが違います'); return; }
    onReset(); setConfirmReset(false); setResetPinInput(''); setResetPinError(''); onClose();
  }
  function cancelReset() { setConfirmReset(false); setResetPinInput(''); setResetPinError(''); }
  function handlePinSave() {
    if (!/^\d{4}$/.test(pinVal)) { setPinErr('4桁の数字を入力してください'); return; }
    savePin(pinVal); setHasPin(true); setPinMode(null); setPinVal(''); setPinErr('');
  }
  function handlePinDelete() { removePin(); setHasPin(false); setPinMode(null); }

  return (
    <div
      style={{position:'fixed', inset:0, zIndex:500, background:'rgba(0,0,0,0.45)',
        display:'flex', alignItems:'flex-end'}}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div style={{width:'100%', background:'#f5f6fa', borderRadius:'20px 20px 0 0',
        paddingBottom:'calc(20px + env(safe-area-inset-bottom))',
        maxHeight:'85vh', overflowY:'auto',
        animation:'slideUpSheet 0.32s cubic-bezier(0.32,0.72,0,1)'}}>

        {/* ハンドル */}
        <div style={{display:'flex', justifyContent:'center', padding:'12px 0 4px'}}>
          <div style={{width:40, height:4, borderRadius:2, background:'#ddd'}} />
        </div>
        {/* タイトルバー */}
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 20px 16px'}}>
          <div style={{fontSize:18, fontWeight:900, color:'#1a237e'}}>⚙️ 設定</div>
          <button onClick={onClose}
            style={{background:'rgba(0,0,0,0.07)', border:'none', borderRadius:'50%',
              width:30, height:30, fontSize:16, cursor:'pointer', color:'#555',
              display:'flex', alignItems:'center', justifyContent:'center'}}>✕</button>
        </div>

        <div style={{padding:'0 16px 8px'}}>

          {/* ── 表示名 ── */}
          <div className="pin-section">
            <div className="pin-section-title">👤 表示名</div>
            <div className="pin-section-desc">ホーム画面のプロフィールに表示する名前を設定します。</div>
            <div style={{display:'flex', gap:8, marginTop:4}}>
              <input
                type="text" maxLength={10} value={nameInput}
                onChange={e => { setNameInput(e.target.value); setNameSaved(false); }}
                placeholder="例：たろう（最大10文字）"
                style={{flex:1, padding:'8px 12px', borderRadius:10, border:'1.5px solid #e8eaf6',
                  fontSize:15, outline:'none'}}
              />
              <button className="pin-set-btn"
                onClick={() => { onNameSave(nameInput); setNameSaved(true); }}>保存</button>
            </div>
            {nameSaved && <div style={{fontSize:12, color:'#43a047', marginTop:5, fontWeight:700}}>✅ 保存しました</div>}
            {!nameInput && playerName && (
              <div style={{fontSize:12, color:'#888', marginTop:5}}>現在：{playerName}</div>
            )}
          </div>

          {/* ── 種目別 1日目標 ── */}
          <div className="pin-section">
            <div className="pin-section-title">🎯 種目別の目標設定</div>
            <div className="pin-section-desc">
              各種目に1日の目標回数を設定しておくと、練習メニューでまだ達成していない種目が光って表示されます。<br />
              👁️ ボタンで「非表示」にした種目は練習メニューに表示されません。<br />
              スタンプの条件には影響しません。保護者が設定・変更します。
            </div>

            {/* 現在の設定サマリー */}
            {!targetEditMode && (() => {
              const targetItems = MENUS.filter(m => dailyTargets[m.id] > 0);
              const hiddenItems = MENUS.filter(m => dailyTargets[m.id] === -1);
              const hasAny = targetItems.length > 0 || hiddenItems.length > 0;
              return hasAny ? (
                <div style={{marginTop:10, display:'flex', flexDirection:'column', gap:4}}>
                  {targetItems.map(m => (
                    <div key={m.id} style={{display:'flex', justifyContent:'space-between',
                      fontSize:13, padding:'4px 0', borderBottom:'1px solid #f0f0f5'}}>
                      <span style={{color:'#333', fontWeight:600}}>{m.name}</span>
                      <span style={{color:'#1a237e', fontWeight:700}}>{dailyTargets[m.id]}{m.unit}</span>
                    </div>
                  ))}
                  {hiddenItems.map(m => (
                    <div key={m.id} style={{display:'flex', justifyContent:'space-between',
                      fontSize:13, padding:'4px 0', borderBottom:'1px solid #f0f0f5', opacity:0.5}}>
                      <span style={{color:'#888', fontWeight:600, textDecoration:'line-through'}}>{m.name}</span>
                      <span style={{color:'#aaa', fontSize:12}}>🙈 非表示</span>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{fontSize:12, color:'#aaa', marginTop:8}}>目標はまだ設定されていません</div>
              );
            })()}

            {/* 編集モード */}
            {targetEditMode ? (
              <>
                {MENU_CATEGORIES.map(cat => (
                  <div key={cat.id} style={{marginTop:14}}>
                    <div style={{fontSize:12, fontWeight:800, color:'#888', marginBottom:6,
                      letterSpacing:0.5, borderLeft:'3px solid #7986cb', paddingLeft:8}}>{cat.label}</div>
                    {MENUS.filter(m => m.category === cat.id).map(m => {
                      const isHidden = targetInputs[m.id] === 'hidden';
                      return (
                        <div key={m.id} style={{display:'flex', alignItems:'center', gap:8,
                          marginBottom:8, padding:'6px 8px', borderRadius:10,
                          background: isHidden ? '#f5f5f5' : 'white',
                          border:`1.5px solid ${isHidden ? '#e0e0e0' : '#e8eaf6'}`,
                          opacity: isHidden ? 0.65 : 1, transition:'all 0.15s'}}>
                          <span style={{fontSize:18, flexShrink:0}}>
                            <MenuIcon icon={m.icon} size={16} color={isHidden ? '#bbb' : m.color} />
                          </span>
                          <span style={{flex:1, fontSize:13, fontWeight:700,
                            color: isHidden ? '#aaa' : '#222',
                            textDecoration: isHidden ? 'line-through' : 'none'}}>{m.name}</span>
                          {!isHidden && (
                            <>
                              <input
                                type="number" min="0" max="9999"
                                value={targetInputs[m.id]}
                                onChange={e => setTargetInputs(prev => ({...prev, [m.id]: e.target.value}))}
                                placeholder="目標なし"
                                style={{width:66, padding:'4px 6px', borderRadius:8, border:'1.5px solid #e8eaf6',
                                  fontSize:13, textAlign:'center'}}
                              />
                              <span style={{fontSize:12, color:'#888', flexShrink:0}}>{m.unit}</span>
                            </>
                          )}
                          {isHidden && (
                            <span style={{fontSize:11, color:'#999', flexShrink:0}}>非表示中</span>
                          )}
                          {/* 表示/非表示トグル */}
                          <button
                            onClick={() => setTargetInputs(prev => ({
                              ...prev,
                              [m.id]: isHidden ? '' : 'hidden'
                            }))}
                            title={isHidden ? '表示に戻す' : '非表示にする'}
                            style={{flexShrink:0, width:30, height:30, borderRadius:8,
                              border:`1.5px solid ${isHidden ? '#bbb' : '#e8eaf6'}`,
                              background: isHidden ? '#e0e0e0' : '#f5f6fa',
                              cursor:'pointer', fontSize:15,
                              display:'flex', alignItems:'center', justifyContent:'center'}}>
                            {isHidden ? '🙈' : '👁️'}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                ))}
                <div style={{display:'flex', gap:8, marginTop:14, flexWrap:'wrap'}}>
                  <button className="pin-set-btn" onClick={() => {
                    const next = {};
                    MENUS.forEach(m => {
                      if (targetInputs[m.id] === 'hidden') {
                        next[m.id] = -1; // 非表示
                      } else {
                        const v = parseInt(targetInputs[m.id]);
                        if (v > 0) next[m.id] = v;
                      }
                    });
                    onTargetsChange(next);
                    setTargetSaved(true);
                    setTargetEditMode(false);
                    setTargetPinVerified(false); // 保存後は再認証が必要
                  }}>保存する</button>
                  <button className="pin-del-btn" onClick={() => {
                    setTargetEditMode(false);
                    setTargetPinInput(''); setTargetPinError('');
                    setTargetPinVerified(false); // キャンセル後は再認証が必要
                    // 入力値をリセット
                    const init = {};
                    MENUS.forEach(m => {
                      init[m.id] = dailyTargets[m.id] === -1 ? 'hidden'
                                 : dailyTargets[m.id] > 0    ? String(dailyTargets[m.id])
                                 : '';
                    });
                    setTargetInputs(init);
                  }}>キャンセル</button>
                </div>
              </>
            ) : (
              <>
                {/* PINがある場合はPIN認証が必要 */}
                {hasPin && !targetPinVerified ? (
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:12, color:'#c62828', fontWeight:700, marginBottom:6}}>
                      🔐 編集するには保護者PINコードが必要です
                    </div>
                    <div style={{display:'flex', gap:8, alignItems:'center'}}>
                      <input
                        type="password" inputMode="numeric" maxLength={4}
                        value={targetPinInput}
                        onChange={e => { setTargetPinInput(e.target.value.replace(/\D/g,'')); setTargetPinError(''); }}
                        placeholder="4桁のPIN"
                        style={{width:110, padding:'6px 10px', fontSize:15, borderRadius:8,
                          border:`1.5px solid ${targetPinError ? '#c62828' : '#e8eaf6'}`,
                          textAlign:'center', letterSpacing:4}}
                      />
                      <button className="pin-set-btn" onClick={() => {
                        if (targetPinInput.length !== 4) { setTargetPinError('4桁のPINを入力してください'); return; }
                        if (targetPinInput !== getPin()) { setTargetPinError('PINが違います'); setTargetPinInput(''); return; }
                        setTargetPinVerified(true); setTargetPinError(''); setTargetPinInput('');
                      }}>確認</button>
                    </div>
                    {targetPinError && <div style={{fontSize:12, color:'#c62828', marginTop:4}}>{targetPinError}</div>}
                  </div>
                ) : (
                  <button className="pin-set-btn" style={{marginTop:10}}
                    onClick={() => { setTargetEditMode(true); setTargetSaved(false); }}>
                    目標を編集する
                  </button>
                )}
              </>
            )}

            {targetSaved && !targetEditMode && (
              <div style={{fontSize:12, color:'#43a047', marginTop:8, fontWeight:700}}>✅ 目標を保存しました</div>
            )}
          </div>

          {/* ── 効果音 ── */}
          <div className="pin-section">
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
              <div>
                <div className="pin-section-title" style={{marginBottom:2}}>🔊 効果音</div>
                <div className="pin-section-desc" style={{marginBottom:0}}>
                  タップ音・ハンコ音・クイズ音などの効果音
                </div>
              </div>
              {/* トグルスイッチ */}
              <button
                onClick={onSoundToggle}
                style={{width:56, height:32, borderRadius:16, border:'none', cursor:'pointer', flexShrink:0,
                  background: soundOn ? '#43a047' : '#ccc',
                  position:'relative', transition:'background 0.25s', marginLeft:16}}
                aria-label={soundOn ? '効果音オン' : '効果音オフ'}
              >
                <div style={{
                  width:26, height:26, borderRadius:'50%', background:'white',
                  position:'absolute', top:3, left: soundOn ? 27 : 3,
                  transition:'left 0.25s', boxShadow:'0 1px 5px rgba(0,0,0,0.3)',
                }} />
              </button>
            </div>
            <div style={{fontSize:12, color: soundOn ? '#43a047' : '#999', marginTop:8, fontWeight:700}}>
              {soundOn ? '🔊 効果音オン' : '🔇 効果音オフ'}
            </div>
          </div>

          {/* ── 保護者PIN設定 ── */}
          <div className="pin-section">
            <div className="pin-section-title">🔒 保護者PINコード設定</div>
            <div className="pin-section-desc">
              設定した閾値を超える数字を記録しようとしたとき、PINコードの確認が入ります。<br />
              子どもが大きすぎる数字を入力するのを防ぎましょう。
            </div>
            {hasPin ? (
              <>
                <div className="pin-status">✅ PINコードが設定されています</div>
                {pinMode === 'change' ? (
                  <>
                    <div className="pin-input-row">
                      <input type="password" maxLength={4} inputMode="numeric"
                        value={pinVal} placeholder="新PIN（4桁）"
                        onChange={e => { setPinVal(e.target.value.replace(/\D/g,'')); setPinErr(''); }}
                        onKeyDown={e => e.key === 'Enter' && handlePinSave()} autoFocus />
                      <button className="pin-set-btn" onClick={handlePinSave}>保存</button>
                      <button className="pin-del-btn" onClick={() => { setPinMode(null); setPinVal(''); setPinErr(''); }}>キャンセル</button>
                    </div>
                    {pinErr && <div style={{color:'#c62828', fontSize:13}}>{pinErr}</div>}
                  </>
                ) : (
                  <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                    <button className="pin-set-btn" onClick={() => { setPinMode('change'); setPinVal(''); }}>変更する</button>
                    <button className="pin-del-btn" onClick={handlePinDelete}>解除する</button>
                  </div>
                )}
              </>
            ) : (
              <>
                {pinMode === 'set' ? (
                  <>
                    <div className="pin-input-row">
                      <input type="password" maxLength={4} inputMode="numeric"
                        value={pinVal} placeholder="4桁の数字"
                        onChange={e => { setPinVal(e.target.value.replace(/\D/g,'')); setPinErr(''); }}
                        onKeyDown={e => e.key === 'Enter' && handlePinSave()} autoFocus />
                      <button className="pin-set-btn" onClick={handlePinSave}>設定する</button>
                      <button className="pin-del-btn" onClick={() => { setPinMode(null); setPinVal(''); setPinErr(''); }}>キャンセル</button>
                    </div>
                    {pinErr && <div style={{color:'#c62828', fontSize:13}}>{pinErr}</div>}
                  </>
                ) : (
                  <button className="pin-set-btn" onClick={() => { setPinMode('set'); setPinVal(''); }}>PINコードを設定する</button>
                )}
              </>
            )}
          </div>

          {/* データリセット */}
          <div className="reset-section">
            <div className="reset-section-title"><i className="fa-solid fa-trash" /> データリセット</div>
            <div className="reset-section-desc">練習記録・スタンプ・カード進捗など、すべてのデータを削除して最初からやり直します。</div>
            {!confirmReset ? (
              <button className="reset-btn" onClick={() => setConfirmReset(true)}>データをリセットする</button>
            ) : (
              <div className="reset-confirm">
                <span className="reset-confirm-msg">⚠️ 本当にリセットしますか？元に戻せません。</span>
                {hasPin && (
                  <div style={{margin:'10px 0 4px', display:'flex', flexDirection:'column', gap:4}}>
                    <label style={{fontSize:13, color:'#c62828', fontWeight:700}}>🔐 保護者PINコードを入力してください</label>
                    <input type="password" inputMode="numeric" maxLength={4}
                      value={resetPinInput}
                      onChange={e => { setResetPinInput(e.target.value.replace(/\D/g,'')); setResetPinError(''); }}
                      placeholder="4桁のPIN"
                      style={{width:120, padding:'6px 10px', fontSize:16, borderRadius:8,
                        border:'1.5px solid #e53935', textAlign:'center', letterSpacing:4}} />
                    {resetPinError && <span style={{fontSize:12, color:'#c62828'}}>{resetPinError}</span>}
                  </div>
                )}
                <div style={{display:'flex', gap:8, marginTop:8}}>
                  <button className="reset-confirm-yes" onClick={handleResetWithPin}>リセットする</button>
                  <button className="reset-confirm-no" onClick={cancelReset}>キャンセル</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

              style={{background:'white', border:'1.5px solid rgba(0,0,0,0.07)',

              onTouchEnd={e => {
                if (touchStartX.current == null) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                touchStartX.current = null;
                if (dx < -45) setCardIdx((safeIdx + 1) % n);
                else if (dx > 45) setCardIdx((safeIdx - 1 + n) % n);

                  position:'absolute', top:'50%', left:'50%',
                  transform:'translateX(calc(-50% - 92px)) translateY(-50%) rotateY(-28deg) scale(0.65)',

            {/* 中央カード情報パネル（名前＋能力値） */}
            {(() => {
              const key = cards[safeIdx];
              const player = getPlayerById(key);
              const base = CARD_BASE_STATS[key] || (player && player.stats) || {};
              const stats = (cardUpgrades||{})[key] || base;
              const posInfo = player ? (POSITION_CONFIG[player.pos] || {}) : {};
              const rc = player ? (RARITY_CONFIG[player.rarity] || {}) : {};
              return (
                <div style={{
                  background:'white', borderRadius:12, margin:'5px 24px 0',

                  <div style={{display:'flex', justifyContent:'space-between'}}>
                    {STAT_ORDER.map(stat => (

              );

            {/* ドットインジケーター */}
            {n > 1 && (
              <div style={{display:'flex', justifyContent:'center', gap:5, marginTop:6}}>
                {(n <= 10 ? cards : cards.slice(0,10)).map((_, i) => (
                  <div key={i}
                    style={{
                      width: i === safeIdx % 10 ? 16 : 5,
                      height:5, borderRadius:999,
                      background: i === safeIdx % 10 ? '#ffd54f' : 'rgba(255,255,255,0.4)',

            )}

      })()}

      {/* ─── ③ 下段アイコン（スタンプ・バッジ・プロフィール・設定）─── */}
      {settingsOpen && <SettingsModal onClose={() => setSettingsOpen(false)} onReset={onReset} soundOn={soundOn} playerName={playerName} dailyTargets={dailyTargets} onSoundToggle={onSoundToggle} onNameSave={onNameSave} onTargetsChange={onTargetsChange} />}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:7}}>

        {/* ─ スタンプ ─ */}
        {(() => {
          const pressed = stampedToday;
          const canStamp = canStampToday && !stampedToday;
          const labelColor = pressed ? '#c62828' : canStamp ? '#2e7d32' : '#555';
          const subColor   = pressed ? '#e53935' : canStamp ? '#43a047' : '#aaa';
          const subText    = pressed ? '押したよ！' : canStamp ? '押せるよ！' : `🔥${streak||0}日`;

              style={{background:'white', border:'1.5px solid rgba(0,0,0,0.07)',

                  position:'absolute', bottom:2, right:2,

              <div style={{fontSize:9, fontWeight:700, color:subColor}}>{subText}</div>
            </button>

        })()}

        {/* ─ バッジ ─ */}
        {(() => {
          const hasBadge = (unclaimedBadgeCount || 0) > 0;
          return (
            <button
              style={{background:'white', border:'1.5px solid rgba(0,0,0,0.07)',
                borderRadius:17, padding:'8px 2px 7px',
                display:'flex', flexDirection:'column', alignItems:'center', gap:3,
                cursor:'pointer', WebkitTapHighlightColor:'transparent',
                boxShadow:'0 2px 10px rgba(0,0,0,0.08)',
              }}
              onClick={() => { playSound('menu_select.mp3', 0.35); onNavigate('badge'); }}
            >
              <div style={{...iconWrapStyle(52), position:'relative'}}>
                <img src="images/home_icon_badge.png" alt="バッジ" style={iconImgStyle}
                  onError={e => { e.target.style.display='none'; }}

                  <div style={{
                    position:'absolute', top:1, right:1,

                    fontSize:8, fontWeight:900, borderRadius:999,

              </div>
              <div style={{fontSize:10, fontWeight:900, color: hasBadge ? '#e65100' : '#555'}}>バッジ</div>
              <div style={{fontSize:9, fontWeight:700, color: hasBadge ? '#ffa000' : '#aaa'}}>
                {hasBadge ? `${unclaimedBadgeCount}個あり！` : 'なし'}

        {/* ─ プロフィール ─ */}
        <button
          style={{background:'white', border:'1.5px solid rgba(0,0,0,0.07)',
            borderRadius:17, padding:'8px 2px 7px',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            cursor:'pointer', WebkitTapHighlightColor:'transparent',
            boxShadow:'0 2px 10px rgba(0,0,0,0.08)',

        >
          <div style={iconWrapStyle(52)}>
            <img src="images/home_icon_profile.png" alt="プロフィール" style={iconImgStyle}
              onError={e => {
                e.target.style.display='none';
                e.target.nextSibling.style.display='flex';

            <div style={{display:'none', width:'100%', height:'100%',
              background:'linear-gradient(135deg,#00acc1,#4dd0e1)',
              alignItems:'center', justifyContent:'center'}}>
              <i className="fa-solid fa-user" style={{fontSize:20, color:'white'}} />
            </div>
          </div>
          <div style={{fontSize:10, fontWeight:900, color:'#00838f'}}>プロフィール</div>
          <div style={{fontSize:9, fontWeight:700, color:'#4dd0e1'}}>Lv.{profileLevel}</div>
        </button>

        {/* ─ 設定 ─ */}
        <button
          style={{background:'white', border:'1.5px solid rgba(0,0,0,0.07)',
            borderRadius:17, padding:'8px 2px 7px',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            cursor:'pointer', WebkitTapHighlightColor:'transparent',
            boxShadow:'0 2px 10px rgba(0,0,0,0.08)',
          }}
          onClick={() => { playSound('menu_select.mp3', 0.35); setSettingsOpen(true); }}
        >
          <div style={iconWrapStyle(52)}>
            <img src="images/home_icon_settings.png" alt="設定" style={iconImgStyle}
              onError={e => {
                e.target.style.display='none';
                e.target.nextSibling.style.display='flex';
              }}
            />
            <div style={{display:'none', width:'100%', height:'100%',
              background:'linear-gradient(135deg,#455a64,#607d8b)',
              alignItems:'center', justifyContent:'center'}}>
              <i className="fa-solid fa-gear" style={{fontSize:20, color:'white'}} />
            </div>
          </div>
          <div style={{fontSize:10, fontWeight:900, color:'#37474f'}}>設定</div>
          <div style={{fontSize:9, fontWeight:700, color:'#90a4ae'}}>音・名前</div>
        </button>
      </div>

      </div>{/* end flex column */}
      </div>{/* end z:1 */}
    </div>
  );
}

// ===== 練習タブ =====
function PracticeTab({ today, todayRec, openModal, totalPracticed, threshold, canStampToday, stampedToday, onGoToStamp, todayPoints, streak, stamps, availablePoints, nextBadge, dailyTargets }) {
  const dateLabel = formatDate(today);
  const pct       = Math.min(100, Math.round(totalPracticed / threshold * 100));
  const remaining = Math.max(0, threshold - totalPracticed);
  const msg = stampedToday          ? '🌟 今日のスタンプ済み！お疲れ様！' :
              canStampToday         ? '🎉 目標達成！スタンプが押せます！' :
              totalPracticed >= 1   ? `あと ${remaining} 種目で今日の目標達成！` :
                                      '今日の練習を記録しよう！';

  // Weekly calendar — Mon〜Sun of the current week
  const todayDate = new Date(today);
  const dow = todayDate.getDay(); // 0=Sun
  const monday = new Date(todayDate);
  monday.setDate(todayDate.getDate() - (dow === 0 ? 6 : dow - 1));
  const weekDays = Array.from({length:7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().slice(0, 10);
  });
  const DAY_LABELS = ['月','火','水','木','金','土','日'];
  const ptPct = Math.min(100, Math.round((todayPoints / DAILY_POINT_CAP) * 100));

  const targets = dailyTargets || {};
  const menuCards = MENU_CATEGORIES.map(cat => {
    // target === -1 は「非表示」設定なのでフィルタ
    const catMenus = MENUS.filter(m => m.category === cat.id && targets[m.id] !== -1);
    if (catMenus.length === 0) return null; // カテゴリ内が全て非表示なら丸ごと省略
    return (
      <div key={cat.id} className="menu-category">
        <div className="menu-category-label">{cat.label}</div>
        <div className="menu-grid">
          {catMenus.map(menu => {
            const val       = todayRec[menu.id] || 0;
            const done      = val > 0;
            const target    = targets[menu.id] || 0;
            const targetMet = !target || val >= target;
            const isUnmet   = target > 0 && !done; // 目標あり・未記録
            const cls = done ? 'done' : isUnmet ? 'target-unmet' : '';
            return (
              <div key={menu.id} className={`menu-card ${cls}`} onClick={() => openModal(menu)}>
                {done && <div className="done-badge">✅</div>}
                <div className="menu-icon-circle" style={{background: done ? '#c5e1a5' : menu.color}}>
                  <MenuIcon icon={menu.icon} size={26} color="#fff" />
                </div>
                <div className="menu-name"><Furi t={menu.nameRuby || menu.name} /></div>
                <div className="menu-unit">{menu.unit}</div>
                {done
                  ? <>
                      <div className="menu-count">{val}<span style={{fontSize:12}}>{menu.unit}</span></div>
                      {target > 0 && (
                        <div style={{fontSize:10, color: val>=target?'#43a047':'#e65100', fontWeight:700, marginTop:2}}>
                          {val>=target ? '✅ 目標達成！' : `目標${target}${menu.unit}中`}
                        </div>
                      )}
                    </>
                  : <>
                      <div className="tap-hint">タップして記録</div>
                      {target > 0 && <div className="menu-target-badge">目標 {target}{menu.unit}</div>}
                    </>
                }
                {menu.desc && <div className="menu-desc">{menu.desc}</div>}
              </div>
            );
          })}
        </div>
      </div>
    );
  });

  return (
    <>
      {/* ===== DESKTOP: ページヘッダー ===== */}
      <div className="desktop-only">
        <div className="page-header">
          <div>

// ===== スタンプ帳タブ =====
function StampTab({ data, today, threshold, goalReached, canStampToday, onPressHanko }) {
  const [viewYear, setViewYear]   = useState(new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(new Date().getMonth() + 1);

  const prevMonth = () => { if (viewMonth===1){setViewMonth(12);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextMonth = () => { if (viewMonth===12){setViewMonth(1);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };

  const firstDay    = new Date(viewYear, viewMonth-1, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();
  const prefix      = `${viewYear}-${String(viewMonth).padStart(2,'0')}-`;

  // スタンプ数はdata.stampsから（手動押印済みのみ）
  const stampedDays = Object.keys(data.stamps).filter(k => k.startsWith(prefix) && data.stamps[k]).length;
  const stampedToday = !!data.stamps[today];

  function hasStamp(d) {
    const key = `${prefix}${String(d).padStart(2,'0')}`;
    return !!data.stamps[key];
  }

  // 今日のスタンプエリアのメッセージ
  const todayMsg = stampedToday  ? '今日のスタンプ、押せたね！' :
                   canStampToday ? `目標の ${threshold} 種目達成！スタンプを押そう！` :
                   goalReached   ? '目標達成！スタンプを押せます！' :
                                   `今日はまだ目標未達成（目標：${threshold} 種目）`;

  return (
    <>
      {/* モバイル用ゲームスタイルヘッダー */}
      <div className="mobile-only">
        <div className="mobile-game-top" style={{marginBottom:10}}>
          <div className="mobile-hud">
            <div style={{fontSize:15, fontWeight:800, color:'white', letterSpacing:1}}>
              📅 <Furi t="スタンプ{帳|ちょう}" />
            </div>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.8)', fontWeight:600}}>
              {formatDate(today)}
            </div>
          </div>
          <div style={{textAlign:'center', color:'rgba(255,255,255,0.85)', fontSize:12, fontWeight:600, marginTop:4}}>
            {stampedToday ? '今日のスタンプ、押せたね！🌟' : canStampToday ? '目標達成！スタンプを押そう！🎉' : `🔥 ${data.streak || 0}日連続 · 今月 ${stampedDays}日スタンプ済み`}
          </div>
        </div>
      </div>
      {/* デスクトップ用ヘッダー */}
      <div className="desktop-only">
        <div className="page-header">
          <h2><Furi t="スタンプ{帳|ちょう}" /></h2>
        </div>
      </div>

      {/* 今日のスタンプエリア */}
      <div className={`today-stamp-area ${canStampToday ? 'can-stamp' : ''}`}>
        <div style={{flex:1}}>
          <div className="today-stamp-label">
            <strong>今日のスタンプ：{formatDate(today)}</strong>
            {todayMsg}
          </div>
        </div>
        <div>
          {stampedToday ? (
            <div className="hanko-pressed"><HankoSeal size="md" /></div>
          ) : canStampToday ? (
            <button className="hanko-btn" onClick={onPressHanko}>
              <i className="fa-solid fa-stamp" /> スタンプを押す！
            </button>
          ) : (
            <div style={{fontSize:13, color:'#aaa', textAlign:'center'}}>
              <i className="fa-solid fa-lock" style={{fontSize:20, display:'block', marginBottom:4}} />
              目標達成後に押せます
            </div>
          )}
        </div>
      </div>

      <div className="month-stats">
        <div className="stat-card">
          <div className="stat-num">{stampedDays}</div>
          <div className="stat-label">スタンプ数（今月）</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{daysInMonth - stampedDays}</div>
          <div className="stat-label">まだの日</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{Math.round(stampedDays / daysInMonth * 100)}<span style={{fontSize:16}}>%</span></div>
          <div className="stat-label">達成率</div>
        </div>
      </div>

      <div className="month-nav">
        <button className="month-btn" onClick={prevMonth}><i className="fa-solid fa-chevron-left" /></button>
        <div className="month-title">{viewYear}年 {viewMonth}月</div>
        <button className="month-btn" onClick={nextMonth}><i className="fa-solid fa-chevron-right" /></button>
      </div>

      <div className="calendar">
        {['日','月','火','水','木','金','土'].map(d => (
          <div key={d} className="cal-head">{d}</div>
        ))}
        {Array(firstDay).fill(null).map((_,i) => (
          <div key={'e'+i} className="cal-day empty" />
        ))}
        {Array(daysInMonth).fill(null).map((_,i) => {
          const d   = i + 1;
          const key = `${prefix}${String(d).padStart(2,'0')}`;
          const isToday  = key === today;
          const stamped  = hasStamp(d);
          return (
            <div key={d} className={`cal-day ${isToday?'today':''} ${stamped?'has-stamp':''}`}>
              <div className="day-num">{d}</div>
              {stamped && <div className="day-stamp"><HankoSeal size="sm" /></div>}
            </div>
          );
        })}
      </div>
      <div className="stamp-legend"><HankoSeal size="sm" /> = スタンプを押した日　　目標：毎日 {threshold} 種目</div>
    </>
  );
}
